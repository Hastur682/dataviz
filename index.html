<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数据质量可视化平台 v7</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #1677ff;
  --primary-hover: #4096ff;
  --primary-active: #0958d9;
  --success: #52c41a;
  --warning: #faad14;
  --error: #ff4d4f;
  --bg: #f5f7fa;
  --card-bg: #ffffff;
  --border: #f0f0f0;
  --text: #1f1f1f;
  --text-secondary: #8c8c8c;
  --text-tertiary: #bfbfbf;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.03), 0 4px 12px rgba(0,0,0,0.06);
  --radius: 8px;
  --radius-sm: 6px;
  --sidebar-w: 240px;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5714; }

/* ===== TOPBAR ===== */
#topbar {
  position: fixed; top: 0; left: 0; right: 0; height: 52px;
  background: #fff; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 24px;
  z-index: 100; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
#topbar .logo { font-size: 16px; font-weight: 700; color: var(--primary); letter-spacing: -0.3px; }
#topbar .logo span { color: var(--text-secondary); font-weight: 400; font-size: 13px; margin-left: 8px; }
.topbar-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }

/* ===== LAYOUT ===== */
#app-wrap {
  display: flex;
  margin-top: 52px;
  height: calc(100vh - 52px);
  overflow: hidden;
}
#sidebar {
  width: var(--sidebar-w);
  background: #fff;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
}
#main-scroll {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  background: var(--bg);
}
#main-area {
  padding: 20px;
  min-height: 100%;
}

/* ===== SIDEBAR ===== */
.sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.sidebar-header h2 { font-size: 13px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
.sidebar-list { flex: 1; overflow-y: auto; padding: 8px; }
.batch-item {
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  margin-bottom: 2px;
  display: flex;
  align-items: flex-start;
  gap: 8px;
  transition: background 0.15s;
  border: 1px solid transparent;
}
.batch-item:hover { background: #f5f7fa; }
.batch-item.active {
  background: #e8f4ff;
  border-color: #bae0ff;
}
.batch-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--primary); margin-top: 5px; flex-shrink: 0;
}
.batch-item.active .batch-dot { background: var(--primary); }
.batch-info { flex: 1; min-width: 0; }
.batch-name { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.batch-meta { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }
.batch-del {
  width: 20px; height: 20px; border-radius: 4px; border: none;
  background: transparent; cursor: pointer; color: var(--text-tertiary);
  display: flex; align-items: center; justify-content: center; font-size: 14px;
  opacity: 0; transition: opacity 0.15s, color 0.15s, background 0.15s; flex-shrink: 0;
}
.batch-item:hover .batch-del { opacity: 1; }
.batch-del:hover { color: var(--error); background: #fff1f0; }
.sidebar-footer { padding: 12px 8px; border-top: 1px solid var(--border); }

/* ===== DROP ZONE ===== */
#drop-zone {
  border: 2px dashed #d9d9d9; border-radius: var(--radius);
  padding: 24px 16px; text-align: center; cursor: pointer;
  transition: border-color 0.2s, background 0.2s; background: transparent;
}
#drop-zone:hover, #drop-zone.dragover { border-color: var(--primary); background: #e8f4ff; }
#drop-zone .drop-icon { font-size: 24px; color: var(--text-tertiary); display: block; margin-bottom: 8px; }
#drop-zone p { font-size: 12px; color: var(--text-secondary); line-height: 1.6; }
#drop-zone input[type=file] { display: none; }

/* ===== EMPTY STATE ===== */
#empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 400px; text-align: center; padding: 40px;
}
#empty-state .empty-icon { font-size: 48px; color: var(--text-tertiary); margin-bottom: 16px; }
#empty-state h3 { font-size: 16px; color: var(--text); margin-bottom: 8px; }
#empty-state p { font-size: 14px; color: var(--text-secondary); }

/* ===== STAT CARDS ===== */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 16px; }
.stat-card {
  background: var(--card-bg); border-radius: var(--radius);
  border: 1px solid var(--border); padding: 16px;
  box-shadow: var(--shadow-sm); transition: box-shadow 0.2s;
}
.stat-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
.stat-card-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; display: flex; align-items: center; gap: 4px; }
.stat-card-value { font-size: 28px; font-weight: 700; line-height: 1.2; color: var(--text); }
.stat-card-sub { font-size: 11px; color: var(--text-tertiary); margin-top: 4px; }
.stat-card-value.good { color: var(--success); }
.stat-card-value.warn { color: var(--warning); }
.stat-card-value.bad { color: var(--error); }

/* ===== CARDS ===== */
.card {
  background: var(--card-bg); border-radius: var(--radius);
  border: 1px solid var(--border); box-shadow: var(--shadow-sm);
  margin-bottom: 16px; overflow: hidden;
}
.card-header {
  padding: 14px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
}
.card-header h3 { font-size: 15px; font-weight: 600; color: var(--text); flex-shrink: 0; }
.card-header-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.card-body { padding: 16px 20px; }

/* ===== CHARTS ===== */
.charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.chart-wrap { position: relative; height: 240px; }
canvas { display: block; }

/* ===== TREND ===== */
.trend-chart-wrap { height: 300px; }
.trend-compare-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 16px; }
.trend-compare-table th {
  padding: 8px 12px; background: #fafafa; border-bottom: 2px solid var(--border);
  font-weight: 600; color: var(--text-secondary); text-align: center; white-space: nowrap;
}
.trend-compare-table th:first-child { text-align: left; }
.trend-compare-table td {
  padding: 8px 12px; border-bottom: 1px solid var(--border); text-align: center; white-space: nowrap;
}
.trend-compare-table td:first-child { text-align: left; font-weight: 500; }
.trend-compare-table tr:last-child td { border-bottom: none; }
.trend-compare-table .tc-good { color: var(--success); font-weight: 600; }
.trend-compare-table .tc-warn { color: var(--warning); font-weight: 600; }
.trend-compare-table .tc-bad { color: var(--error); font-weight: 600; }
.trend-compare-table .tc-best { background: #f6ffed; }
.trend-compare-table .tc-worst { background: #fff2f0; }

/* ===== BATCH SELECTOR ===== */
.batch-selector-wrap { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
.batch-sel-label { font-size: 12px; color: var(--text-secondary); white-space: nowrap; }
.batch-sel-btn {
  padding: 2px 8px; font-size: 11px; border-radius: 4px;
  border: 1px solid var(--border); background: #fff;
  cursor: pointer; color: var(--text-secondary);
  transition: all 0.15s; white-space: nowrap;
}
.batch-sel-btn:hover { border-color: var(--primary); color: var(--primary); }
.batch-sel-btn.selected { background: #e8f4ff; border-color: #bae0ff; color: var(--primary); }
.trend-metric-toggle { display: flex; gap: 4px; flex-wrap: wrap; }
.metric-toggle-btn {
  padding: 2px 8px; font-size: 11px; border-radius: 4px;
  border: 1px solid var(--border); background: #fff;
  cursor: pointer; color: var(--text-secondary);
  transition: all 0.15s; white-space: nowrap; display: flex; align-items: center; gap: 4px;
}
.metric-toggle-btn:hover { border-color: var(--primary); color: var(--primary); }
.metric-toggle-btn.active { border-color: currentColor; }
.metric-toggle-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* ===== TABLE SECTION ===== */
#table-section { margin-bottom: 0; }
.table-toolbar {
  padding: 12px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.search-input {
  padding: 5px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-size: 13px; color: var(--text); outline: none; width: 200px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(22,119,255,0.1); }
.filter-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 8px; background: #e8f4ff; border: 1px solid #bae0ff;
  border-radius: 4px; font-size: 12px; color: var(--primary); cursor: pointer;
}
.filter-badge:hover { background: #bae0ff; }

.table-scroll { overflow-x: auto; overflow-y: auto; max-height: 500px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; white-space: nowrap; }
thead th {
  padding: 10px 12px; background: #fafafa; border-bottom: 1px solid var(--border);
  font-weight: 600; color: var(--text-secondary); text-align: left;
  position: sticky; top: 0; z-index: 2; cursor: pointer; user-select: none;
  white-space: nowrap;
}
thead th:hover { background: #f0f0f0; color: var(--text); }
thead th .sort-icon { font-size: 11px; color: var(--text-tertiary); }
thead th.sorted { color: var(--primary); }
thead th.sorted .sort-icon { color: var(--primary); }
tbody tr { transition: background 0.1s; }
tbody tr:hover { background: #f5f7fa; }
tbody tr.highlighted { background: #fff7e6; }
tbody td { padding: 9px 12px; border-bottom: 1px solid var(--border); color: var(--text); }
tbody td:last-child, thead th:last-child { border-right: none; }
.score-cell { font-weight: 600; }
.score-high { color: var(--success); }
.score-mid { color: var(--warning); }
.score-low { color: var(--error); }
.expand-btn {
  padding: 1px 6px; border: 1px solid var(--border); border-radius: 4px;
  background: #fafafa; cursor: pointer; font-size: 11px; color: var(--text-secondary);
  transition: all 0.15s;
}
.expand-btn:hover { border-color: var(--primary); color: var(--primary); background: #e8f4ff; }
.subdim-row { background: #fafafa !important; }
.subdim-row td { font-size: 12px; color: var(--text-secondary); }
.subdim-table { width: 100%; border-collapse: collapse; }
.subdim-table td { padding: 4px 8px; border-bottom: 1px solid #f0f0f0; }

.pagination {
  padding: 10px 20px; border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
  flex-wrap: wrap;
}
.pagination span { font-size: 13px; color: var(--text-secondary); }
.pg-btn {
  padding: 3px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: #fff; cursor: pointer; font-size: 13px; color: var(--text);
  transition: all 0.15s;
}
.pg-btn:hover:not(:disabled) { border-color: var(--primary); color: var(--primary); }
.pg-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.pg-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }
.pg-size-sel {
  padding: 3px 8px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: #fff; font-size: 13px; color: var(--text); cursor: pointer; outline: none;
}
.pg-size-sel:focus { border-color: var(--primary); }

/* ===== BUTTONS ===== */
.btn {
  padding: 6px 14px; border-radius: var(--radius-sm); border: 1px solid;
  font-size: 13px; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 4px; white-space: nowrap;
}
.btn-primary { background: var(--primary); border-color: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
.btn-default { background: #fff; border-color: var(--border); color: var(--text); }
.btn-default:hover { border-color: var(--primary); color: var(--primary); }
.btn-sm { padding: 3px 8px; font-size: 12px; }
.btn-danger { background: #fff1f0; border-color: #ffa39e; color: var(--error); }
.btn-danger:hover { background: #ff4d4f; border-color: #ff4d4f; color: #fff; }

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 1000;
  display: flex; align-items: center; justify-content: center;
}
.modal {
  background: #fff; border-radius: var(--radius); box-shadow: 0 6px 40px rgba(0,0,0,0.15);
  max-width: 520px; width: 90%; max-height: 90vh; overflow-y: auto;
}
.modal-header {
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-header h3 { font-size: 16px; font-weight: 600; }
.modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-tertiary); padding: 2px; }
.modal-close:hover { color: var(--text); }
.modal-body { padding: 20px; }
.modal-footer { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }

/* ===== SHARE MODAL ===== */
.share-textarea {
  width: 100%; height: 200px; padding: 10px; border: 1px solid var(--border);
  border-radius: var(--radius-sm); font-size: 12px; font-family: monospace;
  resize: vertical; outline: none;
}
.share-textarea:focus { border-color: var(--primary); }

/* ===== TOAST ===== */
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #333; color: #fff; padding: 10px 20px; border-radius: var(--radius-sm);
  font-size: 14px; z-index: 9999; opacity: 0; pointer-events: none;
  transition: opacity 0.2s; max-width: 400px; text-align: center;
}
#toast.show { opacity: 1; }
#toast.success { background: var(--success); }
#toast.error { background: var(--error); }

/* ===== MISC ===== */
.section-title { font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
.no-data { text-align: center; padding: 40px; color: var(--text-tertiary); font-size: 14px; }
a { color: var(--primary); text-decoration: none; }
a:hover { text-decoration: underline; }
.tag {
  display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 11px;
  background: #f0f0f0; color: var(--text-secondary); margin: 1px;
}
.tag-new { background: #e8f4ff; color: var(--primary); }
.tag-old { background: #f6ffed; color: var(--success); }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #d9d9d9; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #bfbfbf; }

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  #sidebar { width: 200px; }
  .charts-row { grid-template-columns: 1fr; }
  .stat-grid { grid-template-columns: repeat(2, 1fr); }
}

/* ===== LOADING ===== */
.loading { display: flex; align-items: center; justify-content: center; padding: 40px; gap: 8px; color: var(--text-secondary); font-size: 14px; }
.spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* batch name editing */
.batch-name-edit {
  font-size: 13px; border: 1px solid var(--primary); border-radius: 4px;
  padding: 1px 4px; width: 100%; outline: none; color: var(--text);
}
</style>
</head>
<body>

<div id="topbar">
  <div class="logo">DataQuality <span>可视化平台</span></div>
  <div class="topbar-actions">
    <button class="btn btn-default btn-sm" onclick="showShareModal()">导出分享版</button>
    <button class="btn btn-default btn-sm" onclick="clearAllData()">清空全部数据</button>
  </div>
</div>

<div id="app-wrap">
  <div id="sidebar">
    <div class="sidebar-header">
      <h2>批次列表</h2>
      <span id="batch-count" style="font-size:12px;color:var(--text-secondary)">0个</span>
    </div>
    <div class="sidebar-list" id="batch-list"></div>
    <div class="sidebar-footer">
      <div id="drop-zone">
        <span class="drop-icon">&#8686;</span>
        <p>拖放 CSV 文件<br>或点击上传</p>
        <input type="file" id="file-input" accept=".csv" multiple>
      </div>
    </div>
  </div>

  <div id="main-scroll">
    <div id="main-area">
      <div id="content-root"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- Share Modal -->
<div id="share-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal('share-modal')">
  <div class="modal">
    <div class="modal-header">
      <h3>导出分享版</h3>
      <button class="modal-close" onclick="closeModal('share-modal')">&#215;</button>
    </div>
    <div class="modal-body">
      <p style="margin-bottom:12px;color:var(--text-secondary);font-size:13px">将当前所有批次数据打包为 JSON，可导入到另一台设备。</p>
      <textarea id="share-textarea" class="share-textarea" readonly placeholder="生成中..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-default" onclick="closeModal('share-modal')">关闭</button>
      <button class="btn btn-primary" onclick="copyShareData()">复制到剪贴板</button>
      <button class="btn btn-primary" onclick="downloadShareData()">下载 JSON</button>
    </div>
  </div>
</div>

<!-- Import Modal -->
<div id="import-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal('import-modal')">
  <div class="modal">
    <div class="modal-header">
      <h3>导入数据</h3>
      <button class="modal-close" onclick="closeModal('import-modal')">&#215;</button>
    </div>
    <div class="modal-body">
      <p style="margin-bottom:12px;color:var(--text-secondary);font-size:13px">粘贴之前导出的 JSON 数据：</p>
      <textarea id="import-textarea" class="share-textarea" placeholder="粘贴JSON数据..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-default" onclick="closeModal('import-modal')">取消</button>
      <button class="btn btn-primary" onclick="doImport()">导入</button>
    </div>
  </div>
</div>

<!-- Field Picker Modal -->
<div id="field-picker-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)cancelFieldPicker()">
  <div class="modal" style="max-width:600px">
    <div class="modal-header">
      <h3>选择评分维度字段</h3>
      <button class="modal-close" onclick="cancelFieldPicker()">&#215;</button>
    </div>
    <div class="modal-body">
      <p style="margin-bottom:4px;color:var(--text-secondary);font-size:13px">自动检测未能找到评分字段，请手动选择哪些列是评分维度（1-5分）：</p>
      <p id="field-picker-hint" style="margin-bottom:12px;color:var(--text-tertiary);font-size:12px"></p>
      <div id="field-picker-list" style="display:grid;grid-template-columns:1fr 1fr;gap:6px;max-height:360px;overflow-y:auto"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-default" onclick="cancelFieldPicker()">取消</button>
      <button class="btn btn-primary" onclick="confirmFieldPicker()">确认</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ===== CONSTANTS =====
const STORAGE_KEY = 'viz_batches_v7';
const PAGE_SIZES = [20, 50, 100, 200];

// ===== DYNAMIC FORMAT DETECTION =====
// Detects any CSV with "output.视频1-" prefixed score columns (new video format)
// regardless of intermediate path segments (e.g. "output.视频1-画面质量-清晰度")

// Given all header keys, find score columns: output.视频1-...  (last segment is score name)
function detectVideoFormatScoreCols(keys) {
  return keys.filter(k => /^output\.视频\d+-/.test(k) && !k.includes('整体分'));
}

// Extract short display name from a score column key
// e.g. "output.视频1-画面质量-清晰度" -> "清晰度"
//      "output.视频1-清晰度"            -> "清晰度"
function scoreColShortName(key) {
  const m = key.match(/^output\.视频\d+-(.+)$/);
  if (!m) return key;
  const parts = m[1].split('-');
  return parts[parts.length - 1];
}

// Build score map: { srcCol -> shortName }
function buildScoreMap(scoreKeys) {
  const map = {};
  scoreKeys.forEach(k => { map[k] = scoreColShortName(k); });
  return map;
}

// Parse subdim columns: "output.N分-xxx" where N is a score value
// Returns array of { srcCol, score, label } for subdim lookup
function buildSubdimColIndex(keys) {
  const result = [];
  keys.forEach(k => {
    const m = k.match(/^output\.(\d+(?:\.\d+)?)分-(.+)$/);
    if (m) result.push({ srcCol: k, score: parseFloat(m[1]), label: m[2] });
  });
  return result;
}

// ===== CSV FORMAT DETECTION =====
// Strip BOM from all keys in a row
function stripBomKeys(rows) {
  if (!rows || !rows.length) return rows;
  const bom = '\ufeff';
  return rows.map(r => {
    const out = {};
    Object.keys(r).forEach(k => {
      out[k.startsWith(bom) ? k.slice(1) : k] = r[k];
    });
    return out;
  });
}

function isNewFormat(rows) {
  if (!rows || !rows.length) return false;
  const keys = Object.keys(rows[0]);
  return detectVideoFormatScoreCols(keys).length > 0;
}

/// Heuristic: is a field value likely to be a non-score (URL, long text, large number, etc.)?
function looksLikeNonScoreValue(raw) {
  if (raw == null || raw === '') return false;
  const s = String(raw).trim();
  if (s.startsWith('http://') || s.startsWith('https://')) return true;
  if (s.length > 60) return true;
  return false;
}

// Get all candidate fields from rows (excluding internal/structural keys)
function getCandidateKeys(rows) {
  if (!rows || !rows.length) return [];
  return Object.keys(rows[0]).filter(k =>
    !k.startsWith('_') &&
    !k.endsWith('_level2') &&
    !k.endsWith('_level3') &&
    k.trim() !== ''
  );
}

function detectScoreCols(rows) {
  if (!rows || !rows.length) return { cols: [], isNew: false };
  const keys = Object.keys(rows[0]);
  const videoScoreKeys = detectVideoFormatScoreCols(keys);
  if (videoScoreKeys.length > 0) {
    // Video format: use short names as scoreCols
    const scoreMap = buildScoreMap(videoScoreKeys);
    return { cols: Object.values(scoreMap), isNew: true, scoreMap, videoScoreKeys };
  }
  // General format: find columns whose values look like scores (1-5 range)
  // Support both plain numbers and "3分-xxx" style strings
  const sampleSize = Math.min(100, rows.length);
  const sample = rows.slice(0, sampleSize);
  const candidateKeys = getCandidateKeys(rows);
  const scoreCols = candidateKeys.filter(k => {
    // Skip if any sample value looks like a non-score
    if (sample.some(r => looksLikeNonScoreValue(r[k]))) return false;
    const vals = sample
      .map(r => {
        const raw = r[k];
        if (raw == null || raw === '') return NaN;
        // Try direct parse
        const direct = parseFloat(raw);
        if (!isNaN(direct)) return direct;
        // Try extracting leading number from strings like "3分-xxx" or "3.5分"
        const m = String(raw).trim().match(/^(\d+(?:\.\d+)?)\s*分/);
        return m ? parseFloat(m[1]) : NaN;
      })
      .filter(v => !isNaN(v));
    if (vals.length < Math.max(3, sampleSize * 0.3)) return false;
    // All parsed values must be in [0.5, 5.5]
    return vals.every(v => v >= 0.5 && v <= 5.5);
  });
  return { cols: scoreCols, isNew: false };
}

function detectHasSubdim(rows) {
  if (!rows || !rows.length) return false;
  const keys = Object.keys(rows[0]);
  return keys.some(k => k.endsWith('_level2') || k.endsWith('_level3'));
}


function extractScore(val) {
    if (val == null || val === '') return '';
    const s = String(val).trim();
    const m = s.match(/^(\d+(?:\.\d+)?)\s*分/);
    return m ? m[1] : s;
}

// ===== NORMALIZE ROWS =====
// For video format: dynamically build short-name score fields and L2/L3 subdim fields
function normalizeRows(rawRows, isNew, scoreMap, subdimColIndex) {
  if (!isNew) {
    return rawRows;
  }
  // scoreMap: { srcCol -> shortName }, subdimColIndex: [{srcCol, score, label}]
  return rawRows.map((raw) => {
    const row = {};
    // Copy all non-score cols (meta, passthrough, etc.)
    Object.keys(raw).forEach(k => {
      if (!(k in (scoreMap || {}))) row[k] = raw[k];
    });
    // Score cols: extract numeric value, store under short name
    Object.entries(scoreMap || {}).forEach(([srcCol, shortName]) => {
      const val = raw[srcCol] != null ? raw[srcCol] : '';
      row[shortName] = extractScore(val);
    });
    // L2/L3 subdim extraction
    // For each score col, the L2 is the label after "N分-" in the value
    // L3 comes from the matching "output.N分-L2label" column
    Object.entries(scoreMap || {}).forEach(([srcCol, shortName]) => {
      const rawVal = String(raw[srcCol] || '').trim();
      if (!rawVal) return;
      const scoreMatch = rawVal.match(/^(\d+(?:\.\d+)?)分-(.+)$/);
      if (!scoreMatch) return;
      const scoreNum = parseFloat(scoreMatch[1]);
      const l2Label = scoreMatch[2].trim();
      row[shortName + '_level2'] = l2Label;
      // Find L3 column: subdim col that matches this score number
      // There may be multiple subdim cols at this score level; find by score match
      if (subdimColIndex) {
        const subdimCols = subdimColIndex.filter(s => s.score === scoreNum);
        // Try to find the one whose label matches l2Label, or just use all at this score
        let l3Parts = [];
        subdimCols.forEach(s => {
          const subVal = String(raw[s.srcCol] || '').trim();
          if (!subVal) return;
          subVal.split(';').forEach(seg => {
            seg = seg.trim();
            if (!seg) return;
            // Format: "key:label" or just "label"
            const label = seg.includes(':') ? seg.split(':').slice(1).join(':').trim() : seg;
            if (label) l3Parts.push(label);
          });
        });
        if (l3Parts.length) row[shortName + '_level3'] = l3Parts.join('；');
      }
    });
    row._isNewFormat = true;
    return row;
  });
}

// ===== SCORE CALCULATION =====
function parseScoreVal(v) {
  if (v == null || v === '') return NaN;
  const n = parseFloat(v);
  if (!isNaN(n)) return n;
  // Handle "3分-xxx" style strings
  const m = String(v).trim().match(/^(\d+(?:\.\d+)?)\s*分/);
  return m ? parseFloat(m[1]) : NaN;
}

function calcOverallScore(row, scoreCols, isNewFmt) {
  const vals = {};
  scoreCols.forEach(c => { vals[c] = parseScoreVal(row[c]); });
  const all = scoreCols.map(c => vals[c]).filter(v => !isNaN(v));
  if (all.length === 0) return NaN;
  if (!isNewFmt) {
    return parseFloat((all.reduce((a,b)=>a+b,0)/all.length).toFixed(2));
  }
  // Video format: apply quality rules using fuzzy col name matching
  // Find cols by keyword matching to support different naming conventions
  const findVal = (...keywords) => {
    const col = scoreCols.find(c => keywords.some(kw => c.includes(kw)));
    return col ? vals[col] : NaN;
  };
  const qd = findVal('清晰度');
  const cq = findVal('内容质量', '内容');
  const ae = findVal('美学');
  const db = findVal('动态基础', '基础质量');
  const ds = findVal('动态强度', '动态强');
  // If we can find all 5 key dims, use rule-based scoring
  if ([qd,cq,ae,db,ds].every(v => !isNaN(v))) {
    if(all.some(x=>x===1)) return 1.00;
    if(all.every(x=>x>=4) && all.filter(x=>x>=5).length>=2) return 5.00;
    if([qd,ae,db,ds].every(x=>x>=3.5) && [db,ds].some(x=>x>=4) && cq>=3) return 4.00;
    if(all.every(x=>x>=3) && [ae,db,ds].some(x=>x>=3.5)) return 3.50;
    if(qd>=3 && cq>=3 && ae>=2 && db>=2 && ds>=2) return 3.00;
    if([qd,cq].some(x=>x===2.5) && ae>=2 && db>=2 && ds>=2) return 2.50;
    if([qd,cq].some(x=>x===2) && ae>=2 && db>=2 && ds>=2) return 2.00;
  }
  // Fallback: weighted average; any score of 1 pulls overall to 1
  if (all.some(x => x === 1)) return 1.00;
  return parseFloat((all.reduce((a,b)=>a+b,0)/all.length).toFixed(2));
}

function getScoreClass(v) {
  if (isNaN(v)) return '';
  if (v >= 3.5) return 'score-high';
  if (v >= 2.5) return 'score-mid';
  return 'score-low';
}

// ===== FILENAME -> TIME =====
function extractTimeFromFilename(name) {
  const base = name.replace(/\.[^.]+$/, '').trim();
  const zhMatch = base.match(/(\d{4})年(\d{1,2})月/);
  if (zhMatch) return `${zhMatch[1]}年${parseInt(zhMatch[2])}月`;
  const m1 = base.match(/(\d{4})[-_](\d{1,2})(?!\d)/);
  if (m1) return `${m1[1]}年${parseInt(m1[2])}月`;
  const m2 = base.match(/^(\d{4})(\d{2})$/);
  if (m2) return `${m2[1]}年${parseInt(m2[2])}月`;
  const mq = base.match(/(\d{4})[\s_-]?Q(\d)/i);
  if (mq) return `${mq[1]}年Q${mq[2]}`;
  const md = base.match(/(\d{4})[-_](\d{2})[-_](\d{2})/);
  if (md) return `${md[1]}-${md[2]}-${md[3]}`;
  return base.slice(0, 30) || new Date().toISOString().slice(0, 10);
}

// ===== CSV UPLOAD =====
function handleFiles(files) {
  Array.from(files).forEach(file => {
    if (!file.name.endsWith('.csv')) {
      showToast(`${file.name} 不是CSV文件`, 'error');
      return;
    }
    Papa.parse(file, {
      header: true,
      skipEmptyLines: true,
      complete(result) {
        const rawRows = stripBomKeys(result.data);
        if (!rawRows.length) { showToast('CSV 文件为空', 'error'); return; }
        const { cols: detectedCols, isNew, scoreMap, videoScoreKeys } = detectScoreCols(rawRows);
        // Build subdim col index for video format
        const subdimColIndex = isNew ? buildSubdimColIndex(Object.keys(rawRows[0])) : null;
        const finalizeImport = (finalCols) => {
          const normalizedRows = normalizeRows(rawRows, isNew, scoreMap, subdimColIndex);
          const hasSubdim = detectHasSubdim(normalizedRows);
          const time = extractTimeFromFilename(file.name);
          const batchName = file.name.replace(/\.csv$/i, '');
          const batch = {
            id: genId(),
            name: batchName,
            time: time,
            rows: normalizedRows,
            scoreCols: finalCols,
            isNewFormat: isNew,
            hasSubdim: hasSubdim
          };
          batches.unshift(batch);
          activeBatchId = batch.id;
          chartFilter = null;
          distFilters = [];
          sortConfig = { col: null, dir: 'asc' };
          searchQuery = '';
          currentPage = 1;
          saveState();
          renderAll();
          showToast(`已加载 ${normalizedRows.length} 条数据 (${isNew ? '新格式' : '通用格式'}${finalCols.length ? '，' + finalCols.length + '个维度' : ''})`, 'success');
        };

        if (isNew) {
          finalizeImport(detectedCols);
        } else if (detectedCols.length > 0) {
          finalizeImport(detectedCols);
        } else {
          // Auto-detect failed: show field picker
          showFieldPicker(
            rawRows,
            [],
            `"${file.name}" 未能自动识别评分字段，请手动选择哪些列是评分维度（值应为 1-5 的数字）`,
            (selectedCols) => {
              if (!selectedCols.length) {
                showToast('未选择任何评分字段，批次已跳过', 'error');
                return;
              }
              finalizeImport(selectedCols);
            }
          );
        }
      },
      error(err) {
        showToast(`解析失败: ${err.message}`, 'error');
      }
    });
  });
}

  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function selectBatch(id) {
  if (activeBatchId === id) return;
  activeBatchId = id;
  chartFilter = null;
  distFilters = [];
  distFilterExpandedCol = null;
  distFilterExpandedL2 = null;
  sortConfig = { col: null, dir: 'asc' };
  searchQuery = '';
  currentPage = 1;
  expandedRows.clear();
  renderAll();
}

function deleteBatch(id, e) {
  e && e.stopPropagation();
  batches = batches.filter(b => b.id !== id);
  if (activeBatchId === id) {
    activeBatchId = batches.length ? batches[0].id : null;
  }
  chartFilter = null;
  distFilters = [];
  currentPage = 1;
  saveState();
  renderAll();
  showToast('批次已删除');

function editBatchName(id, e) {
  e.stopPropagation();
  const b = batches.find(x => x.id === id);
  if (!b) return;
  const el = document.getElementById('bname-' + id);
  const cur = b.name;
  el.innerHTML = `<input class="batch-name-edit" value="${escHtml(cur)}" id="edit-input-${id}" onclick="event.stopPropagation()">`;
  const inp = document.getElementById('edit-input-' + id);
  inp.focus(); inp.select();
  function done() {
    const nv = inp.value.trim() || cur;
    b.name = nv;
    saveState();
    renderSidebar();
  }
  inp.addEventListener('blur', done);
  inp.addEventListener('keydown', ev => { if (ev.key === 'Enter') done(); if (ev.key === 'Escape') { renderSidebar(); } });

function buildContentHTML(batch) {
  const rows = batch.rows;
  const scoreCols = batch.scoreCols;
  const scores = rows.map(r => calcOverallScore(r, scoreCols, batch.isNewFormat)).filter(v => !isNaN(v));
  const avg = scores.length ? (scores.reduce((a,b)=>a+b,0)/scores.length) : 0;
  const lowCount = scores.filter(v => v < 3).length;
  const highCount = scores.filter(v => v >= 4).length;
  const lowRate = scores.length ? (lowCount / scores.length * 100) : 0;
  const highRate = scores.length ? (highCount / scores.length * 100) : 0;

  // Build dim stats
  const dimStats = scoreCols.map(col => {
    const vals = rows.map(r => parseFloat(r[col])).filter(v => !isNaN(v));
    const colAvg = vals.length ? (vals.reduce((a,b)=>a+b,0)/vals.length) : 0;
    return { col, avg: colAvg.toFixed(2) };
  });

  // Format badge
  const fmtBadge = batch.isNewFormat
    ? '<span class="tag tag-new">新格式</span>'
    : '<span class="tag tag-old">老格式</span>';

  return `
  <!-- Batch Header -->
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap">
    <h2 style="font-size:18px;font-weight:700;color:var(--text)">${escHtml(batch.name)}</h2>
    ${fmtBadge}
    <span class="tag">${batch.time || '未知时间'}</span>
    <span class="tag">${rows.length} 条数据</span>
    <button class="btn btn-default btn-sm" style="margin-left:auto" onclick="openDimConfig('${batch.id}')">配置评分维度</button>
  </div>

  <!-- Stat Cards -->
  <div class="stat-grid">
    <div class="stat-card">
      <div class="stat-card-label">&#128200; 数据总量</div>
      <div class="stat-card-value">${rows.length}</div>
      <div class="stat-card-sub">条记录</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-label">&#9733; 平均综合分</div>
      <div class="stat-card-value ${avg >= 3.5 ? 'good' : avg >= 2.5 ? 'warn' : 'bad'}">${avg.toFixed(2)}</div>
      <div class="stat-card-sub">满分5分</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-label">&#9660; 低分率（&lt;3）</div>
      <div class="stat-card-value ${lowRate > 30 ? 'bad' : lowRate > 15 ? 'warn' : 'good'}">${lowRate.toFixed(1)}%</div>
