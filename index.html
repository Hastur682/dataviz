<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数据质量可视化平台 v7</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #1677ff;
  --primary-hover: #4096ff;
  --primary-active: #0958d9;
  --success: #52c41a;
  --warning: #faad14;
  --error: #ff4d4f;
  --bg: #f5f7fa;
  --card-bg: #ffffff;
  --border: #f0f0f0;
  --text: #1f1f1f;
  --text-secondary: #8c8c8c;
  --text-tertiary: #bfbfbf;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.03), 0 4px 12px rgba(0,0,0,0.06);
  --radius: 8px;
  --radius-sm: 6px;
  --sidebar-w: 240px;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5714; }

/* ===== TOPBAR ===== */
#topbar {
  position: fixed; top: 0; left: 0; right: 0; height: 52px;
  background: #fff; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 24px;
  z-index: 100; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
#topbar .logo { font-size: 16px; font-weight: 700; color: var(--primary); letter-spacing: -0.3px; }
#topbar .logo span { color: var(--text-secondary); font-weight: 400; font-size: 13px; margin-left: 8px; }
.topbar-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }

/* ===== LAYOUT ===== */
#app-wrap {
  display: flex;
  margin-top: 52px;
  height: calc(100vh - 52px);
  overflow: hidden;
}
#sidebar {
  width: var(--sidebar-w);
  background: #fff;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
}
#main-scroll {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  background: var(--bg);
}
#main-area {
  padding: 20px;
  min-height: 100%;
}

/* ===== SIDEBAR ===== */
.sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.sidebar-header h2 { font-size: 13px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
.sidebar-list { flex: 1; overflow-y: auto; padding: 8px; }
.batch-item {
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  margin-bottom: 2px;
  display: flex;
  align-items: flex-start;
  gap: 8px;
  transition: background 0.15s;
  border: 1px solid transparent;
}
.batch-item:hover { background: #f5f7fa; }
.batch-item.active {
  background: #e8f4ff;
  border-color: #bae0ff;
}
.batch-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--primary); margin-top: 5px; flex-shrink: 0;
}
.batch-item.active .batch-dot { background: var(--primary); }
.batch-info { flex: 1; min-width: 0; }
.batch-name { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.batch-meta { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }
.batch-del {
  width: 20px; height: 20px; border-radius: 4px; border: none;
  background: transparent; cursor: pointer; color: var(--text-tertiary);
  display: flex; align-items: center; justify-content: center; font-size: 14px;
  opacity: 0; transition: opacity 0.15s, color 0.15s, background 0.15s; flex-shrink: 0;
}
.batch-item:hover .batch-del { opacity: 1; }
.batch-del:hover { color: var(--error); background: #fff1f0; }
.sidebar-footer { padding: 12px 8px; border-top: 1px solid var(--border); }

/* ===== DROP ZONE ===== */
#drop-zone {
  border: 2px dashed #d9d9d9; border-radius: var(--radius);
  padding: 24px 16px; text-align: center; cursor: pointer;
  transition: border-color 0.2s, background 0.2s; background: transparent;
}
#drop-zone:hover, #drop-zone.dragover { border-color: var(--primary); background: #e8f4ff; }
#drop-zone .drop-icon { font-size: 24px; color: var(--text-tertiary); display: block; margin-bottom: 8px; }
#drop-zone p { font-size: 12px; color: var(--text-secondary); line-height: 1.6; }
#drop-zone input[type=file] { display: none; }

/* ===== EMPTY STATE ===== */
#empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 400px; text-align: center; padding: 40px;
}
#empty-state .empty-icon { font-size: 48px; color: var(--text-tertiary); margin-bottom: 16px; }
#empty-state h3 { font-size: 16px; color: var(--text); margin-bottom: 8px; }
#empty-state p { font-size: 14px; color: var(--text-secondary); }

/* ===== STAT CARDS ===== */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 16px; }
.stat-card {
  background: var(--card-bg); border-radius: var(--radius);
  border: 1px solid var(--border); padding: 16px;
  box-shadow: var(--shadow-sm); transition: box-shadow 0.2s;
}
.stat-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
.stat-card-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; display: flex; align-items: center; gap: 4px; }
.stat-card-value { font-size: 28px; font-weight: 700; line-height: 1.2; color: var(--text); }
.stat-card-sub { font-size: 11px; color: var(--text-tertiary); margin-top: 4px; }
.stat-card-value.good { color: var(--success); }
.stat-card-value.warn { color: var(--warning); }
.stat-card-value.bad { color: var(--error); }

/* ===== CARDS ===== */
.card {
  background: var(--card-bg); border-radius: var(--radius);
  border: 1px solid var(--border); box-shadow: var(--shadow-sm);
  margin-bottom: 16px; overflow: hidden;
}
.card-header {
  padding: 14px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
}
.card-header h3 { font-size: 15px; font-weight: 600; color: var(--text); flex-shrink: 0; }
.card-header-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.card-body { padding: 16px 20px; }

/* ===== CHARTS ===== */
.charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.chart-wrap { position: relative; height: 240px; }
canvas { display: block; }

/* ===== TREND ===== */
.trend-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.trend-metric-btns { display: flex; gap: 4px; flex-wrap: wrap; }
.metric-btn {
  padding: 3px 10px; font-size: 12px; border-radius: 100px;
  border: 1px solid var(--border); background: #fff;
  cursor: pointer; color: var(--text-secondary);
  transition: all 0.15s; white-space: nowrap;
}
.metric-btn:hover { border-color: var(--primary); color: var(--primary); }
.metric-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }
.trend-chart-wrap { height: 260px; }

/* ===== BATCH SELECTOR ===== */
.batch-selector-wrap { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
.batch-sel-label { font-size: 12px; color: var(--text-secondary); white-space: nowrap; }
.batch-sel-btn {
  padding: 2px 8px; font-size: 11px; border-radius: 4px;
  border: 1px solid var(--border); background: #fff;
  cursor: pointer; color: var(--text-secondary);
  transition: all 0.15s; white-space: nowrap;
}
.batch-sel-btn:hover { border-color: var(--primary); color: var(--primary); }
.batch-sel-btn.selected { background: #e8f4ff; border-color: #bae0ff; color: var(--primary); }

/* ===== TABLE SECTION ===== */
#table-section { margin-bottom: 0; }
.table-toolbar {
  padding: 12px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.search-input {
  padding: 5px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-size: 13px; color: var(--text); outline: none; width: 200px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(22,119,255,0.1); }
.filter-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 8px; background: #e8f4ff; border: 1px solid #bae0ff;
  border-radius: 4px; font-size: 12px; color: var(--primary); cursor: pointer;
}
.filter-badge:hover { background: #bae0ff; }

.table-scroll { overflow-x: auto; overflow-y: auto; max-height: 500px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; white-space: nowrap; }
thead th {
  padding: 10px 12px; background: #fafafa; border-bottom: 1px solid var(--border);
  font-weight: 600; color: var(--text-secondary); text-align: left;
  position: sticky; top: 0; z-index: 2; cursor: pointer; user-select: none;
  white-space: nowrap;
}
thead th:hover { background: #f0f0f0; color: var(--text); }
thead th .sort-icon { font-size: 11px; color: var(--text-tertiary); }
thead th.sorted { color: var(--primary); }
thead th.sorted .sort-icon { color: var(--primary); }
tbody tr { transition: background 0.1s; }
tbody tr:hover { background: #f5f7fa; }
tbody tr.highlighted { background: #fff7e6; }
tbody td { padding: 9px 12px; border-bottom: 1px solid var(--border); color: var(--text); }
tbody td:last-child, thead th:last-child { border-right: none; }
.score-cell { font-weight: 600; }
.score-high { color: var(--success); }
.score-mid { color: var(--warning); }
.score-low { color: var(--error); }
.expand-btn {
  padding: 1px 6px; border: 1px solid var(--border); border-radius: 4px;
  background: #fafafa; cursor: pointer; font-size: 11px; color: var(--text-secondary);
  transition: all 0.15s;
}
.expand-btn:hover { border-color: var(--primary); color: var(--primary); background: #e8f4ff; }
.subdim-row { background: #fafafa !important; }
.subdim-row td { font-size: 12px; color: var(--text-secondary); }
.subdim-table { width: 100%; border-collapse: collapse; }
.subdim-table td { padding: 4px 8px; border-bottom: 1px solid #f0f0f0; }

.pagination {
  padding: 10px 20px; border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
  flex-wrap: wrap;
}
.pagination span { font-size: 13px; color: var(--text-secondary); }
.pg-btn {
  padding: 3px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: #fff; cursor: pointer; font-size: 13px; color: var(--text);
  transition: all 0.15s;
}
.pg-btn:hover:not(:disabled) { border-color: var(--primary); color: var(--primary); }
.pg-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.pg-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }
.pg-size-sel {
  padding: 3px 8px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: #fff; font-size: 13px; color: var(--text); cursor: pointer; outline: none;
}
.pg-size-sel:focus { border-color: var(--primary); }

/* ===== BUTTONS ===== */
.btn {
  padding: 6px 14px; border-radius: var(--radius-sm); border: 1px solid;
  font-size: 13px; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 4px; white-space: nowrap;
}
.btn-primary { background: var(--primary); border-color: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
.btn-default { background: #fff; border-color: var(--border); color: var(--text); }
.btn-default:hover { border-color: var(--primary); color: var(--primary); }
.btn-sm { padding: 3px 8px; font-size: 12px; }
.btn-danger { background: #fff1f0; border-color: #ffa39e; color: var(--error); }
.btn-danger:hover { background: #ff4d4f; border-color: #ff4d4f; color: #fff; }

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 1000;
  display: flex; align-items: center; justify-content: center;
}
.modal {
  background: #fff; border-radius: var(--radius); box-shadow: 0 6px 40px rgba(0,0,0,0.15);
  max-width: 520px; width: 90%; max-height: 90vh; overflow-y: auto;
}
.modal-header {
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-header h3 { font-size: 16px; font-weight: 600; }
.modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-tertiary); padding: 2px; }
.modal-close:hover { color: var(--text); }
.modal-body { padding: 20px; }
.modal-footer { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }

/* ===== SHARE MODAL ===== */
.share-textarea {
  width: 100%; height: 200px; padding: 10px; border: 1px solid var(--border);
  border-radius: var(--radius-sm); font-size: 12px; font-family: monospace;
  resize: vertical; outline: none;
}
.share-textarea:focus { border-color: var(--primary); }

/* ===== TOAST ===== */
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #333; color: #fff; padding: 10px 20px; border-radius: var(--radius-sm);
  font-size: 14px; z-index: 9999; opacity: 0; pointer-events: none;
  transition: opacity 0.2s; max-width: 400px; text-align: center;
}
#toast.show { opacity: 1; }
#toast.success { background: var(--success); }
#toast.error { background: var(--error); }

/* ===== MISC ===== */
.section-title { font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
.no-data { text-align: center; padding: 40px; color: var(--text-tertiary); font-size: 14px; }
a { color: var(--primary); text-decoration: none; }
a:hover { text-decoration: underline; }
.tag {
  display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 11px;
  background: #f0f0f0; color: var(--text-secondary); margin: 1px;
}
.tag-new { background: #e8f4ff; color: var(--primary); }
.tag-old { background: #f6ffed; color: var(--success); }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #d9d9d9; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #bfbfbf; }

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  #sidebar { width: 200px; }
  .charts-row { grid-template-columns: 1fr; }
  .stat-grid { grid-template-columns: repeat(2, 1fr); }
}

/* ===== LOADING ===== */
.loading { display: flex; align-items: center; justify-content: center; padding: 40px; gap: 8px; color: var(--text-secondary); font-size: 14px; }
.spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* batch name editing */
.batch-name-edit {
  font-size: 13px; border: 1px solid var(--primary); border-radius: 4px;
  padding: 1px 4px; width: 100%; outline: none; color: var(--text);
}
</style>
</head>
<body>

<div id="topbar">
  <div class="logo">DataQuality <span>可视化平台</span></div>
  <div class="topbar-actions">
    <button class="btn btn-default btn-sm" onclick="showShareModal()">导出分享版</button>
    <button class="btn btn-default btn-sm" onclick="clearAllData()">清空全部数据</button>
  </div>
</div>

<div id="app-wrap">
  <div id="sidebar">
    <div class="sidebar-header">
      <h2>批次列表</h2>
      <span id="batch-count" style="font-size:12px;color:var(--text-secondary)">0个</span>
    </div>
    <div class="sidebar-list" id="batch-list"></div>
    <div class="sidebar-footer">
      <div id="drop-zone">
        <span class="drop-icon">&#8686;</span>
        <p>拖放 CSV 文件<br>或点击上传</p>
        <input type="file" id="file-input" accept=".csv" multiple>
      </div>
    </div>
  </div>

  <div id="main-scroll">
    <div id="main-area">
      <div id="content-root"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- Share Modal -->
<div id="share-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal('share-modal')">
  <div class="modal">
    <div class="modal-header">
      <h3>导出分享版</h3>
      <button class="modal-close" onclick="closeModal('share-modal')">&#215;</button>
    </div>
    <div class="modal-body">
      <p style="margin-bottom:12px;color:var(--text-secondary);font-size:13px">将当前所有批次数据打包为 JSON，可导入到另一台设备。</p>
      <textarea id="share-textarea" class="share-textarea" readonly placeholder="生成中..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-default" onclick="closeModal('share-modal')">关闭</button>
      <button class="btn btn-primary" onclick="copyShareData()">复制到剪贴板</button>
      <button class="btn btn-primary" onclick="downloadShareData()">下载 JSON</button>
    </div>
  </div>
</div>

<!-- Import Modal -->
<div id="import-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal('import-modal')">
  <div class="modal">
    <div class="modal-header">
      <h3>导入数据</h3>
      <button class="modal-close" onclick="closeModal('import-modal')">&#215;</button>
    </div>
    <div class="modal-body">
      <p style="margin-bottom:12px;color:var(--text-secondary);font-size:13px">粘贴之前导出的 JSON 数据：</p>
      <textarea id="import-textarea" class="share-textarea" placeholder="粘贴JSON数据..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-default" onclick="closeModal('import-modal')">取消</button>
      <button class="btn btn-primary" onclick="doImport()">导入</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ===== CONSTANTS =====
const STORAGE_KEY = 'viz_batches_v7';
const PAGE_SIZES = [20, 50, 100, 200];

// New format detection prefix
const NEW_FORMAT_PREFIX = 'output.视频1-';
const NEW_FORMAT_SCORE_MAP = {
  'output.视频1-清晰度': '清晰度',
  'output.视频1-内容质量': '内容质量',
  'output.视频1-美学质量': '美学质量',
  'output.视频1-动态基础质量': '动态基础质量',
  'output.视频1-动态强度': '动态强度'
};
const NEW_FORMAT_KEYS = Object.keys(NEW_FORMAT_SCORE_MAP);
const NEW_FORMAT_VALS = Object.values(NEW_FORMAT_SCORE_MAP);

const NEW_FORMAT_SUBDIM_MAP = {
    '清晰度': [
        { score:'极低清视频', srcCol:'output.1分-极低清视频' },
        { score:'低清视频', srcCol:'output.2分-低清视频' },
        { score:'中低清视频', srcCol:'output.2.5分-中低清视频' },
        { score:'正常清晰度', srcCol:null },
        { score:'中高清视频', srcCol:null },
        { score:'高清视频', srcCol:null },
    ],
    '内容质量': [
        { score:'严重的基础质量问题', srcCol:'output.1分-严重的基础质量问题' },
        { score:'中度基础质量问题', srcCol:'output.2分-中度基础质量问题' },
        { score:'画面内容存在瑕疵', srcCol:'output.2.5分-画面内容存在瑕疵' },
        { score:'画面内容基本合理，内容质量一般', srcCol:null },
        { score:'中高内容质量', srcCol:null },
        { score:'内容质量较高', srcCol:null },
    ],
    '美学质量': [
        { score:'画面无美感', srcCol:'output.1分-画面无美感' },
        { score:'画面美感较差', srcCol:'output.2分-画面美感较差' },
        { score:'中低画面美感', srcCol:'output.2.5分-中低画面美感' },
        { score:'画面美感正常', srcCol:null },
        { score:'中高画面美感', srcCol:null },
        { score:'画面美感较好，优质创作', srcCol:null },
    ],
    '动态基础质量': [
        { score:'基础质量不合格', srcCol:'output.1分-基础质量不合格' },
        { score:'中低动态基础质量', srcCol:'output.2分-中低动态基础质量' },
        { score:'存在运动瑕疵', srcCol:'output.2.5分-存在运动瑕疵' },
        { score:'正常动态', srcCol:null },
        { score:'正常动态增强', srcCol:null },
        { score:'复杂动态', srcCol:null },
    ],
    '动态强度': [
        { score:'无动态', srcCol:'output.1分-无动态' },
        { score:'低动态', srcCol:'output.2分-低动态' },
        { score:'中低动态', srcCol:'output.2.5分-中低动态' },
        { score:'正常动态', srcCol:null },
        { score:'正常动态增强', srcCol:null },
        { score:'高动态', srcCol:null },
    ],
};
const NEW_FORMAT_META_COLS = ['任务编号','题包key','任务明细ID','题目ID','标注人','标注时间','是否有效','无效原因','无效标签'];

};

const NEW_VIDEO_FIELD = 'input.视频链接';

// ===== STORAGE =====
function saveState() {

// ===== CSV FORMAT DETECTION =====
// Strip BOM from all keys in a row
function stripBomKeys(rows) {
  if (!rows || !rows.length) return rows;
  const bom = '\ufeff';
  return rows.map(r => {
    const out = {};
    Object.keys(r).forEach(k => {
      out[k.startsWith(bom) ? k.slice(1) : k] = r[k];
    });
    return out;
  });
}

function isNewFormat(rows) {
  if (!rows || !rows.length) return false;
  const keys = Object.keys(rows[0]);
  // Check with and without BOM
  const bom = '\ufeff';
  return NEW_FORMAT_KEYS.some(k =>
    keys.includes(k) || keys.includes(bom + k)
  );
}

function detectScoreCols(rows) {
  if (!rows || !rows.length) return { cols: [], isNew: false };
  if (isNewFormat(rows)) {
    return { cols: NEW_FORMAT_VALS.slice(), isNew: true };
  }
  // Old format: find columns whose values look like scores (1-5 range)
  // Support both plain numbers and "3分-xxx" style strings
  const sampleSize = Math.min(100, rows.length);
  const sample = rows.slice(0, sampleSize);
  const keys = Object.keys(rows[0]).filter(k =>
    !k.startsWith('_') &&
    !k.endsWith('_level2') &&
    !k.endsWith('_level3') &&
    k.trim() !== '' &&
    !/^(input\.|output\.)/.test(k)
  );
  const scoreCols = keys.filter(k => {
    const vals = sample
      .map(r => {
        const raw = r[k];
        if (raw == null || raw === '') return NaN;
        // Try direct parse
        const direct = parseFloat(raw);
        if (!isNaN(direct)) return direct;
        // Try extracting leading number from strings like "3分-xxx" or "3.5分"
        const m = String(raw).trim().match(/^(\d+(?:\.\d+)?)\s*分/);
        return m ? parseFloat(m[1]) : NaN;
      })
      .filter(v => !isNaN(v));
    if (vals.length < Math.max(3, sampleSize * 0.3)) return false;
    // All parsed values must be in [0.5, 5.5]
    return vals.every(v => v >= 0.5 && v <= 5.5);
  });
  return { cols: scoreCols, isNew: false };
}

function detectHasSubdim(rows) {
  if (!rows || !rows.length) return false;
  const keys = Object.keys(rows[0]);
  return keys.some(k => k.endsWith('_level2') || k.endsWith('_level3'));
}


function extractScore(val) {
    if (val == null || val === '') return '';
    const s = String(val).trim();
    const m = s.match(/^(\d+(?:\.\d+)?)\s*分/);
    return m ? m[1] : s;
}

// ===== NORMALIZE ROWS =====
function normalizeRows(rawRows, isNew) {
  if (!isNew) {
    // For old format: no structural changes needed, but return as-is
    // (detectScoreCols already handles extractScore-style values in calcOverallScore)
    return rawRows;
  }
  return rawRows.map((raw) => {
    const row = {};
    // Copy meta cols
    NEW_FORMAT_META_COLS.forEach(col => { if (col in raw) row[col] = raw[col]; });
    NEW_FORMAT_PASSTHROUGH_COLS.forEach(col => { if (col in raw) row[col] = raw[col]; });
    Object.entries(NEW_FORMAT_PASSTHROUGH_RENAME).forEach(([src, dst]) => { if (src in raw) row[dst] = raw[src]; });
    // Score cols with extractScore
    Object.entries(NEW_FORMAT_SCORE_MAP).forEach(([srcCol, dstCol]) => {
        // BOM already stripped by stripBomKeys, but keep fallback
        const bom = '\ufeff';
        const val = raw[srcCol] != null ? raw[srcCol] : (raw[bom + srcCol] != null ? raw[bom + srcCol] : null);
        row[dstCol] = extractScore(val != null ? val : '');
    });
    // Subdim extraction
    Object.entries(NEW_FORMAT_SUBDIM_MAP).forEach(([dim, tiers]) => {
        const mainSrcCol = Object.entries(NEW_FORMAT_SCORE_MAP).find(([,d]) => d === dim)?.[0];
        const mainRaw = mainSrcCol ? String(raw[mainSrcCol] || '').trim() : '';
        const mainLabel = mainRaw.replace(/^\d+(?:\.\d+)?分-/, '').trim();
        const l2Val = mainLabel || '';
        let l3Vals = [];
        if (l2Val) {
            const tierDef = tiers.find(t => t.score === l2Val);
            if (tierDef && tierDef.srcCol) {
                const srcVal = String(raw[tierDef.srcCol] || '').trim();
                if (srcVal) {
                    srcVal.split(';').forEach(seg => {
                        const label = seg.replace(/^[^:]+:/, '').trim();
                        if (label) l3Vals.push(label);
                    });
                }
            }
            row[dim + '_level2'] = l2Val;
            if (l3Vals.length > 0) row[dim + '_level3'] = l3Vals.join('；');
        }
    });
    row._isNewFormat = true;
    return row;
  });
}

// ===== SCORE CALCULATION =====
function parseScoreVal(v) {
  if (v == null || v === '') return NaN;
  const n = parseFloat(v);
  if (!isNaN(n)) return n;
  // Handle "3分-xxx" style strings
  const m = String(v).trim().match(/^(\d+(?:\.\d+)?)\s*分/);
  return m ? parseFloat(m[1]) : NaN;
}

function calcOverallScore(row, scoreCols, isNewFmt) {
  const vals = {};
  scoreCols.forEach(c => { vals[c] = parseScoreVal(row[c]); });
  const all = scoreCols.map(c => vals[c]).filter(v => !isNaN(v));
  if (all.length === 0) return NaN;
  if (!isNewFmt) {
    // Old format: simple average
    return parseFloat((all.reduce((a,b)=>a+b,0)/all.length).toFixed(2));
  }
  // New format: use original complex rules
  const qd=vals['清晰度'], cq=vals['内容质量'], ae=vals['美学质量'], db=vals['动态基础质量'], ds=vals['动态强度'];
  if(all.some(x=>x===1)) return 1.00;
  if(all.every(x=>x>=4) && all.filter(x=>x>=5).length>=2) return 5.00;
  if([qd,ae,db,ds].every(x=>x>=3.5) && [db,ds].some(x=>x>=4) && cq>=3) return 4.00;
  if(all.every(x=>x>=3) && [ae,db,ds].some(x=>x>=3.5)) return 3.50;
  if(qd>=3 && cq>=3 && ae>=2 && db>=2 && ds>=2) return 3.00;
  if([qd,cq].some(x=>x===2.5) && ae>=2 && db>=2 && ds>=2) return 2.50;
  if([qd,cq].some(x=>x===2) && ae>=2 && db>=2 && ds>=2) return 2.00;
  return parseFloat((all.reduce((a,b)=>a+b,0)/all.length).toFixed(2));
}

function getScoreClass(v) {
  if (isNaN(v)) return '';
  if (v >= 3.5) return 'score-high';
  if (v >= 2.5) return 'score-mid';
  return 'score-low';
}

// ===== FILENAME -> TIME =====
function extractTimeFromFilename(name) {
  const base = name.replace(/\.[^.]+$/, '').trim();
  const zhMatch = base.match(/(\d{4})年(\d{1,2})月/);
  if (zhMatch) return `${zhMatch[1]}年${parseInt(zhMatch[2])}月`;
  const m1 = base.match(/(\d{4})[-_](\d{1,2})(?!\d)/);
  if (m1) return `${m1[1]}年${parseInt(m1[2])}月`;
  const m2 = base.match(/^(\d{4})(\d{2})$/);
  if (m2) return `${m2[1]}年${parseInt(m2[2])}月`;
  const mq = base.match(/(\d{4})[\s_-]?Q(\d)/i);
  if (mq) return `${mq[1]}年Q${mq[2]}`;
  const md = base.match(/(\d{4})[-_](\d{2})[-_](\d{2})/);
  if (md) return `${md[1]}-${md[2]}-${md[3]}`;
  return base.slice(0, 30) || new Date().toISOString().slice(0, 10);
}

// ===== CSV UPLOAD =====
function handleFiles(files) {
  Array.from(files).forEach(file => {
    if (!file.name.endsWith('.csv')) {
      showToast(`${file.name} 不是CSV文件`, 'error');
      return;
    }
    Papa.parse(file, {
      header: true,
      skipEmptyLines: true,
      complete(result) {
        const rawRows = stripBomKeys(result.data);
        if (!rawRows.length) { showToast('CSV 文件为空', 'error'); return; }
        const { cols: detectedCols, isNew } = detectScoreCols(rawRows);
        const finalCols = isNew ? NEW_FORMAT_VALS.slice() : detectedCols;
        const normalizedRows = normalizeRows(rawRows, isNew);
        const hasSubdim = detectHasSubdim(normalizedRows);
        const time = extractTimeFromFilename(file.name);
        const batchName = file.name.replace(/\.csv$/i, '');
        if (!finalCols.length) {
          // Fallback: show all non-special columns as potential score cols in table
          console.warn('[detectScoreCols] No score columns detected. Keys:', Object.keys(rawRows[0]));
          showToast(`警告：未识别到评分列，将展示全部字段。请检查CSV格式。`, 'warn', 4000);
        }
        const batch = {
          id: genId(),
          name: batchName,
          time: time,
          rows: normalizedRows,
          scoreCols: finalCols,
          isNewFormat: isNew,
          hasSubdim: hasSubdim
        };
        batches.unshift(batch);
        activeBatchId = batch.id;
        chartFilter = null;
        sortConfig = { col: null, dir: 'asc' };
        searchQuery = '';
        currentPage = 1;
        saveState();
        renderAll();
        showToast(`已加载 ${normalizedRows.length} 条数据 (${isNew ? '新格式' : '老格式'}${finalCols.length ? '，' + finalCols.length + '个维度' : ''})`, 'success');
      },
      error(err) {
        showToast(`解析失败: ${err.message}`, 'error');
      }
    });
  });
}

// ===== RENDER ALL =====
function renderAll() {
  renderSidebar();
  renderContent();
}

// ===== SIDEBAR =====
function renderSidebar() {
  const list = document.getElementById('batch-list');
  const count = document.getElementById('batch-count');
  count.textContent = `${batches.length}个`;
  if (!batches.length) {
    list.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-tertiary);font-size:12px">暂无批次</div>';
    return;
  }
  list.innerHTML = batches.map(b => {
    const isActive = b.id === activeBatchId;
    return `
    <div class="batch-item ${isActive ? 'active' : ''}" data-id="${b.id}" onclick="selectBatch('${b.id}')">
      <div class="batch-dot"></div>
      <div class="batch-info">
        <div class="batch-name" id="bname-${b.id}" ondblclick="editBatchName('${b.id}',event)">${escHtml(b.name)}</div>
        <div class="batch-meta">${b.time || ''} &middot; ${b.rows.length}条</div>
      </div>
      <button class="batch-del" onclick="deleteBatch('${b.id}',event)" title="删除">&#215;</button>
    </div>`;

}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function selectBatch(id) {
  if (activeBatchId === id) return;
  activeBatchId = id;
  chartFilter = null;
  sortConfig = { col: null, dir: 'asc' };
  searchQuery = '';
  currentPage = 1;
  expandedRows.clear();
  renderAll();
}

function deleteBatch(id, e) {
  e && e.stopPropagation();
  batches = batches.filter(b => b.id !== id);
  if (activeBatchId === id) {
    activeBatchId = batches.length ? batches[0].id : null;
  }
  chartFilter = null;
  currentPage = 1;
  saveState();
  renderAll();
  showToast('批次已删除');
}

function editBatchName(id, e) {
  e.stopPropagation();
  const b = batches.find(x => x.id === id);
  if (!b) return;
  const el = document.getElementById('bname-' + id);
  const cur = b.name;
  el.innerHTML = `<input class="batch-name-edit" value="${escHtml(cur)}" id="edit-input-${id}" onclick="event.stopPropagation()">`;
  const inp = document.getElementById('edit-input-' + id);
  inp.focus(); inp.select();
  function done() {
    const nv = inp.value.trim() || cur;
    b.name = nv;
    saveState();
    renderSidebar();
  }
  inp.addEventListener('blur', done);
  inp.addEventListener('keydown', ev => { if (ev.key === 'Enter') done(); if (ev.key === 'Escape') { renderSidebar(); } });
}

// ===== CONTENT =====
function renderContent() {
  const root = document.getElementById('content-root');
  if (!activeBatchId || !batches.length) {
    root.innerHTML = `
    <div id="empty-state">
      <div class="empty-icon">&#128202;</div>
      <h3>暂无数据</h3>
      <p>请在左侧拖拽或上传 CSV 文件开始分析</p>
    </div>`;
    return;
  }
  const batch = batches.find(b => b.id === activeBatchId);
  if (!batch) return;

  destroyCharts();

  root.innerHTML = buildContentHTML(batch);

  // Init charts
  setTimeout(() => {
    renderDistChart(batch);
    renderRadarChart(batch);
    renderTrendChart();
    renderTrendBatchSelector();
  }, 0);

  // Bind table events
  bindTableEvents(batch);
}

function buildContentHTML(batch) {
  const rows = batch.rows;
  const scoreCols = batch.scoreCols;
  const scores = rows.map(r => calcOverallScore(r, scoreCols, batch.isNewFormat)).filter(v => !isNaN(v));
  const avg = scores.length ? (scores.reduce((a,b)=>a+b,0)/scores.length) : 0;
  const lowCount = scores.filter(v => v < 3).length;
  const highCount = scores.filter(v => v >= 4).length;
  const lowRate = scores.length ? (lowCount / scores.length * 100) : 0;
  const highRate = scores.length ? (highCount / scores.length * 100) : 0;

  // Build dim stats
  const dimStats = scoreCols.map(col => {
    const vals = rows.map(r => parseFloat(r[col])).filter(v => !isNaN(v));
    const colAvg = vals.length ? (vals.reduce((a,b)=>a+b,0)/vals.length) : 0;
    return { col, avg: colAvg.toFixed(2) };
  });

  // Format badge
  const fmtBadge = batch.isNewFormat
    ? '<span class="tag tag-new">新格式</span>'
    : '<span class="tag tag-old">老格式</span>';

  return `
  <!-- Batch Header -->
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap">
    <h2 style="font-size:18px;font-weight:700;color:var(--text)">${escHtml(batch.name)}</h2>
    ${fmtBadge}
    <span class="tag">${batch.time || '未知时间'}</span>
    <span class="tag">${rows.length} 条数据</span>
  </div>

  <!-- Stat Cards -->
  <div class="stat-grid">
    <div class="stat-card">
      <div class="stat-card-label">&#128200; 数据总量</div>
      <div class="stat-card-value">${rows.length}</div>
      <div class="stat-card-sub">条记录</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-label">&#9733; 平均整体分</div>
      <div class="stat-card-value ${avg >= 3.5 ? 'good' : avg >= 2.5 ? 'warn' : 'bad'}">${avg.toFixed(2)}</div>
      <div class="stat-card-sub">满分5分</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-label">&#9660; 低分率（&lt;3）</div>
      <div class="stat-card-value ${lowRate > 30 ? 'bad' : lowRate > 15 ? 'warn' : 'good'}">${lowRate.toFixed(1)}%</div>
      <div class="stat-card-sub">${lowCount} 条</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-label">&#9650; 高质率（&ge;4）</div>
      <div class="stat-card-value ${highRate >= 50 ? 'good' : highRate >= 30 ? 'warn' : 'bad'}">${highRate.toFixed(1)}%</div>
      <div class="stat-card-sub">${highCount} 条</div>
    </div>
    ${dimStats.map(d => `
    <div class="stat-card">
      <div class="stat-card-label">&#128198; ${escHtml(d.col)}</div>
      <div class="stat-card-value ${parseFloat(d.avg)>=3.5?'good':parseFloat(d.avg)>=2.5?'warn':'bad'}">${d.avg}</div>
      <div class="stat-card-sub">维度平均分</div>
    </div>`).join('')}
  </div>

  <!-- Charts Row -->
  <div class="charts-row">
    <div class="card">
      <div class="card-header">
        <h3>分数分布</h3>
        ${chartFilter ? `<span class="filter-badge" onclick="clearFilter()">已过滤: ${escHtml(String(chartFilter.value))} &#215;</span>` : ''}
      </div>
      <div class="card-body">
        <div class="chart-wrap"><canvas id="chart-dist"></canvas></div>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><h3>各维度平均分</h3></div>
      <div class="card-body">
        <div class="chart-wrap"><canvas id="chart-radar"></canvas></div>
      </div>
    </div>
  </div>

  <!-- Trend Card -->
  <div class="card" id="trend-card">
    <div class="card-header">
      <h3>历史趋势对比</h3>
      <div class="card-header-actions">
        <div id="trend-metric-btns" class="trend-metric-btns">
          <button class="metric-btn ${trendMetric==='avg'?'active':''}" data-metric="avg" onclick="setTrendMetric('avg')">平均整体分</button>
          <button class="metric-btn ${trendMetric==='lowrate'?'active':''}" data-metric="lowrate" onclick="setTrendMetric('lowrate')">低分率</button>
          <button class="metric-btn ${trendMetric==='highrate'?'active':''}" data-metric="highrate" onclick="setTrendMetric('highrate')">高质率</button>
          ${getDynamicMetricBtns()}
        </div>
      </div>
    </div>
    <div class="card-header" style="padding-top:8px;padding-bottom:8px;border-top:none">
      <div id="trend-batch-selector" class="batch-selector-wrap">
        <span class="batch-sel-label">批次：</span>
      </div>
    </div>
    <div class="card-body">
      <div class="trend-chart-wrap"><canvas id="chart-trend"></canvas></div>
    </div>
  </div>

  <!-- Table Section -->
  ${buildTableHTML(batch)}
  `;
}

function getDynamicMetricBtns() {
  // Collect all unique scoreCols across batches
  const allCols = new Set();
  batches.forEach(b => (b.scoreCols || []).forEach(c => allCols.add(c)));
  return Array.from(allCols).map(c =>
    `<button class="metric-btn ${trendMetric===c?'active':''}" data-metric="${escHtml(c)}" onclick="setTrendMetric('${c.replace(/'/g,"\\'")}')">
      ${escHtml(c)}
    </button>`
  ).join('');
}

// ===== CHARTS =====
function destroyCharts() {
  Object.keys(charts).forEach(k => {
    try { charts[k].destroy(); } catch(e) {}
  });
  charts = {};
}

function renderDistChart(batch) {
  const canvas = document.getElementById('chart-dist');
  if (!canvas) return;
  const rows = batch.rows;
  const scoreCols = batch.scoreCols;
  const scores = rows.map(r => calcOverallScore(r, scoreCols, batch.isNewFormat)).filter(v => !isNaN(v));
  // Bins: [1,1.5), [1.5,2), [2,2.5), [2.5,3), [3,3.5), [3.5,4), [4,4.5), [4.5,5]
  const bins = [1, 1.5, 2, 2.5, 3, 3.5, 4, 4.5, 5];
  const labels = ['1-1.5', '1.5-2', '2-2.5', '2.5-3', '3-3.5', '3.5-4', '4-4.5', '4.5-5'];
  const counts = Array(labels.length).fill(0);
  scores.forEach(s => {
    for (let i = 0; i < bins.length - 1; i++) {
      if (s >= bins[i] && (s < bins[i+1] || (i === bins.length-2 && s <= bins[i+1]))) {
        counts[i]++;
        break;
      }
    }
  });
  const barColors = labels.map((_, i) => {
    const mid = (bins[i] + bins[i+1]) / 2;
    if (mid >= 3.5) return '#52c41a';
    if (mid >= 2.5) return '#faad14';
    return '#ff4d4f';
  });
  charts['dist'] = new Chart(canvas, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: '数量',
        data: counts,
        backgroundColor: barColors,
        borderRadius: 4,
        borderSkipped: false
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.parsed.y} 条 (${scores.length ? (ctx.parsed.y/scores.length*100).toFixed(1) : 0}%)`
          }
        }
      },
      scales: {
        x: { grid: { display: false } },
        y: { beginAtZero: true, grid: { color: '#f0f0f0' } }
      },
      onClick(event, elements) {
        if (!elements.length) return;
        const idx = elements[0].index;
        chartFilter = { type: 'dist', label: labels[idx], min: bins[idx], max: bins[idx+1] };
        currentPage = 1;
        renderTableSection(batches.find(b => b.id === activeBatchId));
        // Update filter badge
        const batchNow = batches.find(b => b.id === activeBatchId);
        const header = canvas.closest('.card').querySelector('.card-header');
        if (header) {
          let badge = header.querySelector('.filter-badge');
          if (!badge) {
            badge = document.createElement('span');
            badge.className = 'filter-badge';
            badge.onclick = clearFilter;
            header.appendChild(badge);
          }
          badge.innerHTML = `已过滤: ${escHtml(labels[idx])} &#215;`;
        }
      }
    }
  });
}

function renderRadarChart(batch) {
  const canvas = document.getElementById('chart-radar');
  if (!canvas) return;
  const rows = batch.rows;
  const scoreCols = batch.scoreCols;
  if (!scoreCols.length) {
    canvas.parentElement.innerHTML = '<div class="no-data">无维度数据</div>';
    return;
  }
  const avgs = scoreCols.map(c => {
    const vals = rows.map(r => parseFloat(r[c])).filter(v => !isNaN(v));
    return vals.length ? parseFloat((vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(2)) : 0;
  });
  charts['radar'] = new Chart(canvas, {
    type: 'radar',
    data: {
      labels: scoreCols,
      datasets: [{
        label: '平均分',
        data: avgs,
        backgroundColor: 'rgba(22,119,255,0.12)',
        borderColor: '#1677ff',
        pointBackgroundColor: '#1677ff',
        borderWidth: 2,
        pointRadius: 4
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        r: {
          min: 0, max: 5,
          ticks: { stepSize: 1, font: { size: 11 } },
          grid: { color: '#f0f0f0' },
          pointLabels: { font: { size: 12 } }
        }
      },
      plugins: { legend: { display: false } }
    }
  });
}

// ===== TREND CHART =====
function getTrendData() {
  const selected = trendSelectedBatches;
  const batchesForTrend = batches.filter(b => !selected || selected.includes(b.id));
  const sorted = [...batchesForTrend].sort((a, b) => (a.time || '').localeCompare(b.time || ''));

  return sorted.map(b => {
    const rows = b.rows;
    const scoreCols = b.scoreCols;
    const scores = rows.map(r => calcOverallScore(r, scoreCols, b.isNewFormat)).filter(v => !isNaN(v));

    let value;
    if (trendMetric === 'avg') {
      value = scores.length ? parseFloat((scores.reduce((a,v)=>a+v,0)/scores.length).toFixed(3)) : null;
    } else if (trendMetric === 'lowrate') {
      value = scores.length ? parseFloat((scores.filter(v=>v<3).length/scores.length*100).toFixed(1)) : null;
    } else if (trendMetric === 'highrate') {
      value = scores.length ? parseFloat((scores.filter(v=>v>=4).length/scores.length*100).toFixed(1)) : null;
    } else {
      // Dimension metric
      const dimVals = rows.map(r => parseFloat(r[trendMetric])).filter(v => !isNaN(v));
      value = dimVals.length ? parseFloat((dimVals.reduce((a,v)=>a+v,0)/dimVals.length).toFixed(3)) : null;
    }

    return { label: b.name, time: b.time || b.name, value };
  });
}

function renderTrendChart() {
  const canvas = document.getElementById('chart-trend');
  if (!canvas) return;
  if (charts['trend']) { try { charts['trend'].destroy(); } catch(e) {} delete charts['trend']; }

  const data = getTrendData();
  if (data.length < 1) {
    canvas.parentElement.innerHTML = '<div class="no-data">需要至少1个批次才能显示趋势</div>';
    return;
  }

  const labels = data.map(d => d.label.length > 15 ? d.label.slice(0, 15) + '…' : d.label);
  const values = data.map(d => d.value);

  const metricLabel = trendMetric === 'avg' ? '平均整体分'
    : trendMetric === 'lowrate' ? '低分率(%)'
    : trendMetric === 'highrate' ? '高质率(%)'
    : trendMetric;

  charts['trend'] = new Chart(canvas, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: metricLabel,
        data: values,
        borderColor: '#1677ff',
        backgroundColor: 'rgba(22,119,255,0.08)',
        pointBackgroundColor: '#1677ff',
        pointRadius: 5,
        pointHoverRadius: 7,
        fill: true,
        tension: 0.3,
        borderWidth: 2,
        spanGaps: true
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            title: (items) => data[items[0].dataIndex]?.label || '',
            label: ctx => {
              const v = ctx.parsed.y;
              const suffix = (trendMetric === 'lowrate' || trendMetric === 'highrate') ? '%' : '';
              return ` ${metricLabel}: ${v !== null ? v + suffix : 'N/A'}`;
            }
          }
        }
      },
      scales: {
        x: { grid: { display: false }, ticks: { maxRotation: 30, font: { size: 11 } } },
        y: { beginAtZero: false, grid: { color: '#f0f0f0' } }
      }
    }
  });
}

function renderTrendBatchSelector() {
  const wrap = document.getElementById('trend-batch-selector');
  if (!wrap) return;
  wrap.innerHTML = '<span class="batch-sel-label">批次：</span>';
  const allBtn = document.createElement('button');
  allBtn.className = 'batch-sel-btn' + (!trendSelectedBatches ? ' selected' : '');
  allBtn.textContent = '全部';
  allBtn.onclick = () => { trendSelectedBatches = null; renderTrendChart(); renderTrendBatchSelector(); };
  wrap.appendChild(allBtn);
  batches.forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'batch-sel-btn' + (trendSelectedBatches && trendSelectedBatches.includes(b.id) ? ' selected' : '');
    btn.textContent = b.name.length > 12 ? b.name.slice(0, 12) + '…' : b.name;
    btn.title = b.name;
    btn.onclick = () => {
      if (!trendSelectedBatches) trendSelectedBatches = batches.map(x => x.id);
      const idx = trendSelectedBatches.indexOf(b.id);
      if (idx >= 0) {
        trendSelectedBatches.splice(idx, 1);
        if (!trendSelectedBatches.length) trendSelectedBatches = null;
      } else {
        trendSelectedBatches.push(b.id);
      }
      renderTrendChart();
      renderTrendBatchSelector();
    };
    wrap.appendChild(btn);
  });
}

function setTrendMetric(m) {
  trendMetric = m;
  // Update button states
  const btns = document.querySelectorAll('#trend-metric-btns .metric-btn');
  btns.forEach(btn => {
    btn.classList.toggle('active', btn.dataset.metric === m);
  });
  renderTrendChart();
}

// ===== TABLE =====
function buildTableHTML(batch) {
  return `
  <div class="card" id="table-section">
    <div class="card-header">
      <h3>数据详情</h3>
      <div class="card-header-actions">
        <input type="text" class="search-input" id="table-search" placeholder="搜索..." value="${escHtml(searchQuery)}" oninput="onSearch(this.value)">
        ${chartFilter ? `<span class="filter-badge" id="filter-badge-table" onclick="clearFilter()">已过滤: ${escHtml(String(chartFilter.label || chartFilter.value))} &#215;</span>` : ''}
        <span style="font-size:12px;color:var(--text-secondary)" id="table-count-label"></span>
      </div>
    </div>
    <div id="table-inner">
      ${buildTableInner(batch)}
    </div>
  </div>`;
}

function getFilteredRows(batch) {
  let rows = batch.rows;
  // Apply chart filter
  if (chartFilter && chartFilter.type === 'dist') {
    const { min, max } = chartFilter;
    rows = rows.filter(r => {
      const s = calcOverallScore(r, batch.scoreCols, batch.isNewFormat);
      return !isNaN(s) && s >= min && (s < max || (max === 5 && s <= 5));
    });
  }
  // Apply search
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    rows = rows.filter(r => Object.values(r).some(v => String(v).toLowerCase().includes(q)));
  }
  return rows;
}

function getSortedRows(rows, batch) {
  if (!sortConfig.col) return rows;
  const col = sortConfig.col;
  const dir = sortConfig.dir === 'asc' ? 1 : -1;
  return [...rows].sort((a, b) => {
    const va = a[col]; const vb = b[col];
    const na = parseFloat(va); const nb = parseFloat(vb);
    if (!isNaN(na) && !isNaN(nb)) return (na - nb) * dir;
    return String(va || '').localeCompare(String(vb || ''), 'zh-CN') * dir;
  });
}

function buildTableInner(batch) {
  const allFiltered = getFilteredRows(batch);
  const sorted = getSortedRows(allFiltered, batch);
  const total = sorted.length;
  const totalPages = Math.max(1, Math.ceil(total / pageSize));
  currentPage = Math.min(currentPage, totalPages);
  const start = (currentPage - 1) * pageSize;
  const pageRows = sorted.slice(start, start + pageSize);

  const cols = buildTableCols(batch);

  // Update count label after render
  setTimeout(() => {
    const lbl = document.getElementById('table-count-label');
    if (lbl) lbl.textContent = `${total} / ${batch.rows.length} 条`;
  }, 0);

  return `
  <div class="table-scroll">
    <table id="data-table">
      <thead>
        <tr>
          ${cols.map(c => `<th class="${sortConfig.col===c.key?'sorted':''}" onclick="onSort('${c.key}')">
            ${escHtml(c.label)}<span class="sort-icon"> ${sortConfig.col===c.key?(sortConfig.dir==='asc'?'▲':'▼'):'↕'}</span>
          </th>`).join('')}
          ${batch.hasSubdim ? '<th>子维度</th>' : ''}
        </tr>
      </thead>
      <tbody>
        ${pageRows.length ? pageRows.map(r => buildTableRow(r, cols, batch)).join('') : `<tr><td colspan="${cols.length + (batch.hasSubdim?1:0)}" class="no-data">暂无数据</td></tr>`}
      </tbody>
    </table>
  </div>
  ${buildPagination(total, totalPages)}`;
}

function buildTableCols(batch) {
  const cols = [];
  if (batch.isNewFormat) {
    cols.push({ key: '编号', label: '编号' });
    cols.push({ key: '_overall', label: '整体分' });
    if (batch.rows.length && batch.rows[0]['视频链接'] !== undefined) {
      cols.push({ key: '视频链接', label: '视频链接' });
    }
    batch.scoreCols.forEach(c => cols.push({ key: c, label: c }));
  } else {
    // Show overall first (only if scoreCols exist)
    if (batch.scoreCols.length) {
      cols.push({ key: '_overall', label: '整体分' });
    }
    // Show score cols
    batch.scoreCols.forEach(c => cols.push({ key: c, label: c }));
    // Show other non-score non-special cols
    if (batch.rows.length) {
      const specialKeys = new Set([...batch.scoreCols, '整体分', '_isNewFormat', ...batch.scoreCols.map(c => c + '_level2'), ...batch.scoreCols.map(c => c + '_level3')]);
      const others = Object.keys(batch.rows[0]).filter(k =>
        !specialKeys.has(k) &&
        !k.startsWith('_') &&
        !k.endsWith('_level2') &&
        !k.endsWith('_level3')
      );
      // If no scoreCols at all, show up to 15 columns; otherwise up to 5 extras
      const limit = batch.scoreCols.length ? 5 : 15;
      others.slice(0, limit).forEach(k => cols.push({ key: k, label: k }));
    }
  }
  return cols;
}

function buildTableRow(r, cols, batch) {
  const overall = calcOverallScore(r, batch.scoreCols, batch.isNewFormat);
  const rowKey = JSON.stringify(r).slice(0, 40);
  const rid = btoa(encodeURIComponent(rowKey)).slice(0, 16);
  const isExpanded = expandedRows.has(rid);

  const cells = cols.map(c => {
    if (c.key === '_overall') {
      const cls = getScoreClass(overall);
      return `<td><span class="score-cell ${cls}">${isNaN(overall)?'-':overall}</span></td>`;
    }
    if (c.key === '视频链接') {
      const v = r[c.key] || '';
      return `<td>${v ? `<a href="${escHtml(v)}" target="_blank" rel="noopener">查看</a>` : '-'}</td>`;
    }
    const v = r[c.key];
    if (v === undefined || v === null || v === '') return `<td>-</td>`;
    if (batch.scoreCols.includes(c.key)) {
      const n = parseScoreVal(v);
      if (!isNaN(n)) return `<td><span class="score-cell ${getScoreClass(n)}">${n}</span></td>`;
    }
    return `<td>${escHtml(String(v).slice(0, 100))}</td>`;
  }).join('');

  const subBtn = batch.hasSubdim
    ? `<td><button class="expand-btn" onclick="toggleSubdim('${rid}', this)">${isExpanded ? '收起' : '展开'}</button></td>`
    : '';

  const mainRow = `<tr data-rid="${rid}">${cells}${subBtn}</tr>`;

  if (isExpanded && batch.hasSubdim) {
    const subdimHTML = buildSubdimRow(r, batch, cols.length + 1);
    return mainRow + subdimHTML;
  }
  return mainRow;
}

function buildSubdimRow(r, batch, colSpan) {
  const dims = batch.scoreCols.filter(c => r[c + '_level2'] || r[c + '_level3']);
  if (!dims.length) return '';
  const content = dims.map(c => {
    const l2 = r[c + '_level2'];
    const l3 = r[c + '_level3'];
    return `<tr>
      <td style="padding-left:8px;color:var(--primary);font-weight:600">${escHtml(c)}</td>
      ${l2 ? `<td>二级: ${escHtml(String(l2))}</td>` : '<td></td>'}
      ${l3 ? `<td>三级: ${escHtml(String(l3))}</td>` : '<td></td>'}
    </tr>`;
  }).join('');
  return `<tr class="subdim-row">
    <td colspan="${colSpan}">
      <table class="subdim-table"><tbody>${content}</tbody></table>
    </td>
  </tr>`;
}

function buildPagination(total, totalPages) {
  const pages = [];
  let start = Math.max(1, currentPage - 2);
  let end = Math.min(totalPages, currentPage + 2);
  if (end - start < 4) { start = Math.max(1, end - 4); end = Math.min(totalPages, start + 4); }
  for (let i = start; i <= end; i++) pages.push(i);

  const paginationBtns = pages.map(p =>
    `<button class="pg-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`
  ).join('');

  const sizeOpts = PAGE_SIZES.map(s =>
    `<option value="${s}" ${s===pageSize?'selected':''}>${s}条/页</option>`
  ).join('');

  return `<div class="pagination">
    <span>共 ${total} 条</span>
    <button class="pg-btn" onclick="goPage(1)" ${currentPage===1?'disabled':''}>«</button>
    <button class="pg-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>
    ${paginationBtns}
    <button class="pg-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>›</button>
    <button class="pg-btn" onclick="goPage(${totalPages})" ${currentPage===totalPages?'disabled':''}>»</button>
    <select class="pg-size-sel" onchange="changePageSize(this.value)">${sizeOpts}</select>
    <span>第 ${currentPage}/${totalPages} 页</span>
  </div>`;
}

function renderTableSection(batch) {
  const inner = document.getElementById('table-inner');
  if (!inner || !batch) return;
  inner.innerHTML = buildTableInner(batch);
  bindTableSearchEvent();
  updateFilterBadge(batch);
}

function updateFilterBadge(batch) {
  const header = document.querySelector('#table-section .card-header .card-header-actions');
  if (!header) return;
  let badge = header.querySelector('.filter-badge');
  if (chartFilter) {
    if (!badge) {
      badge = document.createElement('span');
      badge.className = 'filter-badge';
      badge.onclick = clearFilter;
      const countLbl = header.querySelector('#table-count-label');
      header.insertBefore(badge, countLbl);
    }
    badge.innerHTML = `已过滤: ${escHtml(String(chartFilter.label || chartFilter.value))} &#215;`;
  } else {
    if (badge) badge.remove();
  }
}

function bindTableSearchEvent() {
  const inp = document.getElementById('table-search');
  if (inp) {
    inp.value = searchQuery;
    inp.oninput = function() { onSearch(this.value); };
  }
}

function bindTableEvents(batch) {
  bindTableSearchEvent();
}

function toggleSubdim(rid, btn) {
  if (expandedRows.has(rid)) {
    expandedRows.delete(rid);
  } else {
    expandedRows.add(rid);
  }
  const batch = batches.find(b => b.id === activeBatchId);
  if (batch) renderTableSection(batch);
}

function onSort(col) {
  if (sortConfig.col === col) {
    sortConfig.dir = sortConfig.dir === 'asc' ? 'desc' : 'asc';
  } else {
    sortConfig.col = col;
    sortConfig.dir = 'asc';
  }
  currentPage = 1;
  const batch = batches.find(b => b.id === activeBatchId);
  if (batch) renderTableSection(batch);
}

function onSearch(val) {
  searchQuery = val;
  currentPage = 1;
  const batch = batches.find(b => b.id === activeBatchId);
  if (batch) renderTableSection(batch);
}

function goPage(p) {
  const batch = batches.find(b => b.id === activeBatchId);
  if (!batch) return;
  const total = getFilteredRows(batch).length;
  const totalPages = Math.max(1, Math.ceil(total / pageSize));
  currentPage = Math.max(1, Math.min(p, totalPages));
  renderTableSection(batch);
}

function changePageSize(val) {
  pageSize = parseInt(val) || 20;
  currentPage = 1;
  const batch = batches.find(b => b.id === activeBatchId);
  if (batch) renderTableSection(batch);
}

function clearFilter() {
  chartFilter = null;
  currentPage = 1;
  const batch = batches.find(b => b.id === activeBatchId);
  if (batch) renderTableSection(batch);
  updateFilterBadge(batch);
  // Remove filter badge from dist chart header too
  const distHeader = document.querySelector('#chart-dist')?.closest?.('.card')?.querySelector?.('.card-header');
  if (distHeader) {
    const badge = distHeader.querySelector('.filter-badge');
    if (badge) badge.remove();
  }
}

// ===== SHARE / EXPORT =====
function showShareModal() {
  if (!batches.length) { showToast('没有数据可导出', 'error'); return; }
  const modal = document.getElementById('share-modal');
  modal.style.display = 'flex';
  const ta = document.getElementById('share-textarea');
  ta.value = '生成中...';
  setTimeout(() => {
    try {
      ta.value = JSON.stringify({ version: 7, batches }, null, 2);
    } catch(e) { ta.value = '数据过大，无法序列化'; }
  }, 50);
}

function copyShareData() {
  const ta = document.getElementById('share-textarea');
  navigator.clipboard && navigator.clipboard.writeText(ta.value).then(() => showToast('已复制到剪贴板', 'success')).catch(() => {
    ta.select(); document.execCommand('copy'); showToast('已复制', 'success');
  });
}

function downloadShareData() {
  const ta = document.getElementById('share-textarea');
  const blob = new Blob([ta.value], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `dataquality_export_${Date.now()}.json`;
  a.click(); URL.revokeObjectURL(url);
  showToast('下载开始', 'success');
}

function doImport() {
  const ta = document.getElementById('import-textarea');
  try {
    const data = JSON.parse(ta.value);
    let imported = [];
    if (data.batches) imported = data.batches;
    else if (Array.isArray(data)) imported = data;
    if (!imported.length) { showToast('没有找到批次数据', 'error'); return; }
    imported.forEach(b => {
      if (!batches.find(x => x.id === b.id)) {
        batches.push({
          id: b.id || genId(), name: b.name || '导入批次',
          time: b.time || '', rows: b.rows || [],
          scoreCols: b.scoreCols || [], isNewFormat: !!b.isNewFormat,
          hasSubdim: !!b.hasSubdim
        });
      }
    });
    if (!activeBatchId && batches.length) activeBatchId = batches[0].id;
    saveState(); renderAll();
    closeModal('import-modal');
    showToast(`成功导入 ${imported.length} 个批次`, 'success');
  } catch(e) { showToast('JSON 格式错误: ' + e.message, 'error'); }
}

function clearAllData() {
  if (!confirm('确认清空全部数据？此操作不可恢复。')) return;
  batches = []; activeBatchId = null; chartFilter = null;
  destroyCharts();
  localStorage.removeItem(STORAGE_KEY);
  renderAll();
  showToast('已清空全部数据');
}

// ===== DRAG AND DROP =====
function initDropZone() {
  const zone = document.getElementById('drop-zone');
  const inp = document.getElementById('file-input');

  zone.addEventListener('click', () => inp.click());
  inp.addEventListener('change', e => { handleFiles(e.target.files); inp.value = ''; });

  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('dragover');
    handleFiles(e.dataTransfer.files);
  });

  // Also allow drop on main content
  document.addEventListener('dragover', e => e.preventDefault());
  document.addEventListener('drop', e => {
    e.preventDefault();
    const files = e.dataTransfer.files;
    if (files.length && Array.from(files).some(f => f.name.endsWith('.csv'))) {
      handleFiles(files);
    }
  });
}

// ===== INIT =====
function init() {
  loadState();
  if (batches.length && !activeBatchId) activeBatchId = batches[0].id;
  initDropZone();
  renderAll();
}

document.addEventListener('DOMContentLoaded', init);
</script>
