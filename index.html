<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数据质量可视化平台 v7</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #1677ff;
  --primary-hover: #4096ff;
  --primary-active: #0958d9;
  --success: #52c41a;
  --warning: #faad14;
  --error: #ff4d4f;
  --bg: #f5f7fa;
  --card-bg: #ffffff;
  --border: #f0f0f0;
  --text: #1f1f1f;
  --text-secondary: #8c8c8c;
  --text-tertiary: #bfbfbf;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.03), 0 4px 12px rgba(0,0,0,0.06);
  --radius: 8px;
  --radius-sm: 6px;
  --sidebar-w: 240px;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5714; }

/* ===== TOPBAR ===== */
#topbar {
  position: fixed; top: 0; left: 0; right: 0; height: 52px;
  background: #fff; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 24px;
  z-index: 100; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
#topbar .logo { font-size: 16px; font-weight: 700; color: var(--primary); letter-spacing: -0.3px; }
#topbar .logo span { color: var(--text-secondary); font-weight: 400; font-size: 13px; margin-left: 8px; }
.topbar-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }

/* ===== LAYOUT ===== */
#app-wrap {
  display: flex;
  margin-top: 52px;
  height: calc(100vh - 52px);
  overflow: hidden;
}
#sidebar {
  width: var(--sidebar-w);
  background: #fff;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
}
#main-scroll {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  background: var(--bg);
}
#main-area {
  padding: 20px;
  min-height: 100%;
}

/* ===== SIDEBAR ===== */
.sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.sidebar-header h2 { font-size: 13px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
.sidebar-list { flex: 1; overflow-y: auto; padding: 8px; }
.batch-item {
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  margin-bottom: 2px;
  display: flex;
  align-items: flex-start;
  gap: 8px;
  transition: background 0.15s;
  border: 1px solid transparent;
}
.batch-item:hover { background: #f5f7fa; }
.batch-item.active {
  background: #e8f4ff;
  border-color: #bae0ff;
}
.batch-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--primary); margin-top: 5px; flex-shrink: 0;
}
.batch-item.active .batch-dot { background: var(--primary); }
.batch-info { flex: 1; min-width: 0; }
.batch-name { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.batch-meta { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }
.batch-del {
  width: 20px; height: 20px; border-radius: 4px; border: none;
  background: transparent; cursor: pointer; color: var(--text-tertiary);
  display: flex; align-items: center; justify-content: center; font-size: 14px;
  opacity: 0; transition: opacity 0.15s, color 0.15s, background 0.15s; flex-shrink: 0;
}
.batch-item:hover .batch-del { opacity: 1; }
.batch-del:hover { color: var(--error); background: #fff1f0; }
.sidebar-footer { padding: 12px 8px; border-top: 1px solid var(--border); }

/* ===== DROP ZONE ===== */
#drop-zone {
  border: 2px dashed #d9d9d9; border-radius: var(--radius);
  padding: 24px 16px; text-align: center; cursor: pointer;
  transition: border-color 0.2s, background 0.2s; background: transparent;
}
#drop-zone:hover, #drop-zone.dragover { border-color: var(--primary); background: #e8f4ff; }
#drop-zone .drop-icon { font-size: 24px; color: var(--text-tertiary); display: block; margin-bottom: 8px; }
#drop-zone p { font-size: 12px; color: var(--text-secondary); line-height: 1.6; }
#drop-zone input[type=file] { display: none; }

/* ===== EMPTY STATE ===== */
#empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 400px; text-align: center; padding: 40px;
}
#empty-state .empty-icon { font-size: 48px; color: var(--text-tertiary); margin-bottom: 16px; }
#empty-state h3 { font-size: 16px; color: var(--text); margin-bottom: 8px; }
#empty-state p { font-size: 14px; color: var(--text-secondary); }

/* ===== STAT CARDS ===== */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 16px; }
.stat-card {
  background: var(--card-bg); border-radius: var(--radius);
  border: 1px solid var(--border); padding: 16px;
  box-shadow: var(--shadow-sm); transition: box-shadow 0.2s;
}
.stat-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
.stat-card-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; display: flex; align-items: center; gap: 4px; }
.stat-card-value { font-size: 28px; font-weight: 700; line-height: 1.2; color: var(--text); }
.stat-card-sub { font-size: 11px; color: var(--text-tertiary); margin-top: 4px; }
.stat-card-value.good { color: var(--success); }
.stat-card-value.warn { color: var(--warning); }
.stat-card-value.bad { color: var(--error); }

/* ===== CARDS ===== */
.card {
  background: var(--card-bg); border-radius: var(--radius);
  border: 1px solid var(--border); box-shadow: var(--shadow-sm);
  margin-bottom: 16px; overflow: hidden;
}
.card-header {
  padding: 14px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
}
.card-header h3 { font-size: 15px; font-weight: 600; color: var(--text); flex-shrink: 0; }
.card-header-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.card-body { padding: 16px 20px; }

/* ===== CHARTS ===== */
.charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.chart-wrap { position: relative; height: 240px; }
canvas { display: block; }

/* ===== TREND ===== */
.trend-chart-wrap { height: 300px; }
.trend-compare-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 16px; }
.trend-compare-table th {
  padding: 8px 12px; background: #fafafa; border-bottom: 2px solid var(--border);
  font-weight: 600; color: var(--text-secondary); text-align: center; white-space: nowrap;
}
.trend-compare-table th:first-child { text-align: left; }
.trend-compare-table td {
  padding: 8px 12px; border-bottom: 1px solid var(--border); text-align: center; white-space: nowrap;
}
.trend-compare-table td:first-child { text-align: left; font-weight: 500; }
.trend-compare-table tr:last-child td { border-bottom: none; }
.trend-compare-table .tc-good { color: var(--success); font-weight: 600; }
.trend-compare-table .tc-warn { color: var(--warning); font-weight: 600; }
.trend-compare-table .tc-bad { color: var(--error); font-weight: 600; }
.trend-compare-table .tc-best { background: #f6ffed; }
.trend-compare-table .tc-worst { background: #fff2f0; }

/* ===== BATCH SELECTOR ===== */
.batch-selector-wrap { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
.batch-sel-label { font-size: 12px; color: var(--text-secondary); white-space: nowrap; }
.batch-sel-btn {
  padding: 2px 8px; font-size: 11px; border-radius: 4px;
  border: 1px solid var(--border); background: #fff;
  cursor: pointer; color: var(--text-secondary);
  transition: all 0.15s; white-space: nowrap;
}
.batch-sel-btn:hover { border-color: var(--primary); color: var(--primary); }
.batch-sel-btn.selected { background: #e8f4ff; border-color: #bae0ff; color: var(--primary); }
.trend-metric-toggle { display: flex; gap: 4px; flex-wrap: wrap; }
.metric-toggle-btn {
  padding: 2px 8px; font-size: 11px; border-radius: 4px;
  border: 1px solid var(--border); background: #fff;
  cursor: pointer; color: var(--text-secondary);
  transition: all 0.15s; white-space: nowrap; display: flex; align-items: center; gap: 4px;
}
.metric-toggle-btn:hover { border-color: var(--primary); color: var(--primary); }
.metric-toggle-btn.active { border-color: currentColor; }
.metric-toggle-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* ===== DIM DIST FILTER ===== */
.dim-filter-panel {
  padding: 10px 20px 0;
  border-bottom: 1px solid var(--border);
}
.dim-filter-all-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.dim-filter-dims-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  align-items: flex-start;
}
.dim-col-group {
  display: flex;
  flex-direction: column;
  gap: 3px;
  min-width: 0;
}
.dim-col-group + .dim-col-group {
  padding-left: 6px;
  border-left: 1px solid var(--border);
}
.dim-l2-block {
  display: flex;
  flex-direction: column;
  gap: 2px;
  padding-left: 10px;
  border-left: 2px solid #e6f0ff;
  margin-left: 2px;
}
.dim-l3-block {
  display: flex;
  flex-wrap: wrap;
  gap: 2px;
  padding-left: 10px;
  border-left: 2px solid #bae0ff;
  margin-left: 2px;
}
.dim-filter-status {
  font-size: 11px;
  color: var(--primary);
  padding: 4px 0 8px;
}
/* metric-btn base + level variants */
.metric-btn {
  display: inline-flex; align-items: center; gap: 3px;
  border-radius: 4px; border: 1px solid var(--border);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  background: #fff; color: var(--text-secondary); line-height: 1.4;
}
.metric-btn:hover { border-color: var(--primary); color: var(--primary); }
.metric-btn.active { background: var(--primary); border-color: var(--primary); color: #fff !important; }
/* L1 */
.metric-btn-l1 { font-size: 12px; padding: 3px 10px; font-weight: 500; color: var(--text); }
.metric-btn-l1.active { background: var(--primary); border-color: var(--primary); color: #fff; }
.metric-btn-l1.expanded { border-color: var(--primary); color: var(--primary); background: #e8f4ff; }
/* L2 */
.metric-btn-l2 { font-size: 11px; padding: 2px 8px; background: #fafafa; }
.metric-btn-l2.active { background: #1677ff; color: #fff; border-color: #1677ff; }
/* L3 */
.metric-btn-l3 { font-size: 10px; padding: 2px 6px; background: #f0f7ff; border-color: #c9e3ff; color: #4096ff; }
.metric-btn-l3.active { background: #1677ff; color: #fff; border-color: #1677ff; }
/* expand arrow */
.dim-expand-arrow { font-size: 9px; transition: transform 0.15s; display: inline-block; }
.dim-expand-arrow.open { transform: rotate(90deg); }

/* ===== TABLE SECTION ===== */
#table-section { margin-bottom: 0; }
.table-toolbar {
  padding: 12px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.search-input {
  padding: 5px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-size: 13px; color: var(--text); outline: none; width: 200px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(22,119,255,0.1); }
.filter-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 8px; background: #e8f4ff; border: 1px solid #bae0ff;
  border-radius: 4px; font-size: 12px; color: var(--primary); cursor: pointer;
}
.filter-badge:hover { background: #bae0ff; }

.table-scroll { overflow-x: auto; overflow-y: auto; max-height: 500px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; white-space: nowrap; }
thead th {
  padding: 10px 12px; background: #fafafa; border-bottom: 1px solid var(--border);
  font-weight: 600; color: var(--text-secondary); text-align: left;
  position: sticky; top: 0; z-index: 2; cursor: pointer; user-select: none;
  white-space: nowrap;
}
thead th:hover { background: #f0f0f0; color: var(--text); }
thead th .sort-icon { font-size: 11px; color: var(--text-tertiary); }
thead th.sorted { color: var(--primary); }
thead th.sorted .sort-icon { color: var(--primary); }
tbody tr { transition: background 0.1s; }
tbody tr:hover { background: #f5f7fa; }
tbody tr.highlighted { background: #fff7e6; }
tbody td { padding: 9px 12px; border-bottom: 1px solid var(--border); color: var(--text); }
tbody td:last-child, thead th:last-child { border-right: none; }
.score-cell { font-weight: 600; }
.score-high { color: var(--success); }
.score-mid { color: var(--warning); }
.score-low { color: var(--error); }
.expand-btn {
  padding: 1px 6px; border: 1px solid var(--border); border-radius: 4px;
  background: #fafafa; cursor: pointer; font-size: 11px; color: var(--text-secondary);
  transition: all 0.15s;
}
.expand-btn:hover { border-color: var(--primary); color: var(--primary); background: #e8f4ff; }
.subdim-row { background: #fafafa !important; }
.subdim-row td { font-size: 12px; color: var(--text-secondary); }
.subdim-table { width: 100%; border-collapse: collapse; }
.subdim-table td { padding: 4px 8px; border-bottom: 1px solid #f0f0f0; }

.pagination {
  padding: 10px 20px; border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
  flex-wrap: wrap;
}
.pagination span { font-size: 13px; color: var(--text-secondary); }
.pg-btn {
  padding: 3px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: #fff; cursor: pointer; font-size: 13px; color: var(--text);
  transition: all 0.15s;
}
.pg-btn:hover:not(:disabled) { border-color: var(--primary); color: var(--primary); }
.pg-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.pg-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }
.pg-size-sel {
  padding: 3px 8px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: #fff; font-size: 13px; color: var(--text); cursor: pointer; outline: none;
}
.pg-size-sel:focus { border-color: var(--primary); }

/* ===== BUTTONS ===== */
.btn {
  padding: 6px 14px; border-radius: var(--radius-sm); border: 1px solid;
  font-size: 13px; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 4px; white-space: nowrap;
}
.btn-primary { background: var(--primary); border-color: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
.btn-default { background: #fff; border-color: var(--border); color: var(--text); }
.btn-default:hover { border-color: var(--primary); color: var(--primary); }
.btn-sm { padding: 3px 8px; font-size: 12px; }
.btn-danger { background: #fff1f0; border-color: #ffa39e; color: var(--error); }
.btn-danger:hover { background: #ff4d4f; border-color: #ff4d4f; color: #fff; }

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 1000;
  display: flex; align-items: center; justify-content: center;
}
.modal {
  background: #fff; border-radius: var(--radius); box-shadow: 0 6px 40px rgba(0,0,0,0.15);
  max-width: 520px; width: 90%; max-height: 90vh; overflow-y: auto;
}
.modal-header {
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-header h3 { font-size: 16px; font-weight: 600; }
.modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-tertiary); padding: 2px; }
.modal-close:hover { color: var(--text); }
.modal-body { padding: 20px; }
.modal-footer { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }

/* ===== SHARE MODAL ===== */
.share-textarea {
  width: 100%; height: 200px; padding: 10px; border: 1px solid var(--border);
  border-radius: var(--radius-sm); font-size: 12px; font-family: monospace;
  resize: vertical; outline: none;
}
.share-textarea:focus { border-color: var(--primary); }

/* ===== TOAST ===== */
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #333; color: #fff; padding: 10px 20px; border-radius: var(--radius-sm);
  font-size: 14px; z-index: 9999; opacity: 0; pointer-events: none;
  transition: opacity 0.2s; max-width: 400px; text-align: center;
}
#toast.show { opacity: 1; }
#toast.success { background: var(--success); }
#toast.error { background: var(--error); }

/* ===== MISC ===== */
.section-title { font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
.no-data { text-align: center; padding: 40px; color: var(--text-tertiary); font-size: 14px; }
a { color: var(--primary); text-decoration: none; }
a:hover { text-decoration: underline; }
.tag {
  display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 11px;
  background: #f0f0f0; color: var(--text-secondary); margin: 1px;
}
.tag-new { background: #e8f4ff; color: var(--primary); }
.tag-old { background: #f6ffed; color: var(--success); }

/* ===== TREND MINI / EXPANDED ===== */
.trend-mini-bar {
  padding: 0 20px 14px;
  cursor: pointer;
  position: relative;
}
.trend-mini-bar:hover .trend-mini-expand-hint { opacity: 1; }
.trend-mini-expand-hint {
  position: absolute; right: 20px; bottom: 16px;
  font-size: 11px; color: var(--primary); opacity: 0;
  transition: opacity 0.2s;
  background: #e8f4ff; padding: 2px 10px; border-radius: 10px; border: 1px solid #bae0ff;
  pointer-events: none;
}
.trend-mini-svg-wrap {
  width: 100%; overflow: visible;
}
/* SVG draw-on animation */
@keyframes trendLineDraw {
  from { stroke-dashoffset: var(--dash-len, 1000); }
  to   { stroke-dashoffset: 0; }
}
@keyframes trendFadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes trendDotPop {
  0%   { r: 0; opacity: 0; }
  60%  { r: 6px; opacity: 1; }
  100% { r: 4px; opacity: 1; }
}
.trend-mini-line {
  fill: none;
  stroke: #1677ff;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  animation: trendLineDraw 0.9s cubic-bezier(0.4,0,0.2,1) forwards;
}
.trend-mini-area {
  animation: trendFadeIn 0.7s 0.4s ease both;
}
.trend-mini-dot {
  fill: #fff;
  stroke: #1677ff;
  stroke-width: 2;
  cursor: pointer;
  transition: r 0.15s, fill 0.15s;
}
.trend-mini-dot:hover { fill: #1677ff; r: 5px; }
.trend-mini-dot-group { animation: trendFadeIn 0.4s ease both; }
/* Tooltip */
.trend-mini-tooltip {
  pointer-events: none;
  transition: opacity 0.15s;
}
/* Expand / collapse animation */
.trend-detail-body {
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.38s cubic-bezier(0.4,0,0.2,1);
}
.trend-detail-body.open {
  max-height: 900px;
}
/* no-data state */
.trend-mini-empty {
  height: 64px; display: flex; align-items: center; justify-content: center;
  font-size: 12px; color: var(--text-tertiary); gap: 6px;
}

/* ===== SUBDIM PIE ===== */
.subdim-pie-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}
.subdim-pie-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px 12px;
  display: flex;
  flex-direction: column;
}
.subdim-pie-title {
  font-size: 13px; font-weight: 600; color: var(--text);
  margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
}
.subdim-pie-wrap {
  position: relative;
  height: 180px;
  flex-shrink: 0;
}
.subdim-pie-l3-panel {
  min-height: 68px;
  margin-top: 10px;
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  background: #f8faff;
  border: 1px solid #e0ecff;
  font-size: 11px;
}
.subdim-pie-l3-panel .l3-title {
  font-size: 12px; font-weight: 600; color: var(--primary);
  margin-bottom: 6px; display: flex; align-items: center; gap: 5px;
}
.subdim-pie-l3-panel .l3-color-dot {
  width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; display: inline-block;
}
.subdim-pie-l3-panel .l3-tags {
  display: flex; flex-wrap: wrap; gap: 4px;
}
.subdim-pie-l3-panel .l3-tag-item {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 2px 7px; border-radius: 10px;
  background: #e8f4ff; color: #1677ff; font-size: 11px; cursor: pointer;

<script>
'use strict';

// ===== CONSTANTS =====
const STORAGE_KEY = 'viz_batches_v7';
const PAGE_SIZES = [20, 50, 100, 200];

// ===== DYNAMIC FORMAT DETECTION =====
// Detects any CSV with "output.视频1-" prefixed score columns (new video format)
// regardless of intermediate path segments (e.g. "output.视频1-画面质量-清晰度")

// Given all header keys, find score columns: output.视频1-...  (last segment is score name)
function detectVideoFormatScoreCols(keys) {
  return keys.filter(k => /^output\.视频\d+-/.test(k) && !k.includes('整体分'));
}

// Extract short display name from a score column key
// e.g. "output.视频1-画面质量-清晰度" -> "清晰度"
//      "output.视频1-清晰度"            -> "清晰度"
function scoreColShortName(key) {
  const m = key.match(/^output\.视频\d+-(.+)$/);
  if (!m) return key;
  const parts = m[1].split('-');
  return parts[parts.length - 1];
}

// Build score map: { srcCol -> shortName }
function buildScoreMap(scoreKeys) {
  const map = {};
  scoreKeys.forEach(k => { map[k] = scoreColShortName(k); });
  return map;
}

// Parse subdim columns: "output.N分-xxx" where N is a score value
// Returns array of { srcCol, score, label } for subdim lookup
function buildSubdimColIndex(keys) {
  const result = [];
  keys.forEach(k => {
    const m = k.match(/^output\.(\d+(?:\.\d+)?)分-(.+)$/);
    if (m) result.push({ srcCol: k, score: parseFloat(m[1]), label: m[2] });
  });
  return result;
}

// ===== LEGACY HARDCODED CONSTANTS (kept for backward compat with saved data) =====
const NEW_FORMAT_META_COLS = ['任务编号','题包key','任务明细ID','题目ID','标注人','标注时间','是否有效','无效原因','无效标签'];
const NEW_FORMAT_PASSTHROUGH_COLS = ['input.cut_off_url','结果预览','当前节点','质检信息','标注版本'];
const NEW_FORMAT_PASSTHROUGH_RENAME = {
    'output.caption是否描述出问题（漏误检内容及转场跳变等）': 'caption问题',
};

// ===== STATE =====
let batches = [];         // [{id, name, time, rows, scoreCols, isNewFormat, hasSubdim, categoryId}]
let categories = [];      // [{id, name}]  — user-defined data categories
let activeBatchId = null;
let chartFilter = null;   // {type, value} - filter for table rows
let distFilters = [];     // [{level:1|2|3, col, label}] - multi-select filters for dist chart
let distFilterExpandedCol = null;  // which L1 col is expanded in the filter bar
let distFilterExpandedL2 = null;   // 'col::l2label' expanded for L3
let sortConfig = { col: null, dir: 'asc' };
let searchQuery = '';
let currentPage = 1;
let pageSize = 20;
let expandedRows = new Set();
let trendSelectedBatches = null; // null = all
let trendHiddenMetrics = new Set(['lowrate','highrate']); // default: only show avg
let trendSeenMetrics = new Set(['avg','lowrate','highrate']); // track which metrics have been seen (for auto-hide logic)
let trendViewMode = 'line'; // 'bar' | 'line'
let trendExpanded = false;  // false = collapsed (mini sparkline only)
// State for dim-dist filter (separate from distFilters which are for the overall dist chart)
let dimDistFilter = null; // {level:1|2|3, col, label} — single active filter for dim-dist chart
let dimDistExpandedCol = null;
let dimDistExpandedL2 = null;

// Chart instances
let charts = {};

// ===== UTILITY =====
function genId() {
  return Math.random().toString(36).slice(2) + Date.now().toString(36);
}
function showToast(msg, type='', duration=2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = type ? `show ${type}` : 'show';
  clearTimeout(el._timer);
  el._timer = setTimeout(() => { el.className = ''; }, duration);
}
function closeModal(id) {
  document.getElementById(id).style.display = 'none';
}

// ===== STORAGE (IndexedDB) =====
const DB_NAME = 'dataviz_db';
const DB_VERSION = 2;          // bumped for new categories store
const STORE_NAME = 'batches';
const CAT_STORE = 'categories';
let _db = null;

function openDB() {
  if (_db) return Promise.resolve(_db);
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE_NAME)) {
        db.createObjectStore(STORE_NAME, { keyPath: 'id' });
      }
      if (!db.objectStoreNames.contains(CAT_STORE)) {
        db.createObjectStore(CAT_STORE, { keyPath: 'id' });
      }
    };
    req.onsuccess = e => { _db = e.target.result; resolve(_db); };
    req.onerror = e => reject(e.target.error);
  });
}

function saveState() {
  openDB().then(db => {
    const tx = db.transaction([STORE_NAME, CAT_STORE], 'readwrite');
    const bStore = tx.objectStore(STORE_NAME);
    const cStore = tx.objectStore(CAT_STORE);
    bStore.clear();
    batches.forEach(b => {
      bStore.put({
        id: b.id, name: b.name, time: b.time,
        rows: b.rows, scoreCols: b.scoreCols,
        isNewFormat: b.isNewFormat, hasSubdim: b.hasSubdim,
        categoryId: b.categoryId || null
      });
    });
    cStore.clear();
    categories.forEach(c => cStore.put({ id: c.id, name: c.name }));
    tx.onerror = () => showToast('数据保存失败，请检查浏览器存储权限', 'error');
  }).catch(() => {
    try {
      const data = { batches: batches.map(b => ({
        id: b.id, name: b.name, time: b.time,
        rows: b.rows, scoreCols: b.scoreCols,
        isNewFormat: b.isNewFormat, hasSubdim: b.hasSubdim,
        categoryId: b.categoryId || null
      })), categories };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch(e) {
      showToast('存储空间不足，数据未能持久化', 'error');
    }
  });
}

function loadState() {
  return openDB().then(db => {
    return new Promise((resolve) => {
      const tx = db.transaction([STORE_NAME, CAT_STORE], 'readonly');
      const bReq = tx.objectStore(STORE_NAME).getAll();
      const cReq = tx.objectStore(CAT_STORE).getAll();
      let bData = null, cData = null;
      const tryResolve = () => {
        if (bData === null || cData === null) return;
        if (bData.length > 0 || cData.length > 0) {
          categories = cData.map(c => ({ id: c.id, name: c.name }));
          batches = bData.map(b => ({
            id: b.id || genId(), name: b.name || '未命名',
            time: b.time || '', rows: b.rows || [],
            scoreCols: b.scoreCols || [], isNewFormat: !!b.isNewFormat,
            hasSubdim: !!b.hasSubdim, categoryId: b.categoryId || null
          }));
          resolve();
        } else {
          // Migrate from localStorage
          try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw) {
              const legacy = JSON.parse(raw);
              // Support both old array format and new {batches, categories} format
              const legacyBatches = Array.isArray(legacy) ? legacy : (legacy.batches || []);
              const legacyCats = Array.isArray(legacy) ? [] : (legacy.categories || []);
              categories = legacyCats.map(c => ({ id: c.id, name: c.name }));
              batches = legacyBatches.map(b => ({
                id: b.id || genId(), name: b.name || '未命名',
                time: b.time || '', rows: b.rows || [],
                scoreCols: b.scoreCols || [], isNewFormat: !!b.isNewFormat,
                hasSubdim: !!b.hasSubdim, categoryId: b.categoryId || null
              }));
              saveState();
              localStorage.removeItem(STORAGE_KEY);
            }
          } catch(e) { console.error('Migration failed:', e); }
          resolve();
        }
      };
      bReq.onsuccess = e => { bData = e.target.result || []; tryResolve(); };
      bReq.onerror = () => { bData = []; tryResolve(); };
      cReq.onsuccess = e => { cData = e.target.result || []; tryResolve(); };
      cReq.onerror = () => { cData = []; tryResolve(); };
    });
  }).catch(err => {
    console.warn('IndexedDB unavailable, using localStorage:', err);
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const legacy = JSON.parse(raw);
        const legacyBatches = Array.isArray(legacy) ? legacy : (legacy.batches || []);
        const legacyCats = Array.isArray(legacy) ? [] : (legacy.categories || []);
        categories = legacyCats.map(c => ({ id: c.id, name: c.name }));
        batches = legacyBatches.map(b => ({
          id: b.id || genId(), name: b.name || '未命名',
          time: b.time || '', rows: b.rows || [],
          scoreCols: b.scoreCols || [], isNewFormat: !!b.isNewFormat,
          hasSubdim: !!b.hasSubdim, categoryId: b.categoryId || null
        }));
      }
    } catch(e) { console.error('Load state failed:', e); }
  });
}

// ===== CSV FORMAT DETECTION =====
// Strip BOM from all keys in a row
function stripBomKeys(rows) {
  if (!rows || !rows.length) return rows;
  const bom = '\ufeff';
  return rows.map(r => {
    const out = {};
    Object.keys(r).forEach(k => {
      out[k.startsWith(bom) ? k.slice(1) : k] = r[k];
    });
    return out;
  });
}

function isNewFormat(rows) {
  if (!rows || !rows.length) return false;
  const keys = Object.keys(rows[0]);
  return detectVideoFormatScoreCols(keys).length > 0;
}

/// Heuristic: is a field value likely to be a non-score (URL, long text, large number, etc.)?
function looksLikeNonScoreValue(raw) {
  if (raw == null || raw === '') return false;
  const s = String(raw).trim();
  if (s.startsWith('http://') || s.startsWith('https://')) return true;
  if (s.length > 60) return true;
  return false;
}

// Get all candidate fields from rows (excluding internal/structural keys)
function getCandidateKeys(rows) {
  if (!rows || !rows.length) return [];
  return Object.keys(rows[0]).filter(k =>
    !k.startsWith('_') &&
    !k.endsWith('_level2') &&
    !k.endsWith('_level3') &&
    k.trim() !== ''
  );
}

function detectScoreCols(rows) {
  if (!rows || !rows.length) return { cols: [], isNew: false };
  const keys = Object.keys(rows[0]);
  const videoScoreKeys = detectVideoFormatScoreCols(keys);
  if (videoScoreKeys.length > 0) {
    // Video format: use short names as scoreCols
    const scoreMap = buildScoreMap(videoScoreKeys);
    return { cols: Object.values(scoreMap), isNew: true, scoreMap, videoScoreKeys };
  }
  // General format: find columns whose values look like scores (1-5 range)
  // Support both plain numbers and "3分-xxx" style strings
  const sampleSize = Math.min(100, rows.length);
  const sample = rows.slice(0, sampleSize);
  const candidateKeys = getCandidateKeys(rows);
  const scoreCols = candidateKeys.filter(k => {
    // Skip if any sample value looks like a non-score
    if (sample.some(r => looksLikeNonScoreValue(r[k]))) return false;
    const vals = sample
      .map(r => {
        const raw = r[k];
        if (raw == null || raw === '') return NaN;
        // Try direct parse
        const direct = parseFloat(raw);
        if (!isNaN(direct)) return direct;
        // Try extracting leading number from strings like "3分-xxx" or "3.5分"
        const m = String(raw).trim().match(/^(\d+(?:\.\d+)?)\s*分/);
        return m ? parseFloat(m[1]) : NaN;
      })
      .filter(v => !isNaN(v));
    if (vals.length < Math.max(3, sampleSize * 0.3)) return false;
    // All parsed values must be in [0.5, 5.5]
    return vals.every(v => v >= 0.5 && v <= 5.5);
  });
  return { cols: scoreCols, isNew: false };
}

function detectHasSubdim(rows) {
  if (!rows || !rows.length) return false;
  const keys = Object.keys(rows[0]);
  return keys.some(k => k.endsWith('_level2') || k.endsWith('_level3'));
}


function extractScore(val) {
    if (val == null || val === '') return '';
    const s = String(val).trim();
    const m = s.match(/^(\d+(?:\.\d+)?)\s*分/);
    return m ? m[1] : s;
}

// ===== NORMALIZE ROWS =====
// For video format: dynamically build short-name score fields and L2/L3 subdim fields
function normalizeRows(rawRows, isNew, scoreMap, subdimColIndex) {
  if (!isNew) {
    return rawRows;
  }
  // scoreMap: { srcCol -> shortName }, subdimColIndex: [{srcCol, score, label}]
  return rawRows.map((raw) => {
    const row = {};
    // Copy all non-score cols (meta, passthrough, etc.)
    Object.keys(raw).forEach(k => {
      if (!(k in (scoreMap || {}))) row[k] = raw[k];
    });
    // Score cols: extract numeric value, store under short name
    Object.entries(scoreMap || {}).forEach(([srcCol, shortName]) => {
      const val = raw[srcCol] != null ? raw[srcCol] : '';
      row[shortName] = extractScore(val);
    });
    // L2/L3 subdim extraction
    // For each score col, the L2 is the label after "N分-" in the value
    // L3 comes from the matching "output.N分-L2label" column
    Object.entries(scoreMap || {}).forEach(([srcCol, shortName]) => {
      const rawVal = String(raw[srcCol] || '').trim();
      if (!rawVal) return;
      const scoreMatch = rawVal.match(/^(\d+(?:\.\d+)?)分-(.+)$/);
      if (!scoreMatch) return;
      const scoreNum = parseFloat(scoreMatch[1]);
      const l2Label = scoreMatch[2].trim();
      row[shortName + '_level2'] = l2Label;
      // Find L3 column: subdim col that matches this score number
      // There may be multiple subdim cols at this score level; find by score match
      if (subdimColIndex) {
        const subdimCols = subdimColIndex.filter(s => s.score === scoreNum);
        // Try to find the one whose label matches l2Label, or just use all at this score
        let l3Parts = [];
        subdimCols.forEach(s => {
          const subVal = String(raw[s.srcCol] || '').trim();
          if (!subVal) return;
          subVal.split(';').forEach(seg => {
            seg = seg.trim();
            if (!seg) return;
            // Format: "key:label" or just "label"
            const label = seg.includes(':') ? seg.split(':').slice(1).join(':').trim() : seg;
            if (label) l3Parts.push(label);
          });
        });
        if (l3Parts.length) row[shortName + '_level3'] = l3Parts.join('；');
      }
    });
    row._isNewFormat = true;
    return row;
  });
}

// ===== SCORE CALCULATION =====
function parseScoreVal(v) {
  if (v == null || v === '') return NaN;
  const n = parseFloat(v);
  if (!isNaN(n)) return n;
  // Handle "3分-xxx" style strings
  const m = String(v).trim().match(/^(\d+(?:\.\d+)?)\s*分/);
  return m ? parseFloat(m[1]) : NaN;
}

function calcOverallScore(row, scoreCols, isNewFmt) {
  const vals = {};
  scoreCols.forEach(c => { vals[c] = parseScoreVal(row[c]); });
  const all = scoreCols.map(c => vals[c]).filter(v => !isNaN(v));
  if (all.length === 0) return NaN;
  if (!isNewFmt) {
    return parseFloat((all.reduce((a,b)=>a+b,0)/all.length).toFixed(2));
  }
  // Video format: apply quality rules using fuzzy col name matching
  // Find cols by keyword matching to support different naming conventions
  const findVal = (...keywords) => {
    const col = scoreCols.find(c => keywords.some(kw => c.includes(kw)));
    return col ? vals[col] : NaN;
  };
  const qd = findVal('清晰度');
  const cq = findVal('内容质量', '内容');
  const ae = findVal('美学');
  const db = findVal('动态基础', '基础质量');
  const ds = findVal('动态强度', '动态强');
  // If we can find all 5 key dims, use rule-based scoring
  if ([qd,cq,ae,db,ds].every(v => !isNaN(v))) {
    if(all.some(x=>x===1)) return 1.00;
    if(all.every(x=>x>=4) && all.filter(x=>x>=5).length>=2) return 5.00;
    if([qd,ae,db,ds].every(x=>x>=3.5) && [db,ds].some(x=>x>=4) && cq>=3) return 4.00;
    if(all.every(x=>x>=3) && [ae,db,ds].some(x=>x>=3.5)) return 3.50;
    if(qd>=3 && cq>=3 && ae>=2 && db>=2 && ds>=2) return 3.00;
    if([qd,cq].some(x=>x===2.5) && ae>=2 && db>=2 && ds>=2) return 2.50;
    if([qd,cq].some(x=>x===2) && ae>=2 && db>=2 && ds>=2) return 2.00;
  }
  // Fallback: weighted average; any score of 1 pulls overall to 1
  if (all.some(x => x === 1)) return 1.00;
  return parseFloat((all.reduce((a,b)=>a+b,0)/all.length).toFixed(2));
}

function getScoreClass(v) {
  if (isNaN(v)) return '';
  if (v >= 3.5) return 'score-high';
  if (v >= 2.5) return 'score-mid';
  return 'score-low';
}

// ===== FILENAME -> TIME =====
function extractTimeFromFilename(name) {
  const base = name.replace(/\.[^.]+$/, '').trim();
  const zhMatch = base.match(/(\d{4})年(\d{1,2})月/);
  if (zhMatch) return `${zhMatch[1]}年${parseInt(zhMatch[2])}月`;
  const m1 = base.match(/(\d{4})[-_](\d{1,2})(?!\d)/);
  if (m1) return `${m1[1]}年${parseInt(m1[2])}月`;
  const m2 = base.match(/^(\d{4})(\d{2})$/);
  if (m2) return `${m2[1]}年${parseInt(m2[2])}月`;
  const mq = base.match(/(\d{4})[\s_-]?Q(\d)/i);
  if (mq) return `${mq[1]}年Q${mq[2]}`;
  const md = base.match(/(\d{4})[-_](\d{2})[-_](\d{2})/);
  if (md) return `${md[1]}-${md[2]}-${md[3]}`;
  return base.slice(0, 30) || new Date().toISOString().slice(0, 10);
}

// ===== CSV UPLOAD =====
function handleFiles(files) {
  Array.from(files).forEach(file => {
    if (!file.name.endsWith('.csv')) {
      showToast(`${file.name} 不是CSV文件`, 'error');
      return;
    }
    Papa.parse(file, {
      header: true,
      skipEmptyLines: true,
      complete(result) {
        const rawRows = stripBomKeys(result.data);
        if (!rawRows.length) { showToast('CSV 文件为空', 'error'); return; }
        const { cols: detectedCols, isNew, scoreMap, videoScoreKeys } = detectScoreCols(rawRows);
        // Build subdim col index for video format
        const subdimColIndex = isNew ? buildSubdimColIndex(Object.keys(rawRows[0])) : null;
        const finalizeImport = (finalCols, categoryId) => {
          const normalizedRows = normalizeRows(rawRows, isNew, scoreMap, subdimColIndex);
          const hasSubdim = detectHasSubdim(normalizedRows);
          const time = extractTimeFromFilename(file.name);
          const batchName = file.name.replace(/\.csv$/i, '');
          const batch = {
            id: genId(),
            name: batchName,
            time: time,
            rows: normalizedRows,
            scoreCols: finalCols,
            isNewFormat: isNew,
            hasSubdim: hasSubdim,
            categoryId: categoryId || null
          };
          batches.unshift(batch);
          activeBatchId = batch.id;
          chartFilter = null;
          distFilters = [];
          sortConfig = { col: null, dir: 'asc' };
          searchQuery = '';
          currentPage = 1;
          saveState();
          renderAll();
          showToast(`已加载 ${normalizedRows.length} 条数据 (${isNew ? '新格式' : '通用格式'}${finalCols.length ? '，' + finalCols.length + '个维度' : ''})`, 'success');
        };

        // Determine cols, then pick category (if categories exist)
        const doPickCategoryThen = (finalCols) => {
          if (categories.length === 0) {
            finalizeImport(finalCols, null);
          } else {
            showCatPick(catId => finalizeImport(finalCols, catId));
          }
        };

        if (isNew) {
          doPickCategoryThen(detectedCols);
        } else if (detectedCols.length > 0) {
          doPickCategoryThen(detectedCols);
        } else {
          // Auto-detect failed: show field picker first, then category
          showFieldPicker(
            rawRows,
            [],
            `"${file.name}" 未能自动识别评分字段，请手动选择哪些列是评分维度（值应为 1-5 的数字）`,
            (selectedCols) => {
              if (!selectedCols.length) {
                showToast('未选择任何评分字段，批次已跳过', 'error');
                return;
              }
              doPickCategoryThen(selectedCols);
            }
          );
        }
      },
      error(err) {
        showToast(`解析失败: ${err.message}`, 'error');
      }
    });
  });
}

// ===== SIDEBAR =====
// Track which category groups are collapsed
let collapsedCats = new Set();

function renderSidebar() {
  const list = document.getElementById('batch-list');
  const count = document.getElementById('batch-count');
  count.textContent = `${batches.length}个`;

    renderSidebarToolbar();
    return;
  }

  let html = '';

  // Render each category group
  categories.forEach(cat => {
    const catBatches = batches.filter(b => b.categoryId === cat.id);
    const isOpen = !collapsedCats.has(cat.id);
    html += `<div class="cat-group" data-catid="${cat.id}">
      <div class="cat-header">
        <span class="cat-toggle ${isOpen ? 'open' : ''}" onclick="toggleCatCollapse('${cat.id}')">&#8250;</span>
        <span class="cat-header-label" title="${escHtml(cat.name)}" ondblclick="startRenameCat('${cat.id}')">${escHtml(cat.name)}</span>
        <span style="font-size:10px;color:var(--text-tertiary);flex-shrink:0;margin-right:2px">${catBatches.length}</span>
        <span class="cat-actions">
          <button class="cat-action-btn" title="重命名" onclick="startRenameCat('${cat.id}')">&#9998;</button>
          <button class="cat-action-btn del" title="删除分类" onclick="deleteCategory('${cat.id}')">&#215;</button>
        </span>
      </div>
      <div class="cat-batches" style="${isOpen ? '' : 'display:none'}">
        ${catBatches.length ? catBatches.map(b => renderBatchItem(b)).join('') : `<div style="padding:4px 16px 4px 24px;font-size:11px;color:var(--text-tertiary)">暂无批次</div>`}
      </div>
    </div>`;
  });

  // Uncategorized batches
  const uncatBatches = batches.filter(b => !b.categoryId);
  if (uncatBatches.length) {
    html += `<div class="cat-group" data-catid="__uncat__">
      <div class="cat-header">
        <span class="cat-toggle ${!collapsedCats.has('__uncat__') ? 'open' : ''}" onclick="toggleCatCollapse('__uncat__')">&#8250;</span>
        <span class="cat-header-label" style="color:var(--text-tertiary)">未分类</span>
        <span style="font-size:10px;color:var(--text-tertiary);flex-shrink:0;margin-right:2px">${uncatBatches.length}</span>
        <span class="cat-actions"></span>
      </div>
      <div class="cat-batches" style="${collapsedCats.has('__uncat__') ? 'display:none' : ''}">
        ${uncatBatches.map(b => renderBatchItem(b)).join('')}
      </div>
    </div>`;
  }

  list.innerHTML = html;
  renderSidebarToolbar();
}

function renderBatchItem(b) {
  const isActive = b.id === activeBatchId;
  // Build category move options
  const otherCats = categories.filter(c => c.id !== b.categoryId);
  const moveOpts = [
    ...(b.categoryId ? [`<option value="">— 移到未分类</option>`] : []),
    ...otherCats.map(c => `<option value="${c.id}">${escHtml(c.name)}</option>`)
  ].join('');
  const moveBtn = (categories.length > 0 || b.categoryId) ? `
    <select class="batch-move-select" title="迁移到分类" onchange="moveBatchToCategory('${b.id}',this.value);this.value=''" onclick="event.stopPropagation()" style="border:none;background:transparent;font-size:11px;color:var(--text-tertiary);cursor:pointer;padding:0 2px;max-width:20px;outline:none">
      <option value="" disabled selected>⇄</option>
      ${moveOpts}
    </select>` : '';
  return `
  <div class="batch-item ${isActive ? 'active' : ''}" data-id="${b.id}" onclick="selectBatch('${b.id}')">
    <div class="batch-dot"></div>
    <div class="batch-info">
      <div class="batch-name" id="bname-${b.id}" ondblclick="editBatchName('${b.id}',event)">${escHtml(b.name)}</div>
      <div class="batch-meta">${b.time || ''} &middot; ${b.rows.length}条</div>
    </div>
    ${moveBtn}
    <button class="batch-del" onclick="deleteBatch('${b.id}',event)" title="删除">&#215;</button>
  </div>`;
}

function renderSidebarToolbar() {
  // Inject new-category button into sidebar-footer area, but only once
  let toolbar = document.getElementById('sidebar-cat-toolbar');
  if (!toolbar) {
    const footer = document.querySelector('.sidebar-footer');
    toolbar = document.createElement('div');
    toolbar.id = 'sidebar-cat-toolbar';
    toolbar.className = 'sidebar-cat-toolbar';
    footer.parentNode.insertBefore(toolbar, footer);
  }
  toolbar.innerHTML = `<button class="btn btn-default btn-sm" style="flex:1;font-size:11px" onclick="createCategory()">+ 新建分类</button>`;
}

function toggleCatCollapse(catId) {
  if (collapsedCats.has(catId)) collapsedCats.delete(catId);
  else collapsedCats.add(catId);
  renderSidebar();
}

function startRenameCat(catId) {
  const cat = categories.find(c => c.id === catId);
  if (!cat) return;
  const header = document.querySelector(`.cat-group[data-catid="${catId}"] .cat-header-label`);
  if (!header) return;
  const oldName = cat.name;
  header.outerHTML = `<input class="cat-name-edit" id="cat-edit-${catId}" value="${escHtml(oldName)}" maxlength="30" onclick="event.stopPropagation()">`;
  const inp = document.getElementById('cat-edit-' + catId);
  inp.focus(); inp.select();
  const done = () => {
    const nv = inp.value.trim() || oldName;
    cat.name = nv;
    saveState();
    renderSidebar();
  };
  inp.addEventListener('blur', done);
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') done(); if (e.key === 'Escape') renderSidebar(); });
}

function createCategory() {
  const name = prompt('请输入新分类名称：', '');
  if (!name || !name.trim()) return;
  categories.push({ id: genId(), name: name.trim() });
  saveState();
  renderSidebar();
}

function deleteCategory(catId) {
  const cat = categories.find(c => c.id === catId);
  if (!cat) return;
  const count = batches.filter(b => b.categoryId === catId).length;
  const msg = count
    ? `删除分类「${cat.name}」？其下 ${count} 个批次将变为未分类。`
    : `删除分类「${cat.name}」？`;
  if (!confirm(msg)) return;
  categories = categories.filter(c => c.id !== catId);
  batches.forEach(b => { if (b.categoryId === catId) b.categoryId = null; });
  saveState();
  renderSidebar();
  showToast('分类已删除');
}

function moveBatchToCategory(batchId, catId) {
  const b = batches.find(x => x.id === batchId);
  if (!b) return;
  b.categoryId = catId || null;
  saveState();
  renderSidebar();
  const catName = catId ? (categories.find(c => c.id === catId)?.name || '') : '未分类';
  showToast(`已移到「${catName}」`);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function selectBatch(id) {
  if (activeBatchId === id) return;
  activeBatchId = id;
  chartFilter = null;
  distFilters = [];
  distFilterExpandedCol = null;
  distFilterExpandedL2 = null;
  sortConfig = { col: null, dir: 'asc' };
  searchQuery = '';
  currentPage = 1;
  expandedRows.clear();
  renderAll();
}

function deleteBatch(id, e) {
  e && e.stopPropagation();
  batches = batches.filter(b => b.id !== id);
  if (activeBatchId === id) {
    activeBatchId = batches.length ? batches[0].id : null;
  }
  chartFilter = null;
  distFilters = [];
  currentPage = 1;
  saveState();
  renderAll();
  showToast('批次已删除');
}

function editBatchName(id, e) {
  e.stopPropagation();
  const b = batches.find(x => x.id === id);

  const el = document.getElementById('bname-' + id);

function buildContentHTML(batch) {
  const rows = batch.rows;
  const scoreCols = batch.scoreCols;
  const scores = rows.map(r => calcOverallScore(r, scoreCols, batch.isNewFormat)).filter(v => !isNaN(v));
  const avg = scores.length ? (scores.reduce((a,b)=>a+b,0)/scores.length) : 0;
  const lowCount = scores.filter(v => v < 3).length;
  const highCount = scores.filter(v => v >= 4).length;
  const lowRate = scores.length ? (lowCount / scores.length * 100) : 0;
  const highRate = scores.length ? (highCount / scores.length * 100) : 0;

  // Build dim stats
  const dimStats = scoreCols.map(col => {
    const vals = rows.map(r => parseFloat(r[col])).filter(v => !isNaN(v));
    const colAvg = vals.length ? (vals.reduce((a,b)=>a+b,0)/vals.length) : 0;
    return { col, avg: colAvg.toFixed(2) };
  });

  // Format badge
  const fmtBadge = batch.isNewFormat
    ? '<span class="tag tag-new">新格式</span>'
    : '<span class="tag tag-old">老格式</span>';

  return `

  </div>

  <!-- Trend Card (top, collapsed by default) -->

      <h3>历史趋势对比</h3>
      <div class="card-header-actions">

// ===== TREND CHART =====
// Colors for metrics
const TREND_COLORS = [
  '#1677ff','#52c41a','#faad14','#ff4d4f','#722ed1','#13c2c2','#eb2f96','#fa8c16',
  '#2f54eb','#389e0d','#d4b106','#cf1322','#531dab','#08979c','#c41d7f','#d46b08'
];

// Collect all metrics across batches for trend display
function getTrendMetrics(activeBatches) {
  const dimSet = new Set();
  activeBatches.forEach(b => (b.scoreCols || []).forEach(c => dimSet.add(c)));
  const dims = Array.from(dimSet);
  return [
    { key: 'avg', label: '综合分', suffix: '' },
    { key: 'lowrate', label: '低分率', suffix: '%' },
    { key: 'highrate', label: '高质率', suffix: '%' },
    ...dims.map(c => ({ key: c, label: c, suffix: '' }))
  ];
}

function calcBatchMetricValue(b, metricKey) {
  const rows = b.rows;
  const scoreCols = b.scoreCols;
  const scores = rows.map(r => calcOverallScore(r, scoreCols, b.isNewFormat)).filter(v => !isNaN(v));
  if (metricKey === 'avg') {
    return scores.length ? parseFloat((scores.reduce((a,v)=>a+v,0)/scores.length).toFixed(3)) : null;
  } else if (metricKey === 'lowrate') {
    return scores.length ? parseFloat((scores.filter(v=>v<3).length/scores.length*100).toFixed(1)) : null;
  } else if (metricKey === 'highrate') {
    return scores.length ? parseFloat((scores.filter(v=>v>=4).length/scores.length*100).toFixed(1)) : null;
  } else {
    const dimVals = rows.map(r => parseFloat(r[metricKey])).filter(v => !isNaN(v));
    return dimVals.length ? parseFloat((dimVals.reduce((a,v)=>a+v,0)/dimVals.length).toFixed(3)) : null;
  }
}

function getActiveTrendBatches() {
  const activeBatch = batches.find(b => b.id === activeBatchId);
  const activeCatId = activeBatch ? (activeBatch.categoryId || null) : null;
  // Only include batches from the same category as the active batch
  const sameCat = batches.filter(b => (b.categoryId || null) === activeCatId);
  const sorted = [...sameCat].sort((a, b) => (a.time || '').localeCompare(b.time || ''));
  return sorted.filter(b => !trendSelectedBatches || trendSelectedBatches.includes(b.id));
}

function renderTrendCompareTable(activeBatches) {
  const wrap = document.getElementById('trend-compare-table-wrap');
  if (!wrap) return;
  if (activeBatches.length < 1) { wrap.innerHTML = ''; return; }

  const metrics = getTrendMetrics(activeBatches);
  // Compute all values
  const tableData = activeBatches.map(b => ({
    name: b.name,
    values: metrics.map(m => calcBatchMetricValue(b, m.key))
  }));

  // Find best/worst per metric column (for highlight)
  const metricBest = metrics.map((m, mi) => {
    const vals = tableData.map(r => r.values[mi]).filter(v => v !== null);
    if (!vals.length) return null;
    // For lowrate: best = min; for others: best = max
    return m.key === 'lowrate' ? Math.min(...vals) : Math.max(...vals);
  });
  const metricWorst = metrics.map((m, mi) => {
    const vals = tableData.map(r => r.values[mi]).filter(v => v !== null);
    if (!vals.length) return null;
    return m.key === 'lowrate' ? Math.max(...vals) : Math.min(...vals);
  });

  let html = `<table class="trend-compare-table">
    <thead><tr>
      <th>批次</th>
      ${metrics.map(m => `<th>${escHtml(m.label)}${m.suffix ? '<br><small style="font-weight:400;color:var(--text-tertiary)">' + m.suffix + '</small>' : ''}</th>`).join('')}
    </tr></thead>
    <tbody>`;

  tableData.forEach(row => {
    html += `<tr><td title="${escHtml(row.name)}">${escHtml(row.name.length > 18 ? row.name.slice(0,18) + '…' : row.name)}</td>`;
    row.values.forEach((v, mi) => {
      const m = metrics[mi];
      const isBest = v !== null && v === metricBest[mi] && activeBatches.length > 1;
      const isWorst = v !== null && v === metricWorst[mi] && activeBatches.length > 1 && metricBest[mi] !== metricWorst[mi];
      let cls = '';
      if (isBest) cls = 'tc-best';
      else if (isWorst) cls = 'tc-worst';
      let valCls = '';
      if (m.key === 'avg') {
        valCls = v >= 4 ? 'tc-good' : v >= 3 ? 'tc-warn' : v !== null ? 'tc-bad' : '';
      } else if (m.key === 'lowrate') {
        valCls = v > 30 ? 'tc-bad' : v > 10 ? 'tc-warn' : v !== null ? 'tc-good' : '';
      } else if (m.key === 'highrate') {
        valCls = v >= 20 ? 'tc-good' : v >= 5 ? 'tc-warn' : v !== null ? 'tc-bad' : '';
      }
      const display = v !== null ? `${v}${m.suffix}` : '—';
      html += `<td class="${cls}"><span class="${valCls}">${display}</span></td>`;
    });
    html += '</tr>';
  });

  html += '</tbody></table>';
  wrap.innerHTML = html;
}

function renderTrendMetricToggles(metrics) {
  const wrap = document.getElementById('trend-metric-toggles');
  if (!wrap) return;
  wrap.innerHTML = '';
  // Auto-hide dimension metrics that haven't been explicitly toggled yet
  // (track which keys have been seen; new ones default to hidden)
  metrics.forEach(m => {
    if (!trendSeenMetrics.has(m.key)) {
      trendSeenMetrics.add(m.key);
      if (m.key !== 'avg') trendHiddenMetrics.add(m.key);
    }
  });
  metrics.forEach((m, i) => {
    const color = TREND_COLORS[i % TREND_COLORS.length];
    const isActive = !trendHiddenMetrics.has(m.key);
    const btn = document.createElement('button');
    btn.className = 'metric-toggle-btn' + (isActive ? ' active' : '');
    btn.style.color = isActive ? color : 'var(--text-secondary)';
    btn.style.borderColor = isActive ? color : 'var(--border)';
    btn.innerHTML = `<span class="metric-toggle-dot" style="background:${isActive ? color : 'var(--border)'}"></span>${escHtml(m.label)}`;
    btn.onclick = () => {
      if (trendHiddenMetrics.has(m.key)) trendHiddenMetrics.delete(m.key);
      else trendHiddenMetrics.add(m.key);
      renderTrendChart();
    };
    wrap.appendChild(btn);
  });
}

function renderTrendChart() {
  const canvas = document.getElementById('chart-trend');
  if (!canvas) return;
  if (charts['trend']) { try { charts['trend'].destroy(); } catch(e) {} delete charts['trend']; }

  const activeBatches = getActiveTrendBatches();
  renderTrendCompareTable(activeBatches);

  if (activeBatches.length < 1) {
    canvas.parentElement.style.display = 'none';
    return;
  }
  canvas.parentElement.style.display = '';

  const metrics = getTrendMetrics(activeBatches);
  renderTrendMetricToggles(metrics);

  const visibleMetrics = metrics.filter(m => !trendHiddenMetrics.has(m.key));
  if (!visibleMetrics.length) return;

  const labels = activeBatches.map(b => b.name.length > 15 ? b.name.slice(0,15) + '…' : b.name);
  const isLine = trendViewMode === 'line';

  const datasets = visibleMetrics.map((m, i) => {
    const colorIdx = metrics.findIndex(x => x.key === m.key);
    const color = TREND_COLORS[colorIdx % TREND_COLORS.length];
    const values = activeBatches.map(b => calcBatchMetricValue(b, m.key));
    if (isLine) {
      return {
        label: m.label + (m.suffix ? ` (${m.suffix})` : ''),
        data: values,
        borderColor: color,
        backgroundColor: color + '22',
        pointBackgroundColor: color,
        pointRadius: 5, pointHoverRadius: 7,
        fill: false, tension: 0.3, borderWidth: 2,
        spanGaps: true
      };
    }
    return {
      label: m.label + (m.suffix ? ` (${m.suffix})` : ''),
      data: values,
      backgroundColor: color + 'cc',
      borderColor: color,
      borderWidth: 1.5,
      borderRadius: 4,
      spanGaps: true
    };
  });

  charts['trend'] = new Chart(canvas, {
    type: isLine ? 'line' : 'bar',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          display: true,
          position: 'top',
          labels: { font: { size: 11 }, padding: 12, usePointStyle: true, pointStyleWidth: 10 }
        },
        tooltip: {
          callbacks: {
            label: ctx => {
              const m = visibleMetrics[ctx.datasetIndex];
              const v = ctx.parsed.y;
              return ` ${m.label}: ${v !== null ? v + m.suffix : 'N/A'}`;
            }
          }
        }
      },
      scales: {
        x: { grid: { display: false }, ticks: { maxRotation: 30, font: { size: 11 } } },
        y: { beginAtZero: false, grid: { color: '#f0f0f0' }, ticks: { font: { size: 11 } } }
      }
    }
  });
}

function setTrendView(mode) {
  trendViewMode = mode;
  const barBtn = document.getElementById('trend-view-bar');
  const lineBtn = document.getElementById('trend-view-line');
  if (barBtn) {
    barBtn.style.background = mode === 'bar' ? '#e8f4ff' : '#fff';
    barBtn.style.color = mode === 'bar' ? 'var(--primary)' : 'var(--text-secondary)';
  }
  if (lineBtn) {
    lineBtn.style.background = mode === 'line' ? '#e8f4ff' : '#fff';
    lineBtn.style.color = mode === 'line' ? 'var(--primary)' : 'var(--text-secondary)';
  }
  renderTrendChart();
}

function toggleTrendExpand() {
  trendExpanded = !trendExpanded;
  const detail = document.getElementById('trend-detail-body');
  const hint = document.getElementById('trend-collapse-hint');
  const arrow = document.getElementById('trend-collapse-arrow');
  const miniHint = document.querySelector('.trend-mini-expand-hint');
  if (detail) detail.classList.toggle('open', trendExpanded);
  if (hint) hint.textContent = trendExpanded ? '收起' : '点击查看详情';
  if (arrow) arrow.style.transform = trendExpanded ? 'rotate(180deg)' : 'rotate(0deg)';
  if (miniHint) miniHint.textContent = trendExpanded ? '收起详情' : '点击展开详情';
  if (trendExpanded) {
    renderTrendChart();
    renderTrendBatchSelector();
  }
}

function renderTrendMiniChart() {
  const root = document.getElementById('trend-mini-svg-root');
  if (!root) return;
  // Destroy old Chart.js instance if any
  if (charts['trend-mini']) { try { charts['trend-mini'].destroy(); } catch(e) {} delete charts['trend-mini']; }

  const activeBatches = getActiveTrendBatches();

  if (activeBatches.length < 2) {
    root.innerHTML = `<div class="trend-mini-empty">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="flex-shrink:0">
        <path d="M2 12 L6 7 L9 9 L14 4" stroke="#bfbfbf" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="14" cy="4" r="1.5" fill="#bfbfbf"/>
      </svg>
      <span>上传更多同分类批次后可展示趋势折线</span>
    </div>`;
    return;
  }

  const vals = activeBatches.map(b => calcBatchMetricValue(b, 'avg'));
  const labels = activeBatches.map(b => b.name.length > 8 ? b.name.slice(0, 8) + '…' : b.name);
  const n = vals.length;

  // Layout constants
  const W = 600, H = 88;
  const padL = 10, padR = 110, padT = 14, padB = 26;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;

  const validVals = vals.filter(v => v !== null);
  const minV = validVals.length ? Math.min(...validVals) : 0;
  const maxV = validVals.length ? Math.max(...validVals) : 5;
  const range = maxV - minV || 1;

  const xOf = i => padL + (i / (n - 1)) * chartW;
  const yOf = v => v === null ? null : padT + (1 - (v - minV) / range) * chartH;

  // Build smooth path points
  const pts = vals.map((v, i) => ({ x: xOf(i), y: yOf(v), v }));

  // Catmull-Rom to cubic bezier path
  function catmullToCubic(points) {
    const segs = [];
    for (let i = 0; i < points.length - 1; i++) {
      const p0 = points[Math.max(0, i - 1)];
      const p1 = points[i];
      const p2 = points[i + 1];
      const p3 = points[Math.min(points.length - 1, i + 2)];
      const cp1x = p1.x + (p2.x - p0.x) / 6;
      const cp1y = p1.y + (p2.y - p0.y) / 6;
      const cp2x = p2.x - (p3.x - p1.x) / 6;
      const cp2y = p2.y - (p3.y - p1.y) / 6;
      segs.push(`C ${cp1x.toFixed(1)},${cp1y.toFixed(1)} ${cp2x.toFixed(1)},${cp2y.toFixed(1)} ${p2.x.toFixed(1)},${p2.y.toFixed(1)}`);
    }
    return segs.join(' ');
  }

  const validPts = pts.filter(p => p.y !== null);
  const pathD = validPts.length > 1
    ? `M ${validPts[0].x.toFixed(1)},${validPts[0].y.toFixed(1)} ${catmullToCubic(validPts)}`
    : '';

  const areaD = validPts.length > 1
    ? `${pathD} L ${validPts[validPts.length-1].x.toFixed(1)},${(padT+chartH).toFixed(1)} L ${validPts[0].x.toFixed(1)},${(padT+chartH).toFixed(1)} Z`
    : '';

  // Approximate path length for dash animation
  let approxLen = 0;
  for (let i = 1; i < validPts.length; i++) {
    const dx = validPts[i].x - validPts[i-1].x;
    const dy = validPts[i].y - validPts[i-1].y;
    approxLen += Math.sqrt(dx*dx + dy*dy);
  }

  // Trend summary: last value + delta
  const lastVal = vals[n - 1];
  const prevVal = vals[n - 2];
  const delta = (lastVal !== null && prevVal !== null) ? lastVal - prevVal : null;
  const deltaStr = delta !== null ? (delta >= 0 ? `+${delta.toFixed(2)}` : delta.toFixed(2)) : '';
  const deltaColor = delta === null ? '#8c8c8c' : delta > 0 ? '#52c41a' : delta < 0 ? '#ff4d4f' : '#8c8c8c';
  const arrowPath = delta === null ? '' : delta > 0
    ? 'M4,10 L8,3 L12,10'
    : delta < 0
    ? 'M4,3 L8,10 L12,3'
    : 'M3,6.5 L13,6.5';

  // Unique gradient id per render
  const gradId = 'tg_' + Date.now();

  // Build dots SVG with staggered animation delay
  const dotsHtml = pts.map((p, i) => {
    if (p.y === null) return '';
    const delay = `${0.3 + i * 0.08}s`;
    const isLast = i === n - 1;
    return `
    <g class="trend-mini-dot-group" style="animation-delay:${delay}">
      <circle class="trend-mini-dot${isLast ? ' trend-mini-dot-last' : ''}"
        cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="${isLast ? '4' : '3.5'}"
        ${isLast ? 'stroke="#1677ff" stroke-width="2.5" fill="#fff"' : ''}
        onmouseenter="trendMiniShowTip(this,'${escHtml(activeBatches[i].name)}',${p.v?.toFixed(2)})"
        onmouseleave="trendMiniHideTip()"
      />
    </g>`;
  }).join('');

  // Labels below x-axis (only first, middle, last to avoid crowding)
  const labelIdxs = n <= 4 ? [...Array(n).keys()] : [0, Math.floor((n-1)/2), n-1];
  const xlabels = labelIdxs.map(i => {
    const p = pts[i];
    if (!p || p.y === null) return '';
    return `<text x="${p.x.toFixed(1)}" y="${(H-2).toFixed(1)}" text-anchor="middle"
      font-size="10" fill="#8c8c8c">${escHtml(labels[i])}</text>`;
  }).join('');

  root.innerHTML = `
  <div style="display:flex;align-items:center;gap:0">
    <svg viewBox="0 0 ${W} ${H}" class="trend-mini-svg-wrap" style="flex:1;min-width:0;height:${H}px"
         onmouseleave="trendMiniHideTip()">
      <defs>
        <linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#1677ff" stop-opacity="0.18"/>
          <stop offset="100%" stop-color="#1677ff" stop-opacity="0.01"/>
        </linearGradient>
      </defs>
      <!-- area fill -->
      ${areaD ? `<path class="trend-mini-area" d="${areaD}" fill="url(#${gradId})"/>` : ''}
      <!-- line -->
      ${pathD ? `<path class="trend-mini-line" d="${pathD}"
        style="stroke-dasharray:${approxLen.toFixed(0)};stroke-dashoffset:${approxLen.toFixed(0)};--dash-len:${approxLen.toFixed(0)};animation-duration:${Math.max(0.6, approxLen/800).toFixed(2)}s"/>` : ''}
      <!-- dots -->
      ${dotsHtml}
      <!-- x labels -->
      ${xlabels}
      <!-- floating tooltip -->
      <g id="trend-mini-tip" class="trend-mini-tooltip" opacity="0">
        <rect id="trend-mini-tip-bg" rx="4" fill="#1f1f1f" opacity="0.85"/>
        <text id="trend-mini-tip-text" font-size="11" fill="#fff" dominant-baseline="middle"></text>
      </g>
    </svg>
    <!-- right summary panel -->
    <div style="flex-shrink:0;width:96px;padding:0 0 0 12px;display:flex;flex-direction:column;align-items:flex-start;gap:2px;border-left:1px solid var(--border)">
      <div style="font-size:10px;color:var(--text-tertiary);line-height:1.3">最新批次</div>
      <div style="font-size:22px;font-weight:700;color:var(--text);line-height:1.2">${lastVal !== null ? lastVal.toFixed(2) : '—'}</div>
      ${delta !== null ? `
      <div style="display:flex;align-items:center;gap:3px">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <path d="${arrowPath}" stroke="${deltaColor}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
        <span style="font-size:12px;font-weight:600;color:${deltaColor}">${deltaStr}</span>
      </div>` : ''}
      <div style="font-size:10px;color:var(--text-tertiary);margin-top:1px">${n} 个批次</div>
    </div>
  </div>`;
}

// ===== DIST FILTER HELPERS =====
// Check if a filter item matches a row
function rowMatchesDistItem(r, item) {
  const { level, col, label } = item;
  if (level === 1) return r[col] !== undefined && r[col] !== '' && r[col] !== null;
  if (level === 2) return r[col + '_level2'] === label;
  if (level === 3) {
    const l3 = r[col + '_level3'] || '';
    return l3.split('；').some(t => t.trim() === label);
  }
  return true;
}

// Get the rows that pass the current distFilters (OR across filters in same col/level, AND across different cols)
function getDistFilteredRows(batch) {
  if (!distFilters.length) return batch.rows;
  // Group filters by col
  const byCol = new Map();
  distFilters.forEach(f => {
    if (!byCol.has(f.col)) byCol.set(f.col, []);
    byCol.get(f.col).push(f);
  });
  // Each col group is OR; between groups is AND
  return batch.rows.filter(r =>
    Array.from(byCol.values()).every(group =>
      group.some(item => rowMatchesDistItem(r, item))
    )
  );
}

// Toggle a distFilter item (add if absent, remove if present)
function toggleDistFilter(item) {
  const idx = distFilters.findIndex(f => f.col === item.col && f.label === item.label && f.level === item.level);
  if (idx >= 0) {
    distFilters.splice(idx, 1);
  } else {
    distFilters.push(item);
  }
}

function isDistFilterActive(item) {
  return distFilters.some(f => f.col === item.col && f.label === item.label && f.level === item.level);
}

// Build chartFilter from current distFilters for table sync
// If multiple filters: use 'multi' type (table shows union of all)
function syncChartFilterFromDist(batch) {
  if (!distFilters.length) {
    chartFilter = null;
  } else if (distFilters.length === 1) {
    const f = distFilters[0];
    chartFilter = { type: f.level === 1 ? 'l1' : f.level === 2 ? 'l2' : 'l3', col: f.col, label: f.label || f.col, value: f.label || f.col };
  } else {
    chartFilter = { type: 'multi', distFilters: [...distFilters], label: `${distFilters.length}个筛选`, value: 'multi' };
  }
  currentPage = 1;
}

// Build dist filter bar UI
function renderDistFilterBar(batch) {
  const bar = document.getElementById('dist-filter-bar');
  if (!bar) return;
  bar.innerHTML = '';

  // "全部" pill
  const allBtn = document.createElement('button');

  allBtn.textContent = '全部数据';

  allBtn.onclick = () => {
    distFilters = [];
    chartFilter = null;
    currentPage = 1;
    renderDistFilterBar(batch);
    renderDistChart(batch);
    renderTableSection(batch);
    updateFilterBadge(batch);
  };
  bar.appendChild(allBtn);

  if (!batch.hasSubdim) return;

  // expandedDimCol: which L1 is expanded to show L2/L3
  // We track this via a module-level variable
  batch.scoreCols.forEach(col => {
    const isExpanded = distFilterExpandedCol === col;

    if (isExpanded) {

      const l2Set = new Map();
      batch.rows.forEach(r => {
        const l2 = r[col + '_level2'];
        if (l2) l2Set.set(l2, (l2Set.get(l2) || 0) + 1);
      });

      l2Set.forEach((cnt, l2label) => {
        const item2 = { level: 2, col, label: l2label };
        const isActive = isDistFilterActive(item2);

        const l2btn = document.createElement('button');
        l2btn.className = 'metric-btn' + (isActive ? ' active' : '');

        l2btn.onclick = (e) => {
          e.stopPropagation();
          toggleDistFilter(item2);
          syncChartFilterFromDist(batch);
          renderDistFilterBar(batch);
          renderDistChart(batch);
          renderTableSection(batch);
          updateFilterBadge(batch);
        };
        bar.appendChild(l2btn);

        // L3 pills — always show under active L2 items or if L2 is expanded
        if (isActive || distFilterExpandedL2 === `${col}::${l2label}`) {
          const l3Set = new Map();
          batch.rows.filter(r => r[col + '_level2'] === l2label).forEach(r => {
            const l3 = r[col + '_level3'] || '';
            l3.split('；').forEach(t => { t = t.trim(); if (t) l3Set.set(t, (l3Set.get(t) || 0) + 1); });
          });
          l3Set.forEach((cnt3, l3label) => {
            const item3 = { level: 3, col, label: l3label };
            const isL3Active = isDistFilterActive(item3);
            const l3btn = document.createElement('button');
            l3btn.className = 'metric-btn' + (isL3Active ? ' active' : '');

            l3btn.style.cssText = `font-size:10px;padding:2px 6px;${isL3Active ? '' : 'background:#e8f4ff;'}`;
            l3btn.onclick = (e) => {
              e.stopPropagation();
              toggleDistFilter(item3);
              syncChartFilterFromDist(batch);
              renderDistFilterBar(batch);
              renderDistChart(batch);
              renderTableSection(batch);
              updateFilterBadge(batch);
            };

          });

      });
    }
  });

  // Active filter summary badges
  if (distFilters.length) {
    const sep = document.createElement('span');

      badge.style.cssText = 'cursor:pointer';
      badge.onclick = () => {
        distFilters.splice(i, 1);
        syncChartFilterFromDist(batch);
        renderDistFilterBar(batch);
        renderDistChart(batch);
        renderTableSection(batch);
        updateFilterBadge(batch);
      };
      bar.appendChild(badge);
    });
  }
}

function renderDistChart(batch) {
  const canvas = document.getElementById('chart-dist');
  if (!canvas) return;
  if (charts['dist']) { try { charts['dist'].destroy(); } catch(e) {} delete charts['dist']; }

  const scoreCols = batch.scoreCols;
  // Always use ALL rows — no distFilter applied here
  const scores = batch.rows.map(r => calcOverallScore(r, scoreCols, batch.isNewFormat)).filter(v => !isNaN(v));

  if (!scores.length) {
    canvas.parentElement.innerHTML = '<div class="no-data">暂无数据</div>';
    return;
  }

  // Use actual distinct score values, but always include 4 and 5 as forced bins
  const scoreSet = new Set(scores.map(s => parseFloat(s.toFixed(2))));
  scoreSet.add(4);
  scoreSet.add(5);
  const bins = Array.from(scoreSet).sort((a, b) => a - b);
  const counts = bins.map(b => scores.filter(s => Math.abs(s - b) < 0.001).length);

  const barColors = bins.map(v => {
    if (v >= 3.5) return '#52c41a';
    if (v >= 3)   return '#1677ff';
    if (v >= 2.5) return '#faad14';
    return '#ff4d4f';
  });

  const total = scores.length;
  charts['dist'] = new Chart(canvas, {
    type: 'bar',
    data: {
      labels: bins.map(String),
      datasets: [{
        label: '数量',
        data: counts,
        backgroundColor: barColors,
        borderRadius: 4,
        borderSkipped: false
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            title: items => `综合分 ${items[0].label}`,
            label: ctx => ` ${ctx.parsed.y} 条 (${total ? (ctx.parsed.y/total*100).toFixed(1) : 0}%)`
          }
        }
      },
      scales: {
        x: { grid: { display: false } },
        y: { beginAtZero: true, grid: { color: '#f0f0f0' } }
      },
      onClick(event, elements) {
        if (!elements.length) return;
        const idx = elements[0].index;
        const scoreVal = bins[idx];
        chartFilter = { type: 'score', label: String(scoreVal), value: scoreVal };
        currentPage = 1;
        renderTableSection(batches.find(b => b.id === activeBatchId));
        updateFilterBadge(batches.find(b => b.id === activeBatchId));
      }
    }
  });
}

function getDimDistFilteredRows(batch) {
  if (!dimDistFilter) return batch.rows;
  const { level, col, label } = dimDistFilter;
  return batch.rows.filter(r => {
    if (level === 1) return r[col] !== undefined && r[col] !== '' && r[col] !== null;
    if (level === 2) return r[col + '_level2'] === label;
    if (level === 3) {
      const l3 = r[col + '_level3'] || '';
      return l3.split('；').some(t => t.trim() === label);
    }
    return true;
  });
}

function renderDimDistChart(batch) {
  const canvas = document.getElementById('chart-dim-dist');
  if (!canvas) return;
  if (charts['dim-dist']) { try { charts['dim-dist'].destroy(); } catch(e) {} delete charts['dim-dist']; }

  const scoreCols = batch.scoreCols;
  if (!scoreCols.length) {
    canvas.parentElement.innerHTML = '<div class="no-data">无维度数据</div>';
    return;
  }

  const sourceRows = getDimDistFilteredRows(batch);

  // Determine which cols to show
  let colsToShow = scoreCols;
  if (dimDistFilter && dimDistFilter.level === 1) {
    colsToShow = [dimDistFilter.col];
  } else if (dimDistFilter && (dimDistFilter.level === 2 || dimDistFilter.level === 3)) {
    colsToShow = [dimDistFilter.col];
  }

  // Collect all distinct score values across all shown cols, force include 1,2,3,4,5
  const allScoreVals = new Set([1, 2, 3, 4, 5]);
  colsToShow.forEach(col => {
    sourceRows.forEach(r => {
      const v = parseFloat(r[col]);
      if (!isNaN(v)) allScoreVals.add(parseFloat(v.toFixed(2)));
    });
  });
  const scoreBins = Array.from(allScoreVals).sort((a, b) => a - b);

  // One dataset per dimension column
  const colors = ['#1677ff','#52c41a','#faad14','#ff4d4f','#722ed1','#13c2c2','#eb2f96','#fa8c16'];
  const datasets = colsToShow.map((col, i) => {
    const color = colors[i % colors.length];
    const counts = scoreBins.map(bin => {
      return sourceRows.filter(r => {
        const v = parseFloat(r[col]);
        return !isNaN(v) && Math.abs(parseFloat(v.toFixed(2)) - bin) < 0.001;
      }).length;
    });
    return {
      label: col,
      data: counts,
      backgroundColor: color + 'cc',
      borderColor: color,
      borderWidth: 1.5,
      borderRadius: 3
    };
  });

  const total = sourceRows.length;
  charts['dim-dist'] = new Chart(canvas, {
    type: 'bar',
    data: {
      labels: scoreBins.map(String),
      datasets
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: colsToShow.length > 1, position: 'top', labels: { font: { size: 11 }, padding: 8, usePointStyle: true } },
        tooltip: {
          callbacks: {
            title: items => `分值 ${items[0].label}`,
            label: ctx => {
              const v = ctx.parsed.y;
              return ` ${ctx.dataset.label}: ${v} 条 (${total ? (v/total*100).toFixed(1) : 0}%)`;
            }
          }
        }
      },
      scales: {
        x: { grid: { display: false }, title: { display: true, text: '分值', font: { size: 11 } } },
        y: { beginAtZero: true, grid: { color: '#f0f0f0' } }
      },
      onClick(event, elements) {
        if (!elements.length) return;
        const idx = elements[0].index;
        const scoreVal = scoreBins[idx];
        const dsIdx = elements[0].datasetIndex;
        const col = colsToShow[dsIdx];
        chartFilter = { type: 'dim-score', col, value: scoreVal, label: `${col}=${scoreVal}` };
        currentPage = 1;
        const b = batches.find(b => b.id === activeBatchId);
        renderTableSection(b);
        updateFilterBadge(b);
      }
    }
  });
}

// Color palette for pie slices
const PIE_COLORS = [
  '#1677ff','#52c41a','#faad14','#ff4d4f','#722ed1',
  '#13c2c2','#eb2f96','#fa8c16','#a0d911','#2f54eb',
  '#f759ab','#36cfc9','#73d13d','#ffd666','#ff7a45'
