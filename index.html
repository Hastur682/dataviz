// ===== TREND CHART =====
// Colors for metrics
const TREND_COLORS = [
  '#1677ff','#52c41a','#faad14','#ff4d4f','#722ed1','#13c2c2','#eb2f96','#fa8c16',
  '#2f54eb','#389e0d','#d4b106','#cf1322','#531dab','#08979c','#c41d7f','#d46b08'
];

// Collect all metrics across batches for trend display
function getTrendMetrics(activeBatches) {
  const dimSet = new Set();
  activeBatches.forEach(b => (b.scoreCols || []).forEach(c => dimSet.add(c)));
  const dims = Array.from(dimSet);
  return [
    { key: 'avg', label: '综合分', suffix: '' },
    { key: 'lowrate', label: '低分率', suffix: '%' },
    { key: 'highrate', label: '高质率', suffix: '%' },
    ...dims.map(c => ({ key: c, label: c, suffix: '' }))
  ];
}

function calcBatchMetricValue(b, metricKey) {
  const rows = b.rows;
  const scoreCols = b.scoreCols;
  const scores = rows.map(r => calcOverallScore(r, scoreCols, b.isNewFormat)).filter(v => !isNaN(v));
  if (metricKey === 'avg') {
    return scores.length ? parseFloat((scores.reduce((a,v)=>a+v,0)/scores.length).toFixed(3)) : null;
  } else if (metricKey === 'lowrate') {
    return scores.length ? parseFloat((scores.filter(v=>v<3).length/scores.length*100).toFixed(1)) : null;
  } else if (metricKey === 'highrate') {
    return scores.length ? parseFloat((scores.filter(v=>v>=4).length/scores.length*100).toFixed(1)) : null;
  } else {
    const dimVals = rows.map(r => parseFloat(r[metricKey])).filter(v => !isNaN(v));
    return dimVals.length ? parseFloat((dimVals.reduce((a,v)=>a+v,0)/dimVals.length).toFixed(3)) : null;
  }
}

function getActiveTrendBatches() {
  const sorted = [...batches].sort((a, b) => (a.time || '').localeCompare(b.time || ''));
  return sorted.filter(b => !trendSelectedBatches || trendSelectedBatches.includes(b.id));
}

function renderTrendCompareTable(activeBatches) {
  const wrap = document.getElementById('trend-compare-table-wrap');
  if (!wrap) return;
  if (activeBatches.length < 1) { wrap.innerHTML = ''; return; }

  const metrics = getTrendMetrics(activeBatches);
  // Compute all values
  const tableData = activeBatches.map(b => ({
    name: b.name,
    values: metrics.map(m => calcBatchMetricValue(b, m.key))
  }));

  // Find best/worst per metric column (for highlight)
  const metricBest = metrics.map((m, mi) => {
    const vals = tableData.map(r => r.values[mi]).filter(v => v !== null);
    if (!vals.length) return null;
    // For lowrate: best = min; for others: best = max
    return m.key === 'lowrate' ? Math.min(...vals) : Math.max(...vals);
  });
  const metricWorst = metrics.map((m, mi) => {
    const vals = tableData.map(r => r.values[mi]).filter(v => v !== null);
    if (!vals.length) return null;
    return m.key === 'lowrate' ? Math.max(...vals) : Math.min(...vals);
  });

  let html = `<table class="trend-compare-table">
    <thead><tr>
      <th>批次</th>
      ${metrics.map(m => `<th>${escHtml(m.label)}${m.suffix ? '<br><small style="font-weight:400;color:var(--text-tertiary)">' + m.suffix + '</small>' : ''}</th>`).join('')}
    </tr></thead>
    <tbody>`;

  tableData.forEach(row => {
    html += `<tr><td title="${escHtml(row.name)}">${escHtml(row.name.length > 18 ? row.name.slice(0,18) + '…' : row.name)}</td>`;
    row.values.forEach((v, mi) => {
      const m = metrics[mi];
      const isBest = v !== null && v === metricBest[mi] && activeBatches.length > 1;
      const isWorst = v !== null && v === metricWorst[mi] && activeBatches.length > 1 && metricBest[mi] !== metricWorst[mi];
      let cls = '';
      if (isBest) cls = 'tc-best';
      else if (isWorst) cls = 'tc-worst';
      let valCls = '';
      if (m.key === 'avg') {
        valCls = v >= 4 ? 'tc-good' : v >= 3 ? 'tc-warn' : v !== null ? 'tc-bad' : '';
      } else if (m.key === 'lowrate') {
        valCls = v > 30 ? 'tc-bad' : v > 10 ? 'tc-warn' : v !== null ? 'tc-good' : '';
      } else if (m.key === 'highrate') {
        valCls = v >= 20 ? 'tc-good' : v >= 5 ? 'tc-warn' : v !== null ? 'tc-bad' : '';
      }
      const display = v !== null ? `${v}${m.suffix}` : '—';
      html += `<td class="${cls}"><span class="${valCls}">${display}</span></td>`;
    });
    html += '</tr>';
  });

  html += '</tbody></table>';
  wrap.innerHTML = html;
}

function renderTrendMetricToggles(metrics) {
  const wrap = document.getElementById('trend-metric-toggles');
  if (!wrap) return;
  wrap.innerHTML = '';
  // Auto-hide dimension metrics that haven't been explicitly toggled yet
  // (track which keys have been seen; new ones default to hidden)
  metrics.forEach(m => {
    if (!trendSeenMetrics.has(m.key)) {
      trendSeenMetrics.add(m.key);
      if (m.key !== 'avg') trendHiddenMetrics.add(m.key);
    }
  });
  metrics.forEach((m, i) => {
    const color = TREND_COLORS[i % TREND_COLORS.length];
    const isActive = !trendHiddenMetrics.has(m.key);
    const btn = document.createElement('button');
    btn.className = 'metric-toggle-btn' + (isActive ? ' active' : '');
    btn.style.color = isActive ? color : 'var(--text-secondary)';
    btn.style.borderColor = isActive ? color : 'var(--border)';
    btn.innerHTML = `<span class="metric-toggle-dot" style="background:${isActive ? color : 'var(--border)'}"></span>${escHtml(m.label)}`;
    btn.onclick = () => {
      if (trendHiddenMetrics.has(m.key)) trendHiddenMetrics.delete(m.key);
      else trendHiddenMetrics.add(m.key);
      renderTrendChart();
    };
    wrap.appendChild(btn);
  });
}

function renderTrendChart() {
  const canvas = document.getElementById('chart-trend');
  if (!canvas) return;
  if (charts['trend']) { try { charts['trend'].destroy(); } catch(e) {} delete charts['trend']; }

  const activeBatches = getActiveTrendBatches();
  renderTrendCompareTable(activeBatches);

  if (activeBatches.length < 1) {
    canvas.parentElement.style.display = 'none';
    return;
  }
  canvas.parentElement.style.display = '';

  const metrics = getTrendMetrics(activeBatches);
  renderTrendMetricToggles(metrics);

  const visibleMetrics = metrics.filter(m => !trendHiddenMetrics.has(m.key));
  if (!visibleMetrics.length) return;

  const labels = activeBatches.map(b => b.name.length > 15 ? b.name.slice(0,15) + '…' : b.name);
  const isLine = trendViewMode === 'line';

  const datasets = visibleMetrics.map((m, i) => {
    const colorIdx = metrics.findIndex(x => x.key === m.key);
    const color = TREND_COLORS[colorIdx % TREND_COLORS.length];
    const values = activeBatches.map(b => calcBatchMetricValue(b, m.key));
    if (isLine) {
      return {
        label: m.label + (m.suffix ? ` (${m.suffix})` : ''),
        data: values,
        borderColor: color,
        backgroundColor: color + '22',
        pointBackgroundColor: color,
        pointRadius: 5, pointHoverRadius: 7,
        fill: false, tension: 0.3, borderWidth: 2,
        spanGaps: true
      };
    }
    return {
      label: m.label + (m.suffix ? ` (${m.suffix})` : ''),
      data: values,
      backgroundColor: color + 'cc',
      borderColor: color,
      borderWidth: 1.5,
      borderRadius: 4,
      spanGaps: true
    };
  });

  charts['trend'] = new Chart(canvas, {
    type: isLine ? 'line' : 'bar',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          display: true,
          position: 'top',
          labels: { font: { size: 11 }, padding: 12, usePointStyle: true, pointStyleWidth: 10 }
        },
        tooltip: {
          callbacks: {
            label: ctx => {
              const m = visibleMetrics[ctx.datasetIndex];
              const v = ctx.parsed.y;
              return ` ${m.label}: ${v !== null ? v + m.suffix : 'N/A'}`;
            }
          }
        }
      },
      scales: {
        x: { grid: { display: false }, ticks: { maxRotation: 30, font: { size: 11 } } },
        y: { beginAtZero: false, grid: { color: '#f0f0f0' }, ticks: { font: { size: 11 } } }
      }
    }
  });
}

function setTrendView(mode) {
  trendViewMode = mode;
  const barBtn = document.getElementById('trend-view-bar');
  const lineBtn = document.getElementById('trend-view-line');
  if (barBtn) {
    barBtn.style.background = mode === 'bar' ? '#e8f4ff' : '#fff';
    barBtn.style.color = mode === 'bar' ? 'var(--primary)' : 'var(--text-secondary)';
  }
  if (lineBtn) {
    lineBtn.style.background = mode === 'line' ? '#e8f4ff' : '#fff';
    lineBtn.style.color = mode === 'line' ? 'var(--primary)' : 'var(--text-secondary)';
  }
  renderTrendChart();
}

function renderTrendBatchSelector() {
  const wrap = document.getElementById('trend-batch-selector');
  if (!wrap) return;
  wrap.innerHTML = '<span class="batch-sel-label">批次：</span>';
  const allBtn = document.createElement('button');
  allBtn.className = 'batch-sel-btn' + (!trendSelectedBatches ? ' selected' : '');
  allBtn.textContent = '全部';
  allBtn.onclick = () => { trendSelectedBatches = null; renderTrendChart(); renderTrendBatchSelector(); };
  wrap.appendChild(allBtn);
  batches.forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'batch-sel-btn' + (trendSelectedBatches && trendSelectedBatches.includes(b.id) ? ' selected' : '');
    btn.textContent = b.name.length > 12 ? b.name.slice(0, 12) + '…' : b.name;
    btn.title = b.name;
    btn.onclick = () => {
      if (!trendSelectedBatches) trendSelectedBatches = batches.map(x => x.id);
      const idx = trendSelectedBatches.indexOf(b.id);
      if (idx >= 0) {
        trendSelectedBatches.splice(idx, 1);
        if (!trendSelectedBatches.length) trendSelectedBatches = null;
      } else {
        trendSelectedBatches.push(b.id);
      }
      renderTrendChart();
      renderTrendBatchSelector();
    };
    wrap.appendChild(btn);
  });
}
function destroyCharts() {
  Object.keys(charts).forEach(k => {
    try { charts[k].destroy(); } catch(e) {}
  });
  charts = {};
}

// ===== DIST FILTER HELPERS =====
// Check if a filter item matches a row
function rowMatchesDistItem(r, item) {
  const { level, col, label } = item;
  if (level === 1) return r[col] !== undefined && r[col] !== '' && r[col] !== null;
  if (level === 2) return r[col + '_level2'] === label;
  if (level === 3) {
    const l3 = r[col + '_level3'] || '';
    return l3.split('；').some(t => t.trim() === label);
  }
  return true;
}

// Get the rows that pass the current distFilters (OR across filters in same col/level, AND across different cols)
function getDistFilteredRows(batch) {
  if (!distFilters.length) return batch.rows;
  // Group filters by col
  const byCol = new Map();
  distFilters.forEach(f => {
    if (!byCol.has(f.col)) byCol.set(f.col, []);
    byCol.get(f.col).push(f);
  });
  // Each col group is OR; between groups is AND
  return batch.rows.filter(r =>
    Array.from(byCol.values()).every(group =>
      group.some(item => rowMatchesDistItem(r, item))
    )
  );
}

// Toggle a distFilter item (add if absent, remove if present)
function toggleDistFilter(item) {
  const idx = distFilters.findIndex(f => f.col === item.col && f.label === item.label && f.level === item.level);
  if (idx >= 0) {
    distFilters.splice(idx, 1);
  } else {
    distFilters.push(item);
  }
}

function isDistFilterActive(item) {
  return distFilters.some(f => f.col === item.col && f.label === item.label && f.level === item.level);
}

// Build chartFilter from current distFilters for table sync
// If multiple filters: use 'multi' type (table shows union of all)
function syncChartFilterFromDist(batch) {
  if (!distFilters.length) {
    chartFilter = null;
  } else if (distFilters.length === 1) {
    const f = distFilters[0];
    chartFilter = { type: f.level === 1 ? 'l1' : f.level === 2 ? 'l2' : 'l3', col: f.col, label: f.label || f.col, value: f.label || f.col };
  } else {
    chartFilter = { type: 'multi', distFilters: [...distFilters], label: `${distFilters.length}个筛选`, value: 'multi' };
  }
  currentPage = 1;
}

// Build dist filter bar UI
function renderDistFilterBar(batch) {
  const bar = document.getElementById('dist-filter-bar');
  if (!bar) return;
  bar.innerHTML = '';

  // "全部" pill
  const allBtn = document.createElement('button');
  allBtn.className = 'metric-btn' + (!distFilters.length ? ' active' : '');
  allBtn.textContent = '全部数据';
  allBtn.style.cssText = 'font-size:11px;padding:2px 8px;flex-shrink:0';
  allBtn.onclick = () => {
    distFilters = [];
    chartFilter = null;
    currentPage = 1;
    renderDistFilterBar(batch);
    renderDistChart(batch);
    renderTableSection(batch);
    updateFilterBadge(batch);
  };
  bar.appendChild(allBtn);

  if (!batch.hasSubdim) return;

  // expandedDimCol: which L1 is expanded to show L2/L3
  // We track this via a module-level variable
  batch.scoreCols.forEach(col => {
    const isExpanded = distFilterExpandedCol === col;
    const hasAnyActive = distFilters.some(f => f.col === col);

    const l1btn = document.createElement('button');
    l1btn.className = 'metric-btn' + (hasAnyActive ? ' active' : '');
    l1btn.textContent = col;
    l1btn.title = isExpanded ? '收起' : `展开「${col}」的标签`;
    l1btn.style.cssText = 'font-size:11px;padding:2px 8px;flex-shrink:0';
    l1btn.onclick = () => {
      distFilterExpandedCol = isExpanded ? null : col;
      renderDistFilterBar(batch);
    };
    bar.appendChild(l1btn);

    if (isExpanded) {
      // L2 pills
      const l2Set = new Map();
      batch.rows.forEach(r => {
        const l2 = r[col + '_level2'];
        if (l2) l2Set.set(l2, (l2Set.get(l2) || 0) + 1);
      });

      l2Set.forEach((cnt, l2label) => {
        const item2 = { level: 2, col, label: l2label };
        const isActive = isDistFilterActive(item2);

        const l2btn = document.createElement('button');
        l2btn.className = 'metric-btn' + (isActive ? ' active' : '');
        l2btn.textContent = l2label;
        l2btn.title = `${cnt}条 — 点击${isActive?'取消':'添加'}筛选`;
        l2btn.style.cssText = `font-size:10px;padding:2px 6px;${isActive ? '' : 'background:#f5f7fa;'}`;
        l2btn.onclick = (e) => {
          e.stopPropagation();
          toggleDistFilter(item2);
          syncChartFilterFromDist(batch);
          renderDistFilterBar(batch);
          renderDistChart(batch);
          renderTableSection(batch);
          updateFilterBadge(batch);
        };
        bar.appendChild(l2btn);

        // L3 pills — always show under active L2 items or if L2 is expanded
        if (isActive || distFilterExpandedL2 === `${col}::${l2label}`) {
          const l3Set = new Map();
          batch.rows.filter(r => r[col + '_level2'] === l2label).forEach(r => {
            const l3 = r[col + '_level3'] || '';
            l3.split('；').forEach(t => { t = t.trim(); if (t) l3Set.set(t, (l3Set.get(t) || 0) + 1); });
          });
          l3Set.forEach((cnt3, l3label) => {
            const item3 = { level: 3, col, label: l3label };
            const isL3Active = isDistFilterActive(item3);
            const l3btn = document.createElement('button');
            l3btn.className = 'metric-btn' + (isL3Active ? ' active' : '');
            l3btn.textContent = l3label.length > 18 ? l3label.slice(0, 18) + '…' : l3label;
            l3btn.title = `${l3label} (${cnt3}条) — 点击${isL3Active?'取消':'添加'}筛选`;
            l3btn.style.cssText = `font-size:10px;padding:2px 6px;${isL3Active ? '' : 'background:#e8f4ff;'}`;
            l3btn.onclick = (e) => {
              e.stopPropagation();
              toggleDistFilter(item3);
              syncChartFilterFromDist(batch);
              renderDistFilterBar(batch);
              renderDistChart(batch);
              renderTableSection(batch);
              updateFilterBadge(batch);
            };
            bar.appendChild(l3btn);
          });
        }
      });
    }
  });

  // Active filter summary badges
  if (distFilters.length) {
    const sep = document.createElement('span');
    sep.style.cssText = 'font-size:11px;color:var(--text-tertiary);padding:0 4px;flex-shrink:0';
    sep.textContent = '|';
    bar.appendChild(sep);

    distFilters.forEach((f, i) => {
      const badge = document.createElement('span');
      badge.className = 'filter-badge';
      badge.innerHTML = `${escHtml(f.label || f.col)} &#215;`;
      badge.title = '点击移除此筛选';
      badge.style.cssText = 'cursor:pointer';
      badge.onclick = () => {
        distFilters.splice(i, 1);
        syncChartFilterFromDist(batch);
        renderDistFilterBar(batch);
        renderDistChart(batch);
        renderTableSection(batch);
        updateFilterBadge(batch);
      };
      bar.appendChild(badge);
    });
  }
}

function renderDistChart(batch) {
  const canvas = document.getElementById('chart-dist');
  if (!canvas) return;
  if (charts['dist']) { try { charts['dist'].destroy(); } catch(e) {} delete charts['dist']; }

  const scoreCols = batch.scoreCols;
  // Always use ALL rows — no distFilter applied here
  const scores = batch.rows.map(r => calcOverallScore(r, scoreCols, batch.isNewFormat)).filter(v => !isNaN(v));

  if (!scores.length) {
    canvas.parentElement.innerHTML = '<div class="no-data">暂无数据</div>';
    return;
  }

  // Use actual distinct score values, but always include 4 and 5 as forced bins
  const scoreSet = new Set(scores.map(s => parseFloat(s.toFixed(2))));
  scoreSet.add(4);
  scoreSet.add(5);
  const bins = Array.from(scoreSet).sort((a, b) => a - b);
  const counts = bins.map(b => scores.filter(s => Math.abs(s - b) < 0.001).length);

  const barColors = bins.map(v => {
    if (v >= 3.5) return '#52c41a';
    if (v >= 3)   return '#1677ff';
    if (v >= 2.5) return '#faad14';
    return '#ff4d4f';
  });

  const total = scores.length;
  charts['dist'] = new Chart(canvas, {
    type: 'bar',
    data: {
      labels: bins.map(String),
      datasets: [{
        label: '数量',
        data: counts,
        backgroundColor: barColors,
        borderRadius: 4,
        borderSkipped: false
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            title: items => `综合分 ${items[0].label}`,
            label: ctx => ` ${ctx.parsed.y} 条 (${total ? (ctx.parsed.y/total*100).toFixed(1) : 0}%)`
          }
        }
      },
      scales: {
        x: { grid: { display: false } },
        y: { beginAtZero: true, grid: { color: '#f0f0f0' } }
      },
      onClick(event, elements) {
        if (!elements.length) return;
        const idx = elements[0].index;
        const scoreVal = bins[idx];
        chartFilter = { type: 'score', label: String(scoreVal), value: scoreVal };
        currentPage = 1;
        renderTableSection(batches.find(b => b.id === activeBatchId));
        updateFilterBadge(batches.find(b => b.id === activeBatchId));
      }
    }
  });
}

// ===== DIM DIST FILTER BAR =====
function renderDimDistFilterBar(batch) {
  const bar = document.getElementById('dim-dist-filter-bar');
  const statusEl = document.getElementById('dim-dist-filter-status');
  if (!bar) return;
  bar.innerHTML = '';

  // "全部" pill
  const allBtn = document.createElement('button');
  allBtn.className = 'metric-btn' + (!dimDistFilter ? ' active' : '');
  allBtn.textContent = '全部维度';
  allBtn.style.cssText = 'font-size:11px;padding:2px 8px;flex-shrink:0';
  allBtn.onclick = () => {
    dimDistFilter = null;
    dimDistExpandedCol = null;
    dimDistExpandedL2 = null;
    renderDimDistFilterBar(batch);
    renderDimDistChart(batch);
  };
  bar.appendChild(allBtn);

  batch.scoreCols.forEach(col => {
    const isExpanded = dimDistExpandedCol === col;
    const isL1Active = dimDistFilter && dimDistFilter.col === col && dimDistFilter.level === 1;

    const l1btn = document.createElement('button');
    l1btn.className = 'metric-btn' + ((dimDistFilter && dimDistFilter.col === col) ? ' active' : '');
    l1btn.textContent = col;
    l1btn.title = isExpanded ? '收起' : `展开「${col}」的标签筛选`;
    l1btn.style.cssText = 'font-size:11px;padding:2px 8px;flex-shrink:0';
    l1btn.onclick = () => {
      if (!batch.hasSubdim) {
        // Just set L1 filter
        dimDistFilter = (isL1Active) ? null : { level: 1, col, label: col };
        renderDimDistFilterBar(batch);
        renderDimDistChart(batch);
        return;
      }
      dimDistExpandedCol = isExpanded ? null : col;
      if (!isExpanded) dimDistExpandedL2 = null;
      renderDimDistFilterBar(batch);
    };
    bar.appendChild(l1btn);

    if (isExpanded && batch.hasSubdim) {
      // L2 pills
      const l2Set = new Map();
      batch.rows.forEach(r => {
        const l2 = r[col + '_level2'];
        if (l2) l2Set.set(l2, (l2Set.get(l2) || 0) + 1);
      });

      l2Set.forEach((cnt, l2label) => {
        const isL2Active = dimDistFilter && dimDistFilter.col === col && dimDistFilter.level === 2 && dimDistFilter.label === l2label;
        const l2btn = document.createElement('button');
        l2btn.className = 'metric-btn' + (isL2Active ? ' active' : '');
        l2btn.textContent = l2label;
        l2btn.title = `${cnt}条`;
        l2btn.style.cssText = `font-size:10px;padding:2px 6px;${isL2Active ? '' : 'background:#f5f7fa;'}`;
        l2btn.onclick = (e) => {
          e.stopPropagation();
          dimDistFilter = isL2Active ? null : { level: 2, col, label: l2label };
          dimDistExpandedL2 = dimDistFilter ? `${col}::${l2label}` : null;
          renderDimDistFilterBar(batch);
          renderDimDistChart(batch);
        };
        bar.appendChild(l2btn);

        if (dimDistExpandedL2 === `${col}::${l2label}` || isL2Active) {
          const l3Set = new Map();
          batch.rows.filter(r => r[col + '_level2'] === l2label).forEach(r => {
            const l3 = r[col + '_level3'] || '';
            l3.split('；').forEach(t => { t = t.trim(); if (t) l3Set.set(t, (l3Set.get(t) || 0) + 1); });
          });
          l3Set.forEach((cnt3, l3label) => {
            const isL3Active = dimDistFilter && dimDistFilter.col === col && dimDistFilter.level === 3 && dimDistFilter.label === l3label;
            const l3btn = document.createElement('button');
            l3btn.className = 'metric-btn' + (isL3Active ? ' active' : '');
            l3btn.textContent = l3label.length > 18 ? l3label.slice(0,18) + '…' : l3label;
            l3btn.title = `${l3label} (${cnt3}条)`;
            l3btn.style.cssText = `font-size:10px;padding:2px 6px;${isL3Active ? '' : 'background:#e8f4ff;'}`;
            l3btn.onclick = (e) => {
              e.stopPropagation();
              dimDistFilter = isL3Active ? null : { level: 3, col, label: l3label };
              renderDimDistFilterBar(batch);
              renderDimDistChart(batch);
            };
            bar.appendChild(l3btn);
          });
        }
      });
    }
  });

  // Status display
  if (statusEl) {
    if (!dimDistFilter) {
      statusEl.textContent = '';
    } else {
      const lvlName = dimDistFilter.level === 1 ? '维度' : dimDistFilter.level === 2 ? '二级' : '三级标签';
      statusEl.textContent = `筛选：${dimDistFilter.level === 1 ? dimDistFilter.col : dimDistFilter.label}`;
    }
  }
}

function getDimDistFilteredRows(batch) {
  if (!dimDistFilter) return batch.rows;
  const { level, col, label } = dimDistFilter;
  return batch.rows.filter(r => {
    if (level === 1) return r[col] !== undefined && r[col] !== '' && r[col] !== null;
    if (level === 2) return r[col + '_level2'] === label;
    if (level === 3) {
      const l3 = r[col + '_level3'] || '';
      return l3.split('；').some(t => t.trim() === label);
    }
    return true;
  });
}

function renderDimDistChart(batch) {
  const canvas = document.getElementById('chart-dim-dist');
  if (!canvas) return;
  if (charts['dim-dist']) { try { charts['dim-dist'].destroy(); } catch(e) {} delete charts['dim-dist']; }

  const scoreCols = batch.scoreCols;
  if (!scoreCols.length) {
    canvas.parentElement.innerHTML = '<div class="no-data">无维度数据</div>';
    return;
  }

  const sourceRows = getDimDistFilteredRows(batch);

  // Determine which cols to show
  let colsToShow = scoreCols;
  if (dimDistFilter && dimDistFilter.level === 1) {
    colsToShow = [dimDistFilter.col];
  } else if (dimDistFilter && (dimDistFilter.level === 2 || dimDistFilter.level === 3)) {
    colsToShow = [dimDistFilter.col];
  }

  // Collect all distinct score values across all shown cols, force include 1,2,3,4,5
  const allScoreVals = new Set([1, 2, 3, 4, 5]);
  colsToShow.forEach(col => {
    sourceRows.forEach(r => {
      const v = parseFloat(r[col]);
      if (!isNaN(v)) allScoreVals.add(parseFloat(v.toFixed(2)));
    });
  });
  const scoreBins = Array.from(allScoreVals).sort((a, b) => a - b);

  // One dataset per dimension column
  const colors = ['#1677ff','#52c41a','#faad14','#ff4d4f','#722ed1','#13c2c2','#eb2f96','#fa8c16'];
  const datasets = colsToShow.map((col, i) => {
    const color = colors[i % colors.length];
    const counts = scoreBins.map(bin => {
      return sourceRows.filter(r => {
        const v = parseFloat(r[col]);
        return !isNaN(v) && Math.abs(parseFloat(v.toFixed(2)) - bin) < 0.001;
      }).length;
    });
    return {
      label: col,
      data: counts,
      backgroundColor: color + 'cc',
      borderColor: color,
      borderWidth: 1.5,
      borderRadius: 3
    };
  });

  const total = sourceRows.length;
  charts['dim-dist'] = new Chart(canvas, {
    type: 'bar',
    data: {
      labels: scoreBins.map(String),
      datasets
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: colsToShow.length > 1, position: 'top', labels: { font: { size: 11 }, padding: 8, usePointStyle: true } },
        tooltip: {
          callbacks: {
            title: items => `分值 ${items[0].label}`,
            label: ctx => {
              const v = ctx.parsed.y;
              return ` ${ctx.dataset.label}: ${v} 条 (${total ? (v/total*100).toFixed(1) : 0}%)`;
            }
          }
        }
      },
      scales: {
        x: { grid: { display: false }, title: { display: true, text: '分值', font: { size: 11 } } },
        y: { beginAtZero: true, grid: { color: '#f0f0f0' } }
      },
      onClick(event, elements) {
        if (!elements.length) return;
        const idx = elements[0].index;
        const scoreVal = scoreBins[idx];
        const dsIdx = elements[0].datasetIndex;
        const col = colsToShow[dsIdx];
        chartFilter = { type: 'dim-score', col, value: scoreVal, label: `${col}=${scoreVal}` };
        currentPage = 1;
        const b = batches.find(b => b.id === activeBatchId);
        renderTableSection(b);
        updateFilterBadge(b);
      }
    }
  });
}

// ===== SUBDIM DISTRIBUTION =====
function renderSubdimDist(batch) {
  const area = document.getElementById('subdim-dist-area');
  if (!area) return;
  const rows = batch.rows;
  const scoreCols = batch.scoreCols;

  // For each score dimension, build L2 distribution
  const dimData = scoreCols.map(col => {
    const l2Counter = {};
    const l3Counter = {};  // nested: l2 -> { l3 -> count }
    rows.forEach(r => {
      const l2 = r[col + '_level2'];
      const l3 = r[col + '_level3'];
      if (!l2) return;
      l2Counter[l2] = (l2Counter[l2] || 0) + 1;
      if (l3) {
        if (!l3Counter[l2]) l3Counter[l2] = {};
        l3.split('；').forEach(tag => {
          tag = tag.trim();
          if (tag) l3Counter[l2][tag] = (l3Counter[l2][tag] || 0) + 1;
        });
      }
    });
    return { col, l2Counter, l3Counter };
  }).filter(d => Object.keys(d.l2Counter).length > 0);

  if (!dimData.length) {
    area.innerHTML = '<div class="no-data">暂无子维度数据</div>';
    return;
  }

  area.innerHTML = dimData.map(({ col, l2Counter, l3Counter }) => {
    const total = Object.values(l2Counter).reduce((a,b)=>a+b,0);
    // Sort by count desc
    const sorted = Object.entries(l2Counter).sort((a,b)=>b[1]-a[1]);
    const barHtml = sorted.map(([label, cnt]) => {
      const pct = total ? (cnt/total*100).toFixed(1) : 0;
      // Score-based color
      const scoreMatch = label.match(/^(\d+(?:\.\d+)?)/);
      const scoreNum = scoreMatch ? parseFloat(scoreMatch[1]) : 3;
      const barColor = scoreNum >= 3.5 ? 'var(--success)' : scoreNum >= 3 ? '#1677ff' : scoreNum >= 2.5 ? 'var(--warning)' : 'var(--error)';
      // L3 tags for this L2
      const l3tags = l3Counter[label] ? Object.entries(l3Counter[label]).sort((a,b)=>b[1]-a[1]).slice(0,5) : [];
      const l3html = l3tags.length ? `<div style="margin-top:3px;display:flex;flex-wrap:wrap;gap:3px">
        ${l3tags.map(([t,c]) => `<span class="tag" style="cursor:pointer" onclick="filterByL3('${escHtml(col)}','${escHtml(t)}')" title="${escHtml(t)}">${escHtml(t.length>20?t.slice(0,20)+'…':t)} <b>${c}</b></span>`).join('')}
      </div>` : '';
      return `<div style="margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:2px;cursor:pointer" onclick="filterByL2('${escHtml(col)}','${escHtml(label)}')">
          <span style="color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escHtml(label)}">${escHtml(label)}</span>
          <span style="color:var(--text-secondary);flex-shrink:0;margin-left:8px">${cnt} (${pct}%)</span>
        </div>
        <div style="height:6px;background:#f0f0f0;border-radius:3px;overflow:hidden">
          <div style="height:100%;width:${pct}%;background:${barColor};border-radius:3px;transition:width 0.3s"></div>
        </div>
        ${l3html}
      </div>`;
    }).join('');
    return `<div style="background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:12px">
      <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:10px;display:flex;justify-content:space-between">
        <span>${escHtml(col)}</span>
        <span style="font-size:11px;color:var(--text-tertiary);font-weight:400">${total}条有标签</span>
      </div>
      ${barHtml}
    </div>`;
  }).join('');
}

function filterByL2(col, label) {
  const item = { level: 2, col, label };
  toggleDistFilter(item);
  syncChartFilterFromDist(batches.find(b => b.id === activeBatchId));
  const batch = batches.find(b => b.id === activeBatchId);
  if (batch) {
    distFilterExpandedCol = col;
    renderDistFilterBar(batch);
    renderDistChart(batch);
    renderTableSection(batch);
    updateFilterBadge(batch);
  }
}

function filterByL3(col, tag) {
  const item = { level: 3, col, label: tag };
  toggleDistFilter(item);
  syncChartFilterFromDist(batches.find(b => b.id === activeBatchId));
  const batch = batches.find(b => b.id === activeBatchId);
  if (batch) {
    distFilterExpandedCol = col;
    renderDistFilterBar(batch);
    renderDistChart(batch);
    renderTableSection(batch);
    updateFilterBadge(batch);
  }
}

// ===== CHARTS =====
function buildTableHTML(batch) {
  return `
  <div class="card" id="table-section">
    <div class="card-header">
      <h3>数据详情</h3>
      <div class="card-header-actions">
        <input type="text" class="search-input" id="table-search" placeholder="搜索..." value="${escHtml(searchQuery)}" oninput="onSearch(this.value)">
        ${chartFilter ? `<span class="filter-badge" id="filter-badge-table" onclick="clearFilter()">已过滤: ${escHtml(String(chartFilter.label || chartFilter.value))} &#215;</span>` : ''}
        <span style="font-size:12px;color:var(--text-secondary)" id="table-count-label"></span>
      </div>
    </div>
    <div id="table-inner">
      ${buildTableInner(batch)}
    </div>
  </div>`;
}

function getFilteredRows(batch) {
  let rows = batch.rows;
  if (chartFilter) {
    if (chartFilter.type === 'score') {
      const target = chartFilter.value;
      rows = rows.filter(r => {
        const s = calcOverallScore(r, batch.scoreCols, batch.isNewFormat);
        return !isNaN(s) && Math.abs(s - target) < 0.001;
      });
    } else if (chartFilter.type === 'dist') {
      const { min, max } = chartFilter;
      rows = rows.filter(r => {
        const s = calcOverallScore(r, batch.scoreCols, batch.isNewFormat);
        return !isNaN(s) && s >= min && (s < max || (max === 5 && s <= 5));
      });
    } else if (chartFilter.type === 'multi') {
      // Same logic as getDistFilteredRows but from chartFilter's snapshot
      const filters = chartFilter.distFilters || [];
      const byCol = new Map();
      filters.forEach(f => { if (!byCol.has(f.col)) byCol.set(f.col, []); byCol.get(f.col).push(f); });
      rows = rows.filter(r => Array.from(byCol.values()).every(g => g.some(item => rowMatchesDistItem(r, item))));
    } else if (chartFilter.type === 'l1') {
      const { col } = chartFilter;
      rows = rows.filter(r => r[col] !== undefined && r[col] !== '' && r[col] !== null);
    } else if (chartFilter.type === 'l2') {
      const { col, label } = chartFilter;
      rows = rows.filter(r => r[col + '_level2'] === label);
    } else if (chartFilter.type === 'l3') {
      const { col, label } = chartFilter;
      rows = rows.filter(r => {
        const l3 = r[col + '_level3'] || '';
        return l3.split('；').some(t => t.trim() === label);
      });
    } else if (chartFilter.type === 'dim-score') {
      const { col, value } = chartFilter;
      rows = rows.filter(r => {
        const v = parseFloat(r[col]);
        return !isNaN(v) && Math.abs(parseFloat(v.toFixed(2)) - value) < 0.001;
      });
    }
  }
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    rows = rows.filter(r => Object.values(r).some(v => String(v).toLowerCase().includes(q)));
  }
  return rows;
}

function getSortedRows(rows, batch) {
  if (!sortConfig.col) return rows;
  const col = sortConfig.col;
  const dir = sortConfig.dir === 'asc' ? 1 : -1;
  return [...rows].sort((a, b) => {
    const va = a[col]; const vb = b[col];
    const na = parseFloat(va); const nb = parseFloat(vb);
    if (!isNaN(na) && !isNaN(nb)) return (na - nb) * dir;
    return String(va || '').localeCompare(String(vb || ''), 'zh-CN') * dir;
  });
}

function buildTableInner(batch) {
  const allFiltered = getFilteredRows(batch);
  const sorted = getSortedRows(allFiltered, batch);
  const total = sorted.length;
  const totalPages = Math.max(1, Math.ceil(total / pageSize));
  currentPage = Math.min(currentPage, totalPages);
  const start = (currentPage - 1) * pageSize;
  const pageRows = sorted.slice(start, start + pageSize);

  const cols = buildTableCols(batch);

  // Update count label after render
  setTimeout(() => {
    const lbl = document.getElementById('table-count-label');
    if (lbl) lbl.textContent = `${total} / ${batch.rows.length} 条`;
  }, 0);

  return `
  <div class="table-scroll">
    <table id="data-table">
      <thead>
        <tr>
          ${cols.map(c => `<th class="${sortConfig.col===c.key?'sorted':''}" onclick="onSort('${c.key}')">
            ${escHtml(c.label)}<span class="sort-icon"> ${sortConfig.col===c.key?(sortConfig.dir==='asc'?'▲':'▼'):'↕'}</span>
          </th>`).join('')}
          ${batch.hasSubdim ? '<th>子维度</th>' : ''}
        </tr>
      </thead>
      <tbody>
        ${pageRows.length ? pageRows.map(r => buildTableRow(r, cols, batch)).join('') : `<tr><td colspan="${cols.length + (batch.hasSubdim?1:0)}" class="no-data">暂无数据</td></tr>`}
      </tbody>
    </table>
  </div>
  ${buildPagination(total, totalPages)}`;
}

function buildTableCols(batch) {
  const cols = [];
  if (batch.isNewFormat) {
    // Video format: show key meta cols first, then score cols
    const firstRow = batch.rows[0] || {};
    // Try to find an ID column
    const idCol = ['任务明细ID','题目ID','任务编号','input.md5','input.source_id'].find(k => firstRow[k] !== undefined);
    if (idCol) cols.push({ key: idCol, label: 'ID' });
    cols.push({ key: '_overall', label: '综合分' });
    // Show annotator and time if present
    if (firstRow['标注人'] !== undefined) cols.push({ key: '标注人', label: '标注人' });
    // Video link columns
    const videoCol = ['input.cut_off_url', '视频链接', 'input.视频链接'].find(k => firstRow[k] !== undefined);
    if (videoCol) cols.push({ key: videoCol, label: '视频', _isUrl: true });
    // Score cols
    batch.scoreCols.forEach(c => cols.push({ key: c, label: c }));
  } else {
    // Show overall first (only if scoreCols exist)
    if (batch.scoreCols.length) {
      cols.push({ key: '_overall', label: '综合分' });
    }
    // Show score cols
    batch.scoreCols.forEach(c => cols.push({ key: c, label: c }));
    // Show other non-score non-special cols
    if (batch.rows.length) {
      const specialKeys = new Set([...batch.scoreCols, '综合分', '_isNewFormat', ...batch.scoreCols.map(c => c + '_level2'), ...batch.scoreCols.map(c => c + '_level3')]);
      const others = Object.keys(batch.rows[0]).filter(k =>
        !specialKeys.has(k) &&
        !k.startsWith('_') &&
        !k.endsWith('_level2') &&
        !k.endsWith('_level3')
      );
      // If no scoreCols at all, show up to 15 columns; otherwise up to 5 extras
      const limit = batch.scoreCols.length ? 5 : 15;
      others.slice(0, limit).forEach(k => cols.push({ key: k, label: k }));
    }
  }
  return cols;
}

function buildTableRow(r, cols, batch) {
  const overall = calcOverallScore(r, batch.scoreCols, batch.isNewFormat);
  const rowKey = JSON.stringify(r).slice(0, 40);
  const rid = btoa(encodeURIComponent(rowKey)).slice(0, 16);
  const isExpanded = expandedRows.has(rid);

  const cells = cols.map(c => {
    if (c.key === '_overall') {
      const cls = getScoreClass(overall);
      return `<td><span class="score-cell ${cls}">${isNaN(overall)?'-':overall}</span></td>`;
    }
    if (c.key === '视频链接' || c._isUrl) {
      const v = r[c.key] || '';
      return `<td>${v ? `<a href="${escHtml(v)}" target="_blank" rel="noopener">查看</a>` : '-'}</td>`;
    }
    const v = r[c.key];
    if (v === undefined || v === null || v === '') return `<td>-</td>`;
    if (batch.scoreCols.includes(c.key)) {
      const n = parseScoreVal(v);
      if (!isNaN(n)) return `<td><span class="score-cell ${getScoreClass(n)}">${n}</span></td>`;
    }
    return `<td>${escHtml(String(v).slice(0, 100))}</td>`;
  }).join('');

  const subBtn = batch.hasSubdim
    ? `<td><button class="expand-btn" onclick="toggleSubdim('${rid}', this)">${isExpanded ? '收起' : '展开'}</button></td>`
    : '';

  const mainRow = `<tr data-rid="${rid}">${cells}${subBtn}</tr>`;

  if (isExpanded && batch.hasSubdim) {
    const subdimHTML = buildSubdimRow(r, batch, cols.length + 1);
    return mainRow + subdimHTML;
  }
  return mainRow;
}

function buildSubdimRow(r, batch, colSpan) {
  const dims = batch.scoreCols.filter(c => r[c + '_level2'] || r[c + '_level3']);
  if (!dims.length) return '';
  const content = dims.map(c => {
    const l2 = r[c + '_level2'];
    const l3 = r[c + '_level3'];
    return `<tr>
      <td style="padding-left:8px;color:var(--primary);font-weight:600">${escHtml(c)}</td>
      ${l2 ? `<td>二级: ${escHtml(String(l2))}</td>` : '<td></td>'}
      ${l3 ? `<td>三级: ${escHtml(String(l3))}</td>` : '<td></td>'}
    </tr>`;
  }).join('');
  return `<tr class="subdim-row">
    <td colspan="${colSpan}">
      <table class="subdim-table"><tbody>${content}</tbody></table>
    </td>
  </tr>`;
}

function buildPagination(total, totalPages) {
  const pages = [];
  let start = Math.max(1, currentPage - 2);
  let end = Math.min(totalPages, currentPage + 2);
  if (end - start < 4) { start = Math.max(1, end - 4); end = Math.min(totalPages, start + 4); }
  for (let i = start; i <= end; i++) pages.push(i);

  const paginationBtns = pages.map(p =>
    `<button class="pg-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`
  ).join('');

  const sizeOpts = PAGE_SIZES.map(s =>
    `<option value="${s}" ${s===pageSize?'selected':''}>${s}条/页</option>`
  ).join('');

  return `<div class="pagination">
    <span>共 ${total} 条</span>
    <button class="pg-btn" onclick="goPage(1)" ${currentPage===1?'disabled':''}>«</button>
    <button class="pg-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>
    ${paginationBtns}
    <button class="pg-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>›</button>
    <button class="pg-btn" onclick="goPage(${totalPages})" ${currentPage===totalPages?'disabled':''}>»</button>
    <select class="pg-size-sel" onchange="changePageSize(this.value)">${sizeOpts}</select>
    <span>第 ${currentPage}/${totalPages} 页</span>
  </div>`;
}

function renderTableSection(batch) {
  const inner = document.getElementById('table-inner');
  if (!inner || !batch) return;
  inner.innerHTML = buildTableInner(batch);
  bindTableSearchEvent();
  updateFilterBadge(batch);
}

function updateFilterBadge(batch) {
  const header = document.querySelector('#table-section .card-header .card-header-actions');
  if (!header) return;
  let badge = header.querySelector('.filter-badge');
  if (chartFilter) {
    if (!badge) {
      badge = document.createElement('span');
      badge.className = 'filter-badge';
      badge.onclick = clearFilter;
      const countLbl = header.querySelector('#table-count-label');
      header.insertBefore(badge, countLbl);
    }
    badge.innerHTML = `已过滤: ${escHtml(String(chartFilter.label || chartFilter.value))} &#215;`;
  } else {
    if (badge) badge.remove();
  }
}

function bindTableSearchEvent() {
  const inp = document.getElementById('table-search');
  if (inp) {
    inp.value = searchQuery;
    inp.oninput = function() { onSearch(this.value); };
  }
}

function bindTableEvents(batch) {
  bindTableSearchEvent();
}

function toggleSubdim(rid, btn) {
  if (expandedRows.has(rid)) {
    expandedRows.delete(rid);
  } else {
    expandedRows.add(rid);
  }
  const batch = batches.find(b => b.id === activeBatchId);
  if (batch) renderTableSection(batch);
}

function onSort(col) {
  if (sortConfig.col === col) {
    sortConfig.dir = sortConfig.dir === 'asc' ? 'desc' : 'asc';
  } else {
    sortConfig.col = col;
    sortConfig.dir = 'asc';
  }
  currentPage = 1;
  const batch = batches.find(b => b.id === activeBatchId);
  if (batch) renderTableSection(batch);
}

function onSearch(val) {
  searchQuery = val;
  currentPage = 1;
  const batch = batches.find(b => b.id === activeBatchId);
  if (batch) renderTableSection(batch);
}

function goPage(p) {
  const batch = batches.find(b => b.id === activeBatchId);
  if (!batch) return;
  const total = getFilteredRows(batch).length;
  const totalPages = Math.max(1, Math.ceil(total / pageSize));
  currentPage = Math.max(1, Math.min(p, totalPages));
  renderTableSection(batch);
}

function changePageSize(val) {
  pageSize = parseInt(val) || 20;
  currentPage = 1;
  const batch = batches.find(b => b.id === activeBatchId);
  if (batch) renderTableSection(batch);
}

function clearFilter() {
  chartFilter = null;
  distFilters = [];
  distFilterExpandedCol = null;
  distFilterExpandedL2 = null;
  currentPage = 1;
  const batch = batches.find(b => b.id === activeBatchId);
  if (batch) {
    renderTableSection(batch);
    renderDistChart(batch);
    renderDimDistFilterBar(batch);
    renderDimDistChart(batch);
  }
  updateFilterBadge(batch);
}

// ===== SHARE / EXPORT =====
function showShareModal() {
  if (!batches.length) { showToast('没有数据可导出', 'error'); return; }
  const modal = document.getElementById('share-modal');
  modal.style.display = 'flex';
  const ta = document.getElementById('share-textarea');
  ta.value = '生成中...';
  setTimeout(() => {
    try {
      ta.value = JSON.stringify({ version: 7, batches }, null, 2);
    } catch(e) { ta.value = '数据过大，无法序列化'; }
  }, 50);
}

function copyShareData() {
  const ta = document.getElementById('share-textarea');
  navigator.clipboard && navigator.clipboard.writeText(ta.value).then(() => showToast('已复制到剪贴板', 'success')).catch(() => {
    ta.select(); document.execCommand('copy'); showToast('已复制', 'success');
  });
}

function downloadShareData() {
  const ta = document.getElementById('share-textarea');
  const blob = new Blob([ta.value], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `dataquality_export_${Date.now()}.json`;
  a.click(); URL.revokeObjectURL(url);
  showToast('下载开始', 'success');
}

function doImport() {
  const ta = document.getElementById('import-textarea');
  try {
    const data = JSON.parse(ta.value);
    let imported = [];
    if (data.batches) imported = data.batches;
    else if (Array.isArray(data)) imported = data;
    if (!imported.length) { showToast('没有找到批次数据', 'error'); return; }
    imported.forEach(b => {
      if (!batches.find(x => x.id === b.id)) {
        batches.push({
          id: b.id || genId(), name: b.name || '导入批次',
          time: b.time || '', rows: b.rows || [],
          scoreCols: b.scoreCols || [], isNewFormat: !!b.isNewFormat,
          hasSubdim: !!b.hasSubdim
        });
      }
    });
    if (!activeBatchId && batches.length) activeBatchId = batches[0].id;
    saveState(); renderAll();
    closeModal('import-modal');
    showToast(`成功导入 ${imported.length} 个批次`, 'success');
  } catch(e) { showToast('JSON 格式错误: ' + e.message, 'error'); }
}

function clearAllData() {
  if (!confirm('确认清空全部数据？此操作不可恢复。')) return;
  batches = []; activeBatchId = null; chartFilter = null;
  destroyCharts();
  localStorage.removeItem(STORAGE_KEY);
  renderAll();
  showToast('已清空全部数据');
}

// ===== DRAG AND DROP =====
function initDropZone() {
  const zone = document.getElementById('drop-zone');
  const inp = document.getElementById('file-input');

  zone.addEventListener('click', () => inp.click());
  inp.addEventListener('change', e => { handleFiles(e.target.files); inp.value = ''; });

  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('dragover');
    handleFiles(e.dataTransfer.files);
  });

  // Also allow drop on main content
  document.addEventListener('dragover', e => e.preventDefault());
  document.addEventListener('drop', e => {
    e.preventDefault();
    const files = e.dataTransfer.files;
    if (files.length && Array.from(files).some(f => f.name.endsWith('.csv'))) {
      handleFiles(files);
    }
  });
}

// ===== INIT =====
function init() {
  loadState();
  if (batches.length && !activeBatchId) activeBatchId = batches[0].id;
  initDropZone();
  renderAll();
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
