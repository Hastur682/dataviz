// Helper: show L3 panel for a given L2 index
function showL3Panel(l3Panel, l2label, color, l3map, l2cnt, col) {
  if (!l3map || l3map.size === 0) {
    l3Panel.innerHTML = `<div class="l3-title"><span class="l3-color-dot" style="background:${color}"></span>${escHtml(l2label)} <span style="font-weight:400;color:var(--text-secondary)">(${l2cnt}条)</span></div><div style="color:var(--text-tertiary);font-size:11px;margin-top:4px">暂无三级标签数据</div>`;
    return;
  }
  // L3 pct is relative to this L2's count (= l2cnt), which is relative to the L1 total
  const l3sorted = Array.from(l3map.entries()).sort((a,b)=>b[1]-a[1]);
  const tagsHtml = l3sorted.map(([tag, cnt]) => {
    const pct = l2cnt ? (cnt / l2cnt * 100).toFixed(1) : 0;
    const shortTag = tag.length > 18 ? tag.slice(0,18)+'…' : tag;
    return `<span class="l3-tag-item" onclick="filterByL3('${escHtml(col)}','${escHtml(tag)}')" title="${escHtml(tag)} (${cnt}条, 占该二级${pct}%)">${escHtml(shortTag)}<span class="l3-tag-cnt">${pct}%</span></span>`;
  }).join('');
  l3Panel.innerHTML = `<div class="l3-title"><span class="l3-color-dot" style="background:${color}"></span>${escHtml(l2label)} <span style="font-weight:400;color:var(--text-secondary)">(${l2cnt}条)</span></div><div class="l3-tags">${tagsHtml}</div>`;
}

function renderSubdimDist(batch) {
  const area = document.getElementById('subdim-dist-area');
  if (!area) return;

  // Destroy any existing subdim pie charts
  Object.keys(charts).filter(k => k.startsWith('subdim-pie-')).forEach(k => {
    try { charts[k].destroy(); } catch(e) {}
    delete charts[k];
  });

  const rows = batch.rows;
  const scoreCols = batch.scoreCols;

  // Build data per dimension
  const dimData = scoreCols.map(col => {
    const l2Counter = new Map();
    const l3Counter = new Map(); // l2label -> Map(l3tag -> count)
    rows.forEach(r => {
      const l2 = r[col + '_level2'];
      if (!l2) return;
      l2Counter.set(l2, (l2Counter.get(l2) || 0) + 1);
      const l3raw = r[col + '_level3'] || '';
      if (l3raw) {
        if (!l3Counter.has(l2)) l3Counter.set(l2, new Map());
        const l3map = l3Counter.get(l2);
        l3raw.split('；').forEach(tag => {
          tag = tag.trim();
          if (tag) l3map.set(tag, (l3map.get(tag) || 0) + 1);
        });
      }
    });
    return { col, l2Counter, l3Counter };
  }).filter(d => d.l2Counter.size > 0);

  if (!dimData.length) {
    area.innerHTML = '<div class="no-data">暂无子维度数据</div>';
    return;
  }

  // Build DOM: one card per dimension
  const grid = document.createElement('div');
  grid.className = 'subdim-pie-grid';

  dimData.forEach(({ col, l2Counter, l3Counter }) => {
    const total = Array.from(l2Counter.values()).reduce((a,b)=>a+b,0);
    const sorted = Array.from(l2Counter.entries()).sort((a,b)=>b[1]-a[1]);
    const labels = sorted.map(([l]) => l);
    const counts = sorted.map(([,c]) => c);
    const colors = labels.map((_, i) => PIE_COLORS[i % PIE_COLORS.length]);

    // Currently selected L2 index for L3 panel
    let selectedIdx = null;

    const card = document.createElement('div');
    card.className = 'subdim-pie-card';

    // Title
    const titleEl = document.createElement('div');
    titleEl.className = 'subdim-pie-title';
    titleEl.innerHTML = `<span>${escHtml(col)}</span><span style="font-size:11px;color:var(--text-tertiary);font-weight:400">${total} 条有标签</span>`;
    card.appendChild(titleEl);

    // Canvas wrapper
    const wrap = document.createElement('div');
    wrap.className = 'subdim-pie-wrap';
    const canvasEl = document.createElement('canvas');
    const chartId = 'subdim-pie-' + col.replace(/[\s/]/g,'_');
    canvasEl.id = chartId;
    wrap.appendChild(canvasEl);
    card.appendChild(wrap);

    // L3 detail panel
    const l3Panel = document.createElement('div');
    l3Panel.className = 'subdim-pie-l3-panel';
    l3Panel.innerHTML = `<div class="subdim-pie-l3-placeholder">点击扇区或下方标签查看三级标签</div>`;
    card.appendChild(l3Panel);

    // Text legend list (clickable, solves small-slice problem)
    const legendList = document.createElement('div');
    legendList.style.cssText = 'margin-top:10px;display:flex;flex-direction:column;gap:3px;';

    sorted.forEach(([l2label, cnt], i) => {
      const pct = total ? (cnt/total*100).toFixed(1) : 0;
      const color = colors[i];
      const row = document.createElement('div');
      row.style.cssText = 'display:flex;align-items:center;gap:6px;padding:3px 6px;border-radius:4px;cursor:pointer;transition:background 0.15s;font-size:11px;';
      row.title = `${l2label}: ${cnt}条 (${pct}%)`;
      // color dot + label text + pct
      const maxLabelLen = 20;
      const shortLabel = l2label.length > maxLabelLen ? l2label.slice(0, maxLabelLen) + '…' : l2label;
      row.innerHTML = `<span style="width:10px;height:10px;border-radius:50%;background:${color};flex-shrink:0;display:inline-block"></span>`
        + `<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)">${escHtml(shortLabel)}</span>`
        + `<span style="color:var(--text-secondary);flex-shrink:0;white-space:nowrap">${cnt} (${pct}%)</span>`;
      row.addEventListener('mouseover', () => row.style.background = '#f5f7fa');
      row.addEventListener('mouseout', () => row.style.background = selectedIdx === i ? '#e8f4ff' : '');
      row.addEventListener('click', () => {
        // Toggle L3 panel
        if (selectedIdx === i) {
          selectedIdx = null;
          l3Panel.innerHTML = `<div class="subdim-pie-l3-placeholder">点击扇区或下方标签查看三级标签</div>`;
          legendList.querySelectorAll('div').forEach(r => r.style.background = '');
        } else {
          selectedIdx = i;
          legendList.querySelectorAll('div').forEach((r, ri) => r.style.background = ri === i ? '#e8f4ff' : '');
          showL3Panel(l3Panel, l2label, color, l3Counter.get(l2label), cnt, col);
        }
        // Also highlight chart slice
        if (charts[chartId]) {
          const meta = charts[chartId].getDatasetMeta(0);
          meta.data.forEach((arc, ai) => { arc.options.offset = ai === i && selectedIdx === i ? 12 : 0; });
          charts[chartId].update('none');
        }
      });
      legendList.appendChild(row);
    });
    card.appendChild(legendList);
    grid.appendChild(card);

    // Create pie chart
    requestAnimationFrame(() => {
      const ctx = canvasEl.getContext('2d');
      const chart = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels,
          datasets: [{
            data: counts,
            backgroundColor: colors,
            borderColor: '#fff',
            borderWidth: 2,
            hoverOffset: 8
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          cutout: '52%',
          plugins: {
            legend: { display: false },  // use custom legend list below
            tooltip: {
              callbacks: {
                label(ctx) {
                  const cnt = ctx.parsed;
                  const pct = total ? (cnt/total*100).toFixed(1) : 0;
                  return ` ${ctx.label}: ${cnt} 条 (${pct}%)`;
                },
                title(items) { return items[0].label; }
              }
            }
          },
          onClick(evt, elements) {
            if (!elements.length) return;
            const idx = elements[0].index;
            if (selectedIdx === idx) {
              // deselect
              selectedIdx = null;
              l3Panel.innerHTML = `<div class="subdim-pie-l3-placeholder">点击扇区或下方标签查看三级标签</div>`;
              legendList.querySelectorAll('div').forEach(r => r.style.background = '');
            } else {
              selectedIdx = idx;
              legendList.querySelectorAll('div').forEach((r, ri) => r.style.background = ri === idx ? '#e8f4ff' : '');
              legendList.querySelectorAll('div')[idx]?.scrollIntoView({ block: 'nearest' });
              showL3Panel(l3Panel, labels[idx], colors[idx], l3Counter.get(labels[idx]), counts[idx], col);
            }
          },
          onHover(evt, elements) {
            canvasEl.style.cursor = elements.length ? 'pointer' : 'default';
          }
        }
      });
      charts[chartId] = chart;
    });
  });

  area.innerHTML = '';
  area.appendChild(grid);
}

function filterByL2(col, label) {
  const item = { level: 2, col, label };
  toggleDistFilter(item);
  syncChartFilterFromDist(batches.find(b => b.id === activeBatchId));
  const batch = batches.find(b => b.id === activeBatchId);
  if (batch) {
    distFilterExpandedCol = col;
    renderDistFilterBar(batch);
    renderDistChart(batch);
    renderTableSection(batch);
    updateFilterBadge(batch);
  }
}

function filterByL3(col, tag) {
  const item = { level: 3, col, label: tag };
  toggleDistFilter(item);
  syncChartFilterFromDist(batches.find(b => b.id === activeBatchId));
  const batch = batches.find(b => b.id === activeBatchId);
  if (batch) {
    distFilterExpandedCol = col;
    renderDistFilterBar(batch);
    renderDistChart(batch);
    renderTableSection(batch);
    updateFilterBadge(batch);
  }
}

// ===== CHARTS =====
function buildTableHTML(batch) {
  return `
  <div class="card" id="table-section">
    <div class="card-header">
      <h3>数据详情</h3>
      <div class="card-header-actions">
        <input type="text" class="search-input" id="table-search" placeholder="搜索..." value="${escHtml(searchQuery)}" oninput="onSearch(this.value)">
        ${chartFilter ? `<span class="filter-badge" id="filter-badge-table" onclick="clearFilter()">已过滤: ${escHtml(String(chartFilter.label || chartFilter.value))} &#215;</span>` : ''}
        <span style="font-size:12px;color:var(--text-secondary)" id="table-count-label"></span>
      </div>
    </div>
    <div id="table-inner">
      ${buildTableInner(batch)}
    </div>
  </div>`;
}

function getFilteredRows(batch) {
  let rows = batch.rows;
  if (chartFilter) {
    if (chartFilter.type === 'score') {
      const target = chartFilter.value;
      rows = rows.filter(r => {
        const s = calcOverallScore(r, batch.scoreCols, batch.isNewFormat);
        return !isNaN(s) && Math.abs(s - target) < 0.001;
      });
    } else if (chartFilter.type === 'dist') {
      const { min, max } = chartFilter;
      rows = rows.filter(r => {
        const s = calcOverallScore(r, batch.scoreCols, batch.isNewFormat);
        return !isNaN(s) && s >= min && (s < max || (max === 5 && s <= 5));
      });
    } else if (chartFilter.type === 'multi') {
      // Same logic as getDistFilteredRows but from chartFilter's snapshot
      const filters = chartFilter.distFilters || [];
      const byCol = new Map();
      filters.forEach(f => { if (!byCol.has(f.col)) byCol.set(f.col, []); byCol.get(f.col).push(f); });
      rows = rows.filter(r => Array.from(byCol.values()).every(g => g.some(item => rowMatchesDistItem(r, item))));
    } else if (chartFilter.type === 'l1') {
      const { col } = chartFilter;
      rows = rows.filter(r => r[col] !== undefined && r[col] !== '' && r[col] !== null);
    } else if (chartFilter.type === 'l2') {
      const { col, label } = chartFilter;
      rows = rows.filter(r => r[col + '_level2'] === label);
    } else if (chartFilter.type === 'l3') {
      const { col, label } = chartFilter;
      rows = rows.filter(r => {
        const l3 = r[col + '_level3'] || '';
        return l3.split('；').some(t => t.trim() === label);
      });
    } else if (chartFilter.type === 'dim-score') {
      const { col, value } = chartFilter;
      rows = rows.filter(r => {
        const v = parseFloat(r[col]);
        return !isNaN(v) && Math.abs(parseFloat(v.toFixed(2)) - value) < 0.001;
      });
    }
  }
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    rows = rows.filter(r => Object.values(r).some(v => String(v).toLowerCase().includes(q)));
  }
  return rows;
}

function getSortedRows(rows, batch) {
  if (!sortConfig.col) return rows;
  const col = sortConfig.col;
  const dir = sortConfig.dir === 'asc' ? 1 : -1;
  return [...rows].sort((a, b) => {
    const va = a[col]; const vb = b[col];
    const na = parseFloat(va); const nb = parseFloat(vb);
    if (!isNaN(na) && !isNaN(nb)) return (na - nb) * dir;
    return String(va || '').localeCompare(String(vb || ''), 'zh-CN') * dir;
  });
}

function buildTableInner(batch) {
  const allFiltered = getFilteredRows(batch);
  const sorted = getSortedRows(allFiltered, batch);
  const total = sorted.length;
  const totalPages = Math.max(1, Math.ceil(total / pageSize));
  currentPage = Math.min(currentPage, totalPages);
  const start = (currentPage - 1) * pageSize;
  const pageRows = sorted.slice(start, start + pageSize);

  const cols = buildTableCols(batch);

  // Update count label after render
  setTimeout(() => {
    const lbl = document.getElementById('table-count-label');
    if (lbl) lbl.textContent = `${total} / ${batch.rows.length} 条`;
  }, 0);

  return `
  <div class="table-scroll">
    <table id="data-table">
      <thead>
        <tr>
          ${cols.map(c => `<th class="${sortConfig.col===c.key?'sorted':''}" onclick="onSort('${c.key}')">
            ${escHtml(c.label)}<span class="sort-icon"> ${sortConfig.col===c.key?(sortConfig.dir==='asc'?'▲':'▼'):'↕'}</span>
          </th>`).join('')}
          ${batch.hasSubdim ? '<th>子维度</th>' : ''}
        </tr>
      </thead>
      <tbody>
        ${pageRows.length ? pageRows.map(r => buildTableRow(r, cols, batch)).join('') : `<tr><td colspan="${cols.length + (batch.hasSubdim?1:0)}" class="no-data">暂无数据</td></tr>`}
      </tbody>
    </table>
  </div>
  ${buildPagination(total, totalPages)}`;
}

function buildTableCols(batch) {
  const cols = [];
  if (batch.isNewFormat) {
    // Video format: show key meta cols first, then score cols
    const firstRow = batch.rows[0] || {};
    // Try to find an ID column
    const idCol = ['任务明细ID','题目ID','任务编号','input.md5','input.source_id'].find(k => firstRow[k] !== undefined);
    if (idCol) cols.push({ key: idCol, label: 'ID' });
    cols.push({ key: '_overall', label: '综合分' });
    // Show annotator and time if present
    if (firstRow['标注人'] !== undefined) cols.push({ key: '标注人', label: '标注人' });
    // Video link columns
    const videoCol = ['input.cut_off_url', '视频链接', 'input.视频链接'].find(k => firstRow[k] !== undefined);
    if (videoCol) cols.push({ key: videoCol, label: '视频', _isUrl: true });
    // Task page link column (after video)
    const taskPageCol = ['作业链接', 'input.task_url', 'task_url', '作业页面', 'input.作业链接'].find(k => firstRow[k] !== undefined);
    if (taskPageCol) cols.push({ key: taskPageCol, label: '作业页面', _isUrl: true });
    // Score cols
    batch.scoreCols.forEach(c => cols.push({ key: c, label: c }));
  } else {
    // Show overall first (only if scoreCols exist)
    if (batch.scoreCols.length) {
      cols.push({ key: '_overall', label: '综合分' });
    }
    // Show score cols
    batch.scoreCols.forEach(c => cols.push({ key: c, label: c }));
    // Show other non-score non-special cols
    if (batch.rows.length) {
      const specialKeys = new Set([...batch.scoreCols, '综合分', '_isNewFormat', ...batch.scoreCols.map(c => c + '_level2'), ...batch.scoreCols.map(c => c + '_level3')]);
      const others = Object.keys(batch.rows[0]).filter(k =>
        !specialKeys.has(k) &&
        !k.startsWith('_') &&
        !k.endsWith('_level2') &&
        !k.endsWith('_level3')
      );
      // If no scoreCols at all, show up to 15 columns; otherwise up to 5 extras
      const limit = batch.scoreCols.length ? 5 : 15;
      others.slice(0, limit).forEach(k => cols.push({ key: k, label: k }));
    }
  }
  return cols;
}

function buildTableRow(r, cols, batch) {
  const overall = calcOverallScore(r, batch.scoreCols, batch.isNewFormat);
  const rowKey = JSON.stringify(r).slice(0, 40);
  const rid = btoa(encodeURIComponent(rowKey)).slice(0, 16);
  const isExpanded = expandedRows.has(rid);

  const cells = cols.map(c => {
    if (c.key === '_overall') {
      const cls = getScoreClass(overall);
      return `<td><span class="score-cell ${cls}">${isNaN(overall)?'-':overall}</span></td>`;
    }
    if (c.key === '视频链接' || c._isUrl) {
      const v = r[c.key] || '';
      return `<td>${v ? `<a href="${escHtml(v)}" target="_blank" rel="noopener">查看</a>` : '-'}</td>`;
    }
    const v = r[c.key];
    if (v === undefined || v === null || v === '') return `<td>-</td>`;
    if (batch.scoreCols.includes(c.key)) {
      const n = parseScoreVal(v);
      if (!isNaN(n)) return `<td><span class="score-cell ${getScoreClass(n)}">${n}</span></td>`;
    }
    return `<td>${escHtml(String(v).slice(0, 100))}</td>`;
  }).join('');

  const subBtn = batch.hasSubdim
    ? `<td><button class="expand-btn" onclick="toggleSubdim('${rid}', this)">${isExpanded ? '收起' : '展开'}</button></td>`
    : '';

  const mainRow = `<tr data-rid="${rid}">${cells}${subBtn}</tr>`;

  if (isExpanded && batch.hasSubdim) {
    const subdimHTML = buildSubdimRow(r, batch, cols.length + 1);
    return mainRow + subdimHTML;
  }
  return mainRow;
}

function buildSubdimRow(r, batch, colSpan) {
  const dims = batch.scoreCols.filter(c => r[c + '_level2'] || r[c + '_level3']);
  if (!dims.length) return '';
  const content = dims.map(c => {
    const l2 = r[c + '_level2'];
    const l3 = r[c + '_level3'];
    return `<tr>
      <td style="padding-left:8px;color:var(--primary);font-weight:600">${escHtml(c)}</td>
      ${l2 ? `<td>二级: ${escHtml(String(l2))}</td>` : '<td></td>'}
      ${l3 ? `<td>三级: ${escHtml(String(l3))}</td>` : '<td></td>'}
    </tr>`;
  }).join('');
  return `<tr class="subdim-row">
    <td colspan="${colSpan}">
      <table class="subdim-table"><tbody>${content}</tbody></table>
    </td>
  </tr>`;
}

function buildPagination(total, totalPages) {
  const pages = [];
  let start = Math.max(1, currentPage - 2);
  let end = Math.min(totalPages, currentPage + 2);
  if (end - start < 4) { start = Math.max(1, end - 4); end = Math.min(totalPages, start + 4); }
  for (let i = start; i <= end; i++) pages.push(i);

  const paginationBtns = pages.map(p =>
    `<button class="pg-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`
  ).join('');

  const sizeOpts = PAGE_SIZES.map(s =>
    `<option value="${s}" ${s===pageSize?'selected':''}>${s}条/页</option>`
  ).join('');

  return `<div class="pagination">
    <span>共 ${total} 条</span>
    <button class="pg-btn" onclick="goPage(1)" ${currentPage===1?'disabled':''}>«</button>
    <button class="pg-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>
    ${paginationBtns}
    <button class="pg-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>›</button>
    <button class="pg-btn" onclick="goPage(${totalPages})" ${currentPage===totalPages?'disabled':''}>»</button>
    <select class="pg-size-sel" onchange="changePageSize(this.value)">${sizeOpts}</select>
    <span>第 ${currentPage}/${totalPages} 页</span>
  </div>`;
}

function renderTableSection(batch) {
  const inner = document.getElementById('table-inner');
  if (!inner || !batch) return;
  inner.innerHTML = buildTableInner(batch);
  bindTableSearchEvent();
  updateFilterBadge(batch);
}

function updateFilterBadge(batch) {
  const header = document.querySelector('#table-section .card-header .card-header-actions');
  if (!header) return;
  let badge = header.querySelector('.filter-badge');
  if (chartFilter) {
    if (!badge) {
      badge = document.createElement('span');
      badge.className = 'filter-badge';
      badge.onclick = clearFilter;
      const countLbl = header.querySelector('#table-count-label');
      header.insertBefore(badge, countLbl);
    }
    badge.innerHTML = `已过滤: ${escHtml(String(chartFilter.label || chartFilter.value))} &#215;`;
  } else {
    if (badge) badge.remove();
  }
}

function bindTableSearchEvent() {
  const inp = document.getElementById('table-search');
  if (inp) {
    inp.value = searchQuery;
    inp.oninput = function() { onSearch(this.value); };
  }
}

function bindTableEvents(batch) {
  bindTableSearchEvent();
}

function toggleSubdim(rid, btn) {
  if (expandedRows.has(rid)) {
    expandedRows.delete(rid);
  } else {
    expandedRows.add(rid);
  }
  const batch = batches.find(b => b.id === activeBatchId);
  if (batch) renderTableSection(batch);
}

function onSort(col) {
  if (sortConfig.col === col) {
    sortConfig.dir = sortConfig.dir === 'asc' ? 'desc' : 'asc';
  } else {
    sortConfig.col = col;
    sortConfig.dir = 'asc';
  }
  currentPage = 1;
  const batch = batches.find(b => b.id === activeBatchId);
  if (batch) renderTableSection(batch);
}

function onSearch(val) {
  searchQuery = val;
  currentPage = 1;
  const batch = batches.find(b => b.id === activeBatchId);
  if (batch) renderTableSection(batch);
}

function goPage(p) {
  const batch = batches.find(b => b.id === activeBatchId);
  if (!batch) return;
  const total = getFilteredRows(batch).length;
  const totalPages = Math.max(1, Math.ceil(total / pageSize));
  currentPage = Math.max(1, Math.min(p, totalPages));
  renderTableSection(batch);
}

function changePageSize(val) {
  pageSize = parseInt(val) || 20;
  currentPage = 1;
  const batch = batches.find(b => b.id === activeBatchId);
  if (batch) renderTableSection(batch);
}

function clearFilter() {
  chartFilter = null;
  distFilters = [];
  distFilterExpandedCol = null;
  distFilterExpandedL2 = null;
  currentPage = 1;
  const batch = batches.find(b => b.id === activeBatchId);
  if (batch) {
    renderTableSection(batch);
    renderDistChart(batch);
    renderDimDistFilterBar(batch);
    renderDimDistChart(batch);
  }
  updateFilterBadge(batch);
}

// ===== SHARE / EXPORT =====
function showShareModal() {
  if (!batches.length) { showToast('没有数据可导出', 'error'); return; }
  const modal = document.getElementById('share-modal');
  modal.style.display = 'flex';
  const ta = document.getElementById('share-textarea');
  ta.value = '生成中...';
  setTimeout(() => {
    try {
      ta.value = JSON.stringify({ version: 7, batches, categories }, null, 2);
    } catch(e) { ta.value = '数据过大，无法序列化'; }
  }, 50);
}

function copyShareData() {
  const ta = document.getElementById('share-textarea');
  navigator.clipboard && navigator.clipboard.writeText(ta.value).then(() => showToast('已复制到剪贴板', 'success')).catch(() => {
    ta.select(); document.execCommand('copy'); showToast('已复制', 'success');
  });
}

function downloadShareData() {
  const ta = document.getElementById('share-textarea');
  const blob = new Blob([ta.value], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `dataquality_export_${Date.now()}.json`;
  a.click(); URL.revokeObjectURL(url);
  showToast('下载开始', 'success');
}

function doImport() {
  const ta = document.getElementById('import-textarea');
  try {
    const data = JSON.parse(ta.value);
    let imported = [];
    let importedCats = [];
    if (data.batches) { imported = data.batches; importedCats = data.categories || []; }
    else if (Array.isArray(data)) imported = data;
    if (!imported.length) { showToast('没有找到批次数据', 'error'); return; }
    // Merge categories (by id dedup)
    importedCats.forEach(c => { if (!categories.find(x => x.id === c.id)) categories.push({ id: c.id, name: c.name }); });
    imported.forEach(b => {
      if (!batches.find(x => x.id === b.id)) {
        batches.push({
          id: b.id || genId(), name: b.name || '导入批次',
          time: b.time || '', rows: b.rows || [],
          scoreCols: b.scoreCols || [], isNewFormat: !!b.isNewFormat,
          hasSubdim: !!b.hasSubdim, categoryId: b.categoryId || null
        });
      }
    });
    if (!activeBatchId && batches.length) activeBatchId = batches[0].id;
    saveState(); renderAll();
    closeModal('import-modal');
    showToast(`成功导入 ${imported.length} 个批次`, 'success');
  } catch(e) { showToast('JSON 格式错误: ' + e.message, 'error'); }
}

function clearAllData() {
  if (!confirm('确认清空全部数据？此操作不可恢复。')) return;
  batches = []; categories = []; activeBatchId = null; chartFilter = null;
  destroyCharts();
  openDB().then(db => {
    const tx = db.transaction([STORE_NAME, CAT_STORE], 'readwrite');
    tx.objectStore(STORE_NAME).clear();
    tx.objectStore(CAT_STORE).clear();
  }).catch(() => {});
  localStorage.removeItem(STORAGE_KEY);
  renderAll();
  showToast('已清空全部数据');
}

// ===== DRAG AND DROP =====
function initDropZone() {
  const zone = document.getElementById('drop-zone');
  const inp = document.getElementById('file-input');

  zone.addEventListener('click', () => inp.click());
  inp.addEventListener('change', e => { handleFiles(e.target.files); inp.value = ''; });

  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('dragover');
    handleFiles(e.dataTransfer.files);
  });

  // Also allow drop on main content
  document.addEventListener('dragover', e => e.preventDefault());
  document.addEventListener('drop', e => {
    e.preventDefault();
    const files = e.dataTransfer.files;
    if (files.length && Array.from(files).some(f => f.name.endsWith('.csv'))) {
      handleFiles(files);
    }
  });
}

// ===== INIT =====
function init() {
  loadState().then(() => {
    if (batches.length && !activeBatchId) activeBatchId = batches[0].id;
    initDropZone();
    renderAll();
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
